<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Anagram — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:540px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }

.hud { display:flex; align-items:center; justify-content:space-between; width:100%; flex-wrap:wrap; gap:.5rem; }
.hud-pill { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.45rem .9rem; text-align:center; min-width:60px; }
.hud-pill .val { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--gold); }
.hud-pill .lbl { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

/* Timer bar */
.timer-wrap { width:100%; }
.timer-track { width:100%; height:6px; background:var(--border2); border-radius:99px; overflow:hidden; }
.timer-fill  { height:100%; background:var(--gold); border-radius:99px; transition:width .5s linear, background .4s; }
.timer-fill.urgent { background:var(--wrong); }
.timer-nums { display:flex; justify-content:space-between; margin-top:.25rem; }
.timer-nums span { font-family:'Space Mono',monospace; font-size:.65rem; color:var(--muted); }
.timer-sec { color:var(--gold) !important; font-weight:700; }
.timer-sec.urgent { color:var(--wrong) !important; }

/* Definition card */
.def-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; width:100%; display:flex; flex-direction:column; gap:.6rem; }
.def-card .cat { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); }
.def-card .definition { font-size:1rem; line-height:1.75; color:var(--text); }
.def-card .letter-count { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); padding-top:.25rem; border-top:1px solid var(--border); }

/* Answer tiles */
.answer-row { display:flex; gap:.4rem; justify-content:center; flex-wrap:wrap; }
.ans-tile {
  width:44px; height:52px;
  border:2px solid var(--border2); border-radius:6px;
  background:#0a0a0a;
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700;
  color:var(--text); text-transform:uppercase;
  cursor:pointer; transition:all .15s;
  user-select:none;
}
.ans-tile.filled { border-color:var(--gold); background:var(--gold-dim); color:var(--gold); }
.ans-tile.correct { border-color:var(--correct); background:var(--correct-dim); color:var(--correct); animation:pop .3s ease; }
.ans-tile.wrong   { border-color:var(--wrong);   background:var(--wrong-dim);   animation:shake .4s; }

/* Letter bank */
.bank-row { display:flex; gap:.4rem; justify-content:center; flex-wrap:wrap; }
.bank-tile {
  min-width:44px; height:52px; padding:0 .5rem;
  border:2px solid var(--border2); border-radius:6px;
  background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700;
  color:var(--text); text-transform:uppercase;
  cursor:pointer; transition:all .15s; user-select:none;
}
.bank-tile:hover { border-color:var(--gold); background:var(--gold-dim); color:var(--gold); }
.bank-tile.used { opacity:.2; pointer-events:none; }

/* Action buttons row */
.action-row { display:flex; gap:.5rem; justify-content:center; flex-wrap:wrap; }

/* Feedback */
.feedback { min-height:1.4rem; font-size:.88rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok  { color:var(--correct); }
.feedback.bad  { color:var(--wrong); }
.feedback.info { color:var(--gold); }

/* Hint strip — shows gradually revealed letters */
.hint-strip { display:flex; gap:.3rem; justify-content:center; flex-wrap:wrap; padding:.4rem; background:var(--surface2); border-radius:8px; border:1px solid var(--border); }
.hint-strip-label { font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); width:100%; text-align:center; margin-bottom:.2rem; }
.hint-letter { font-family:'Space Mono',monospace; font-size:.9rem; font-weight:700; color:var(--border2); width:22px; text-align:center; }
.hint-letter.revealed { color:var(--gold); }

/* Round progress dots */
.dots { display:flex; gap:.35rem; flex-wrap:wrap; justify-content:center; }
.dot { width:9px; height:9px; border-radius:50%; background:var(--border2); transition:background .3s; }
.dot.done  { background:var(--correct); }
.dot.wrong { background:var(--wrong); }
.dot.skip  { background:#b8860b; }

/* End card */
.end-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; animation:fadeIn .4s ease; }
.end-score { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--gold); }
.review-grid { display:flex; flex-direction:column; gap:.4rem; width:100%; margin-top:.25rem; }
.review-item { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.45rem .9rem; font-size:.85rem; cursor:pointer; transition:border-color .15s; }
.review-item:hover { border-color:var(--gold); }
.review-word { font-family:'Playfair Display',serif; font-weight:700; color:var(--gold); }
.review-status { font-size:.7rem; font-family:'Space Mono',monospace; }
.review-status.ok  { color:var(--correct); }
.review-status.bad { color:var(--wrong); }
.review-status.skip{ color:#b8860b; }

.lb-section { width:100%; max-width:540px; padding:0 1rem 2.5rem; }

/* Gentle blink on inactive mode tabs */
@keyframes modePulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.diff-tab:not(.active) { animation:modePulse 2.8s ease-in-out infinite; }
.diff-tab:not(.active):hover { animation:none; opacity:1; }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">🔀 Anagram</span>
  <span></span>
</nav>

<main>
  <!-- Difficulty tabs -->
  <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:.5rem">
    <div class="diff-tabs">
      <button class="diff-tab active" id="tabE" onclick="setDiff('easy')">Easy</button>
      <button class="diff-tab"        id="tabH" onclick="setDiff('hard')">Hard</button>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-pill"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
    <div class="hud-pill"><div class="val" id="skipsVal">3</div><div class="lbl">Skips</div></div>
    <div class="hud-pill"><div class="val" id="hintsVal">2</div><div class="lbl">Hints</div></div>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="timer-nums"><span>Time</span><span class="timer-sec" id="timerSec">90s</span><span id="timerBonus" style="color:var(--correct);opacity:0;transition:opacity .3s"></span></div>
  </div>

  <!-- Question card -->
  <div class="def-card" id="qCard">
    <div class="cat" id="qCat">Category</div>
    <div class="definition" id="qDef">Loading…</div>
    <div class="letter-count" id="qCount"></div>
  </div>

  <!-- Answer tiles (tap to remove) -->
  <div class="answer-row" id="answerRow"></div>

  <!-- Hint strip (letter-by-letter reveal) -->
  <div class="hint-strip" id="hintStripWrap" style="display:none">
    <div class="hint-strip-label">Letter hints</div>
    <div style="display:flex;gap:.3rem;justify-content:center;flex-wrap:wrap" id="hintStrip"></div>
  </div>

  <!-- Letter bank (tap to place) -->
  <div class="bank-row" id="bankRow"></div>

  <!-- Actions -->
  <div class="action-row">
    <button class="btn-primary" onclick="checkAnswer()">Check ✓</button>
    <button class="btn-ghost"   onclick="showHint()">💡 Hint (−5)</button>
    <button class="btn-ghost"   onclick="skipWord()">⏭ Skip (−10)</button>
    <button class="btn-ghost"   onclick="clearAnswer()">✕ Clear</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <!-- End card -->
  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow">Round complete</div>
    <div class="end-score" id="endScore"></div>
    <p style="color:var(--muted);font-size:.88rem" id="endMsg"></p>
    <div class="review-grid" id="reviewGrid"></div>
    <div id="submitArea" style="width:100%">
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center">
      <button class="btn-ghost" onclick="restartGame()">Play again</button>
      <button class="btn-ghost" onclick="setDiff(diff==='easy'?'hard':'easy')" id="switchBtn"></button>
      <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
    </div>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>

  {w:'THOUSAND',    cat:'Maths',       def:'The number equal to ten hundred; 1,000.'},
  {w:'ULTIMATE',    cat:'Adjectives',  def:'Being the best or most extreme example of its kind.'},
  {w:'VALUABLE',    cat:'Adjectives',  def:'Worth a great deal of money or important in some way.'},
  {w:'WANDERER',    cat:'People',      def:'A person who travels from place to place without a fixed home.'},
  {w:'EXAMINE',     cat:'Verbs',       def:'To inspect or study something carefully and in detail.'},
  {w:'RECENTLY',    cat:'Time',        def:'At a recent time; not long ago.'},
  {w:'ABSOLUTE',    cat:'Adjectives',  def:'Not qualified or diminished in any way; total.'},

const ROUND_SIZE = 8;
const START_TIME = 90; // seconds per round
let diff = 'easy', wordBank = EASY_WORDS;
let roundWords = [], current = 0, totalScore = 0, skipsLeft = 3, hintsLeft = 2;
let currentLetters = [], placedIndices = [], timerInterval = null, timeLeft = START_TIME;
let results = [];

function setDiff(d) {
  diff = d; wordBank = d === 'easy' ? EASY_WORDS : HARD_WORDS;
  document.getElementById('tabE').classList.toggle('active', d==='easy');
  document.getElementById('tabH').classList.toggle('active', d==='hard');
  document.getElementById('switchBtn').textContent = d==='easy' ? 'Switch to Hard' : 'Switch to Easy';
  restartGame();
}

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

function initRound() {
  const indices = freshIndices('anagram_'+diff, wordBank, ROUND_SIZE);
  indices.forEach(i => markSeen('anagram_'+diff, i));
  roundWords = indices.map(i => wordBank[i]);
  current = 0; totalScore = 0; skipsLeft = 3; hintsLeft = 2; results = [];
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('skipsVal').textContent = 3;
  document.getElementById('hintsVal').textContent = 2;
  document.getElementById('endCard').style.display = 'none';
  buildDots(); loadWord(); startTimer();
  renderLeaderboard('anagram_'+diff, 'lbBody');
}

function buildDots() {
  const el = document.getElementById('dots'); el.innerHTML = '';
  for(let i=0;i<ROUND_SIZE;i++){const d=document.createElement('div');d.className='dot';d.id='adot'+i;el.appendChild(d);}
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = START_TIME;
  updateTimerUI();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if(timeLeft<=0){clearInterval(timerInterval);timeOut();}
  },1000);
}

function updateTimerUI() {
  const pct = Math.min(100,(timeLeft/START_TIME)*100);
  const fill = document.getElementById('timerFill');
  const sec  = document.getElementById('timerSec');
  fill.style.width = pct+'%';
  sec.textContent  = timeLeft+'s';
  const u = timeLeft<=15;
  fill.classList.toggle('urgent',u);
  sec.classList.toggle('urgent',u);
}

function timeOut() {
  // Force skip remaining word
  if(current < ROUND_SIZE) { skipWord(true); }
}

function loadWord() {
  if(current >= ROUND_SIZE){ clearInterval(timerInterval); endRound(); return; }
  const w = roundWords[current];
  document.getElementById('qCard').style.display = 'flex';
  document.getElementById('qCat').textContent = w.cat;
  document.getElementById('qDef').textContent = w.def;
  document.getElementById('qCount').textContent = `${w.w.length} letters`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  // Scramble letters
  currentLetters = shuffle(w.w.split(''));
  placedIndices  = [];
  buildBank();
  buildAnswerRow();
  buildHintStrip();
}

function buildBank() {
  const row = document.getElementById('bankRow'); row.innerHTML = '';
  currentLetters.forEach((l,i)=>{
    const t = document.createElement('div'); t.className='bank-tile'; t.textContent=l;
    t.id='bank'+i; t.addEventListener('click',()=>placeLetter(i));
    row.appendChild(t);
  });
}

function buildAnswerRow() {
  const row = document.getElementById('answerRow'); row.innerHTML='';
  const len = roundWords[current].w.length;
  for(let i=0;i<len;i++){
    const t=document.createElement('div'); t.className='ans-tile'; t.id='ans'+i;
    t.addEventListener('click',()=>removeLetter(i));
    row.appendChild(t);
  }
}

function buildHintStrip() {
  const strip = document.getElementById('hintStrip'); strip.innerHTML='';
  const wrap  = document.getElementById('hintStripWrap');
  if(wrap) wrap.style.display = 'none'; // hidden until first hint used
  roundWords[current].w.split('').forEach(()=>{
    const s=document.createElement('div'); s.className='hint-letter'; s.textContent='—';
    strip.appendChild(s);
  });
}

function placeLetter(bankIdx) {
  if(placedIndices.includes(bankIdx)) return;
  // Find next empty answer slot
  const len = roundWords[current].w.length;
  for(let i=0;i<len;i++){
    const tile = document.getElementById('ans'+i);
    if(!tile.textContent){
      tile.textContent = currentLetters[bankIdx];
      tile.dataset.bankIdx = bankIdx;
      tile.classList.add('filled');
      document.getElementById('bank'+bankIdx).classList.add('used');
      placedIndices.push(bankIdx);
      break;
    }
  }
}

function removeLetter(ansIdx) {
  const tile = document.getElementById('ans'+ansIdx);
  if(!tile.textContent) return;
  const bankIdx = parseInt(tile.dataset.bankIdx);
  tile.textContent = '';
  tile.dataset.bankIdx = '';
  tile.classList.remove('filled','correct','wrong');
  document.getElementById('bank'+bankIdx).classList.remove('used');
  placedIndices = placedIndices.filter(i=>i!==bankIdx);
}

function clearAnswer() {
  const len = roundWords[current].w.length;
  for(let i=0;i<len;i++){
    const tile=document.getElementById('ans'+i);
    if(tile.textContent){
      const bankIdx=parseInt(tile.dataset.bankIdx);
      document.getElementById('bank'+bankIdx).classList.remove('used');
      tile.textContent=''; tile.dataset.bankIdx=''; tile.classList.remove('filled','correct','wrong');
    }
  }
  placedIndices=[];
}

function checkAnswer() {
  const len = roundWords[current].w.length;
  let guess = '';
  for(let i=0;i<len;i++){
    const t=document.getElementById('ans'+i);
    guess += t.textContent||'';
  }
  if(guess.length < len){ showFeedback('Place all letters first!','bad'); return; }

  const target = roundWords[current].w;
  if(guess.toUpperCase()===target){
    // Correct!
    const timeBonus = Math.floor(timeLeft/10)*5;
    const pts = (diff==='easy'?20:35) + timeBonus;
    totalScore += pts;
    document.getElementById('scoreVal').textContent = totalScore;
    // Flash tiles green
    for(let i=0;i<len;i++) document.getElementById('ans'+i).classList.replace('filled','correct');
    document.getElementById('adot'+current).className='dot done';
    results.push({w:target,cat:roundWords[current].cat,def:roundWords[current].def,status:'correct',pts});
    showFeedback(`✓ +${pts} pts (includes +${timeBonus} time bonus)`,'ok');
    // Bonus time for correct answer
    timeLeft = Math.min(timeLeft+10, START_TIME);
    updateTimerUI();
    setTimeout(()=>{ current++; loadWord(); },900);
  } else {
    for(let i=0;i<len;i++) document.getElementById('ans'+i).classList.add('wrong');
    setTimeout(()=>{ for(let i=0;i<len;i++) document.getElementById('ans'+i).classList.remove('wrong'); },400);
    showFeedback('Not quite — try again!','bad');
  }
}

function showHint() {
  if(hintsLeft<=0){ showFeedback('No hints left!','bad'); return; }
  hintsLeft--;
  document.getElementById('hintsVal').textContent=hintsLeft;
  // Show hint strip
  const wrap = document.getElementById('hintStripWrap');
  if(wrap) wrap.style.display = 'flex';
  // Reveal next unrevealed letter
  const word = roundWords[current].w;
  const hints = document.getElementById('hintStrip').children;
  for(let i=0;i<word.length;i++){
    if(!hints[i].classList.contains('revealed')){
      hints[i].textContent = word[i];
      hints[i].classList.add('revealed');
      break;
    }
  }
  totalScore = Math.max(0, totalScore-5);
  document.getElementById('scoreVal').textContent = totalScore;
  showFeedback('Hint used — letter revealed (−5 pts)', 'info');
}

function skipWord(forced=false) {
  if(!forced && skipsLeft<=0){ showFeedback('No skips left!','bad'); return; }
  if(!forced){ skipsLeft--; document.getElementById('skipsVal').textContent=skipsLeft; totalScore=Math.max(0,totalScore-10); document.getElementById('scoreVal').textContent=totalScore; }
  const w=roundWords[current];
  document.getElementById('adot'+current).className='dot skip';
  results.push({w:w.w,cat:w.cat,def:w.def,status:forced?'time':'skip',pts:0});
  current++; loadWord();
}

function showFeedback(msg,type){ const el=document.getElementById('feedback'); el.textContent=msg; el.className='feedback '+type; }

function endRound() {
  clearInterval(timerInterval);
  document.getElementById('qCard').style.display='none';
  document.getElementById('answerRow').innerHTML='';
  document.getElementById('bankRow').innerHTML='';
  document.getElementById('hintStrip').innerHTML='';
  document.getElementById('action-row') && (document.querySelector('.action-row').style.display='none');
  document.getElementById('endCard').style.display='flex';

  document.getElementById('endScore').textContent = totalScore+' pts';
  const max = ROUND_SIZE*(diff==='easy'?20:35);
  document.getElementById('endMsg').textContent =
    totalScore>=max*.8?'🎉 Outstanding!':totalScore>=max*.5?'👏 Well done!':'Keep practising — unscramble those letters!';
  document.getElementById('endCard').dataset.score = totalScore;
  document.getElementById('switchBtn').textContent = diff==='easy'?'Switch to Hard':'Switch to Easy';

  const rg=document.getElementById('reviewGrid'); rg.innerHTML='';
  results.forEach(r=>{
    const el=document.createElement('div'); el.className='review-item';
    el.innerHTML=`<span class="review-word">${r.w}</span><span class="review-status ${r.status==='correct'?'ok':r.status==='skip'||r.status==='time'?'skip':'bad'}">${r.status==='correct'?'+'+r.pts+' pts':r.status==='skip'?'skipped':'time out'}</span>`;
    el.addEventListener('click',()=>showDefinitionModal(r.w));
    rg.appendChild(el);
  });
}

function restartGame(){ document.querySelector('.action-row').style.display=''; initRound(); }
async function doSubmit(){
  await handleScoreSubmit('anagram_'+diff,parseInt(document.getElementById('endCard').dataset.score),'nameInput','submitArea','lbBody');
}

// Init
document.getElementById('switchBtn').textContent = 'Switch to Hard';
initRound();
</script>
