<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dictation Drill — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:560px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }

.stats-row { display:flex; gap:.5rem; width:100%; }
.stat-box { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.5rem .5rem; text-align:center; }
.stat-box .val { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:var(--gold); }
.stat-box .lbl { font-family:'Space Mono',monospace; font-size:.55rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }

/* Timer bar */
.timer-wrap { width:100%; }
.timer-track { width:100%; height:8px; background:var(--border2); border-radius:99px; overflow:hidden; }
.timer-fill  { height:100%; background:var(--gold); border-radius:99px; transition:width .5s linear, background .5s; }
.timer-fill.urgent { background:var(--wrong); }
.timer-label { display:flex; justify-content:space-between; margin-top:.3rem; }
.timer-label span { font-family:'Space Mono',monospace; font-size:.65rem; color:var(--muted); letter-spacing:.06em; }
.timer-label .timer-sec { color:var(--gold); font-weight:700; font-size:.8rem; }
.timer-label .timer-sec.urgent { color:var(--wrong); }

/* Audio control panel */
.audio-panel {
  width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:1.5rem 1.25rem; display:flex; flex-direction:column; align-items:center; gap:1rem;
}
.play-btn {
  width:84px; height:84px; border-radius:50%;
  background:var(--gold-dim); border:2px solid rgba(212,175,55,.4);
  color:var(--gold); font-size:2rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s, transform .15s, border-color .2s;
}
.play-btn:hover { background:rgba(212,175,55,.28); border-color:var(--gold); }
.play-btn:active { transform:scale(.95); }
.play-btn.speaking { animation:speakPulse 1s ease-in-out infinite; }
@keyframes speakPulse {
  0%,100% { box-shadow:0 0 0 0 rgba(212,175,55,.35); }
  50%     { box-shadow:0 0 0 14px rgba(212,175,55,0); }
}
.replay-info { font-family:'Space Mono',monospace; font-size:.7rem; color:var(--muted); letter-spacing:.06em; text-align:center; }
.replay-info strong { color:var(--gold); }

.speed-row { display:flex; align-items:center; gap:.6rem; }
.speed-row label { font-family:'Space Mono',monospace; font-size:.65rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
.speed-toggle {
  display:flex; gap:.3rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.2rem;
}
.speed-btn {
  padding:.3rem .7rem; border-radius:4px; border:none; background:transparent;
  color:var(--muted); font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.06em;
  cursor:pointer; transition:all .15s;
}
.speed-btn.active { background:var(--gold); color:#0d0d0d; }

/* Input area */
.input-area { display:flex; flex-direction:column; align-items:center; gap:.65rem; width:100%; }
.dictation-input {
  width:100%; background:#0a0a0a; border:2px solid var(--border2); border-radius:8px;
  padding:.85rem 1.1rem; font-family:'DM Sans',sans-serif; font-size:1.05rem; color:var(--text);
  text-align:center; transition:border-color .2s;
}
.dictation-input:focus { outline:none; border-color:var(--gold); }
.dictation-input.ok  { border-color:var(--correct); }
.dictation-input.bad { border-color:var(--wrong); animation:shake .35s; }

.feedback { min-height:1.4rem; font-size:.85rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok   { color:var(--correct); }
.feedback.bad  { color:var(--wrong); }
.feedback.info { color:var(--gold); }

.action-row { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }

/* Category badge — shown during play to remind the student what's being tested */
.category-badge {
  display:inline-flex; align-items:center; gap:.4rem;
  background:var(--gold-dim); border:1px solid rgba(212,175,55,.3);
  border-radius:99px; padding:.3rem .9rem;
  font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.08em;
  text-transform:uppercase; color:var(--gold);
}

.rules-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; width:100%; font-size:.82rem; color:var(--muted); line-height:1.75; }
.rules-box strong { color:var(--text); }
.cs-term { color:var(--gold); text-decoration:underline; text-decoration-style:dotted; cursor:pointer; }
.cs-term:hover { color:var(--text); }

.bonus-pop { position:fixed; top:45%; left:50%; transform:translate(-50%,-50%); font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); pointer-events:none; z-index:99; animation:bpop .75s ease forwards; }
@keyframes bpop { 0%{opacity:1;transform:translate(-50%,-50%)} 100%{opacity:0;transform:translate(-50%,-120%)} }

/* End card */
.end-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; animation:fadeIn .4s ease; }
.end-score { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--gold); }
.end-stats  { display:flex; gap:.65rem; justify-content:center; flex-wrap:wrap; }
.end-stat   { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.45rem .8rem; text-align:center; }
.end-stat .v { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--gold); }
.end-stat .l { font-family:'Space Mono',monospace; font-size:.58rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }

.review-grid { display:flex; flex-direction:column; gap:.4rem; width:100%; max-height:38vh; overflow-y:auto; }
.review-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.55rem .9rem; text-align:left; cursor:pointer; transition:border-color .15s; }
.review-item:hover { border-color:var(--gold); }
.review-item.correct { border-left:3px solid var(--correct); }
.review-item.wrong   { border-left:3px solid var(--wrong); }
.review-item.skip    { border-left:3px solid rgba(255,255,255,.2); opacity:.7; }
.rv-correct-word { font-family:'Playfair Display',serif; font-weight:700; color:var(--gold); font-size:.92rem; }
.rv-your-answer  { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); margin-top:.15rem; }
.rv-your-answer.wrong-answer { color:var(--wrong); text-decoration:line-through; }
.rv-tag { font-family:'Space Mono',monospace; font-size:.6rem; text-transform:uppercase; letter-spacing:.08em; float:right; }
.rv-aspect-badge {
  display:inline-block; background:var(--gold-dim); border:1px solid rgba(212,175,55,.3);
  border-radius:99px; padding:.12rem .6rem; margin-bottom:.3rem;
  font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.06em;
  text-transform:uppercase; color:var(--gold);
}

.lb-section { width:100%; max-width:560px; padding:0 1rem 2.5rem; }

/* Gentle blink on inactive mode tabs to draw attention */
@keyframes modePulse { 0%,100% { opacity:1; } 50% { opacity:.55; } }
.diff-tab:not(.active) { animation: modePulse 2.8s ease-in-out infinite; }
.diff-tab:not(.active):hover { animation: none; opacity: 1; }

.voice-note { font-family:'Space Mono',monospace; font-size:.62rem; color:var(--muted2); text-align:center; letter-spacing:.04em; }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">🎧 Dictation Drill</span>
  <span></span>
</nav>

<main>
  <!-- Start screen — shown before the player has chosen to begin -->
  <div id="startScreen" style="display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%">
    <div class="diff-tabs">
      <button class="diff-tab active" id="ddTabEasyPreview"      onclick="previewMode('easy')">Easy</button>
      <button class="diff-tab"        id="ddTabMediumPreview"    onclick="previewMode('medium')">Medium</button>
      <button class="diff-tab"        id="ddTabConnectedPreview" onclick="previewMode('connected')">Hard</button>
      <button class="diff-tab"        id="ddTabExpertPreview"    onclick="previewMode('expert')">Expert</button>
    </div>
    <div class="rules-box" id="rulesBoxPreview">
      <span id="rulesTextPreview"></span>
    </div>
    <button class="btn-primary" style="font-size:1rem;padding:.7rem 2.5rem" onclick="beginGame()">Start playing →</button>
  </div>

  <!-- Mode tabs — always visible during play -->
  <div id="modeTabsBar" style="display:none;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:.5rem">
    <div class="diff-tabs">
      <button class="diff-tab active" id="ddTabEasy"      onclick="switchMode('easy')">Easy</button>
      <button class="diff-tab"        id="ddTabMedium"    onclick="switchMode('medium')">Medium</button>
      <button class="diff-tab"        id="ddTabConnected" onclick="switchMode('connected')">Hard</button>
      <button class="diff-tab"        id="ddTabExpert"    onclick="switchMode('expert')">Expert</button>
    </div>
    <div class="eyebrow" id="ddModeLabel">Minimal pairs &amp; common words</div>
  </div>

  <!-- Rules — updates per mode -->
  <div class="rules-box" id="rulesBox" style="display:none">
    <span id="rulesText"></span>
  </div>

  <!-- Game UI -->
  <div id="gameUI" style="display:none;flex-direction:column;align-items:center;gap:.9rem;width:100%">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
      <div class="stat-box"><div class="val" id="roundVal">1 / 10</div><div class="lbl">Item</div></div>
      <div class="stat-box"><div class="val" id="streakVal">0</div><div class="lbl">Streak</div></div>
    </div>

    <!-- Timer bar -->
    <div class="timer-wrap">
      <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
      <div class="timer-label">
        <span>Time</span>
        <span class="timer-sec" id="timerSec">20s</span>
        <span id="timerBonus" style="color:var(--correct);opacity:0;transition:opacity .3s"></span>
      </div>
    </div>

    <div class="category-badge" id="categoryBadge">Minimal pair</div>

    <!-- Audio panel -->
    <div class="audio-panel">
      <button class="play-btn" id="playBtn" onclick="playCurrent()" title="Play">▶</button>
      <div class="replay-info">Replays left: <strong id="replaysLeft">2</strong></div>
      <div class="speed-row" id="speedRow">
        <label>Speed</label>
        <div class="speed-toggle">
          <button class="speed-btn active" id="speedNormal" onclick="setSpeed('normal')">Normal</button>
          <button class="speed-btn"        id="speedSlow"   onclick="setSpeed('slow')">Slower</button>
        </div>
      </div>
      <div class="voice-note" id="voiceNote"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input class="dictation-input" id="dictationInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Type what you hear…" />
      <div class="action-row">
        <button class="btn-primary" onclick="submitAnswer()">Check ✓</button>
        <button class="btn-ghost"   onclick="useHint()">💡 Hint (<span id="hintsLeft">1</span>)</button>
        <button class="btn-ghost"   onclick="skipItem()">⏭ Skip (<span id="skipsLeft">3</span>)</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <!-- End card -->
  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow" id="endReason">Round complete!</div>
    <div class="end-score" id="endScore"></div>
    <div class="end-stats">
      <div class="end-stat"><div class="v" id="endCorrect"></div><div class="l">Correct</div></div>
      <div class="end-stat"><div class="v" id="endStreak"></div><div class="l">Best streak</div></div>
      <div class="end-stat"><div class="v" id="endFirstTry"></div><div class="l">First listen</div></div>
    </div>
    <p style="color:var(--muted);font-size:.9rem" id="endMsg"></p>

    <div class="review-grid" id="reviewGrid"></div>

    <div id="submitArea" style="width:100%">
      <div class="submit-row">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center">
      <button class="btn-ghost" onclick="restartRound()">Play again</button>
      <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
    </div>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <div class="diff-tabs" style="margin-bottom:.75rem">
      <button class="diff-tab active" id="lbTabEasy"      onclick="switchLb('easy')">Easy</button>
      <button class="diff-tab"        id="lbTabMedium"    onclick="switchLb('medium')">Medium</button>
      <button class="diff-tab"        id="lbTabConnected" onclick="switchLb('connected')">Hard</button>
      <button class="diff-tab"        id="lbTabExpert"    onclick="switchLb('expert')">Expert</button>
    </div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>

// Glossary for the connected-speech feature names shown in the Hard mode
// rules text and on each review-grid item's aspect badge — tapping a term
// opens a brief explanation with examples, sourced from the same material
// the phrase bank itself was built from.
const CS_GLOSSARY = {
  weak_form: {
    label: 'Weak forms',
    explanation: 'Small grammatical words — conjunctions, pronouns, prepositions, auxiliaries and articles — lose their full vowel sound and shrink to a quick, unstressed "uh" sound (or disappear almost entirely) in natural speech. English fits its stressed words into a steady rhythm, so the unstressed little words get squeezed.',
    examples: ['"Fish and chips" sounds like "fish n chips."', '"A cup of tea" sounds like "a cup uv tea."'],
  },
  assimilation: {
    label: 'Assimilation',
    explanation: 'When one word ends in a consonant sound and the next begins with a different one, the first sound often changes to become more like the second, so the two are easier to say together. This very commonly happens with /t/ or /d/ followed by /j/ ("you"), which blend into a "ch" or "j" sound.',
    examples: ['"Don\'t you think so?" sounds like "donchu think so?"', '"In Bath" sounds like "im Bath" — the /n/ shifts to /m/ before the /b/.'],
  },
  elision: {
    label: 'Elision',
    explanation: 'A sound — usually a /t/ or /d/ — disappears completely when it sits between two other consonant sounds, because it would otherwise be very awkward to pronounce. The word isn\'t shortened in writing, just in how it\'s actually said.',
    examples: ['"Next door" sounds like "nexdoor."', '"Most common" sounds like "moscommon."'],
  },
  gemination: {
    label: 'Gemination',
    explanation: 'When one word ends with the same consonant sound that begins the next word, speakers usually merge the two into a single, slightly longer sound rather than pronouncing it twice.',
    examples: ['"Social life" sounds like "socialife."', '"Some more" sounds like "somore."'],
  },
  catenation: {
    label: 'Catenation (linking)',
    explanation: 'When a word ending in a consonant sound is followed by a word starting with a vowel sound, the consonant "moves across" and attaches to the next word, so the boundary between the two words becomes much harder to hear.',
    examples: ['"Pick it up" sounds like "pi ki tup."', '"This afternoon" sounds like "thi safternoon."'],
  },
  intrusion: {
    label: 'Intrusion',
    explanation: 'When one word ends in a vowel sound and the next also begins with a vowel sound, speakers often insert a tiny extra consonant sound — /r/, /w/ or /y/ — to bridge the gap smoothly, even though that sound isn\'t written anywhere.',
    examples: ['"Law and order" sounds like "law rand order."', '"Do it" sounds like "do wit."'],
  },
};

function showCsTerm(key) {
  const term = CS_GLOSSARY[key];
  if (!term) return;
  showLocalDefModal(term.label, term.explanation, term.examples.join('\n'), 'connected speech feature');
}

const ROUND_SIZE = 10;

// ── State ─────────────────────────────────────────────────────────────
let mode = 'easy';
let roundItems = [], current = 0, score = 0, streak = 0, bestStreak = 0;
let correctCount = 0, firstTryCount = 0, results = [];
let replaysLeft = 2, hintsLeft = 1, skipsLeft = 3, hintUsed = false;
let usedReplayThisItem = false;
let timeLeft = 20, timerInterval = null;
let speechRate = 1.0;
let roundEnded = false;

// ── Voice selection — prefer the best-quality British female voice ────
// Different platforms expose very different voice lists. The previous
// version picked the FIRST en-GB match it found, which on some devices
// is actually the lowest-quality robotic default voice, even when a
// much better one (marked "Enhanced"/"Premium"/"Natural") is available
// on the same device. This version scores every voice and picks the
// best-ranked one instead of just the first match.
let chosenVoice = null;

function scoreVoice(v) {
  let score = 0;
  const name = v.name || '';
  const lang = v.lang || '';

  // Language match matters most
  if (/en-GB|en_GB/i.test(lang)) score += 100;
  else if (/^en/i.test(lang)) score += 40;
  else return -1; // not English at all — never usable here

  // Quality signals — these suffixes/words reliably indicate a much
  // better voice engine on the platforms that use them.
  if (/enhanced|premium|neural|natural|wavenet|studio/i.test(name)) score += 50;
  // Known good named voices (iOS: Kate/Serena/Stephanie are usually the
  // higher-quality British options; Android: "Google UK English Female"
  // is the standard decent default where no Enhanced voice exists).
  if (/\b(kate|serena|stephanie|martha)\b/i.test(name)) score += 30;
  if (/google uk english female/i.test(name)) score += 20;
  // Generic "female" naming as a weaker positive signal
  if (/female|woman|amy|joanna|salli|kimberly|susan|hazel|libby|emma|fiona|moira|tessa|samantha|victoria|allison|ava|zira|catherine|olivia|sonia|martha/i.test(name)) score += 15;
  // Explicit "male" should never outrank an unspecified voice when we
  // want a female voice specifically — only used as a tie-breaker
  // penalty, since some platforms don't label gender at all.
  if (/\bmale\b/i.test(name) && !/female/i.test(name)) score -= 25;
  // Some platforms expose very low-quality "compact" or legacy voices
  if (/compact|legacy/i.test(name)) score -= 20;

  return score;
}

function pickVoice() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  const scored = voices
    .map(v => ({ v, s: scoreVoice(v) }))
    .filter(x => x.s >= 0)
    .sort((a, b) => b.s - a.s);
  return scored.length ? scored[0].v : voices[0];
}

function initVoice() {
  chosenVoice = pickVoice();
  const note = document.getElementById('voiceNote');
  if (note) {
    note.textContent = chosenVoice ? `Voice: ${chosenVoice.name}` : 'Loading voice…';
  }
}

if ('speechSynthesis' in window) {
  initVoice();
  // Voice lists load asynchronously on most browsers
  speechSynthesis.onvoiceschanged = initVoice;
} else {
  document.getElementById('voiceNote').textContent = 'Speech not supported in this browser.';
}

// ── Speak helper ───────────────────────────────────────────────────────
function speak(text, rate, onEnd) {
  if (!('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel(); // stop any overlapping utterance
  const utter = new SpeechSynthesisUtterance(text);
  if (chosenVoice) {
    utter.voice = chosenVoice;
    utter.lang = chosenVoice.lang || 'en-GB';
  } else {
    utter.lang = 'en-GB';
  }
  utter.rate = rate || 1.0;
  utter.pitch = 1.0;
  const btn = document.getElementById('playBtn');
  btn.classList.add('speaking');
  utter.onend = () => { btn.classList.remove('speaking'); if (onEnd) onEnd(); };
  utter.onerror = () => { btn.classList.remove('speaking'); if (onEnd) onEnd(); };
  speechSynthesis.speak(utter);
}

// ── Round setup ──────────────────────────────────────────────────────
function restartRound() {
  roundEnded = false;
  const cfg = MODES[mode];
  const indices = freshRandomIndices('dictationdrill_' + mode, cfg.bank, Math.min(ROUND_SIZE, cfg.bank.length));
  indices.forEach(i => markSeen('dictationdrill_' + mode, i));
  roundItems = indices.map(i => cfg.bank[i]);

  current = 0; score = 0; streak = 0; bestStreak = 0;
  correctCount = 0; firstTryCount = 0; results = [];
  skipsLeft = 3; hintsLeft = 1;

  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('streakVal').textContent = 0;
  document.getElementById('skipsLeft').textContent = skipsLeft;
  document.getElementById('hintsLeft').textContent = hintsLeft;
  document.getElementById('endCard').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';

  loadItem();
}

function loadItem() {
  if (current >= roundItems.length) { endRound(); return; }
  const cfg = MODES[mode];
  document.getElementById('roundVal').textContent = `${current + 1} / ${roundItems.length}`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  const input = document.getElementById('dictationInput');
  input.value = ''; input.className = 'dictation-input';
  input.disabled = true; // can't type while the first playback is still running

  replaysLeft = cfg.replays;
  usedReplayThisItem = false;
  hintUsed = false;
  document.getElementById('replaysLeft').textContent = replaysLeft;

  // Show a clear "listening" state and hold the timer at full until the
  // first playback genuinely finishes — previously the countdown ran
  // concurrently with the audio itself, silently eating into the time
  // students had left to type their answer.
  showFeedback('🔊 Listen…', 'info');
  pauseTimerDisplay(cfg.time);
  playCurrent(true, () => {
    input.disabled = false;
    input.focus();
    showFeedback('', '');
    startTimer(cfg.time);
  });
}

function getCurrentSpoken() {
  if (current >= roundItems.length) return null;
  const item = roundItems[current];
  if (typeof item === 'string') return item;
  return item.spoken;
}
function getCurrentCorrect() {
  if (current >= roundItems.length) return null;
  const item = roundItems[current];
  if (typeof item === 'string') return item;
  return item.correct;
}
function getCurrentAspect() {
  if (current >= roundItems.length) return null;
  const item = roundItems[current];
  if (typeof item === 'string') return null;
  return item.aspect || null;
}

function playCurrent(isAutoPlay, onDone) {
  if (roundEnded || current >= roundItems.length) return;
  if (!isAutoPlay) {
    if (replaysLeft <= 0) { showFeedback('No replays left for this item!', 'bad'); return; }
    replaysLeft--;
    usedReplayThisItem = true;
    document.getElementById('replaysLeft').textContent = replaysLeft;
    // Pause the visible countdown while this replay plays, then resume
    // it afterward — replaying the audio should never silently cost the
    // student typing time.
    pauseTimerForReplay();
    speak(getCurrentSpoken(), speechRate, () => {
      resumeTimerAfterReplay();
      if (onDone) onDone();
    });
    return;
  }
  speak(getCurrentSpoken(), speechRate, onDone);
}

// ── Timer ─────────────────────────────────────────────────────────────
function startTimer(seconds) {
  clearInterval(timerInterval);
  timeLeft = seconds;
  updateTimerUI(seconds);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI(MODES[mode].time);
    if (timeLeft <= 0) { clearInterval(timerInterval); timeOut(); }
  }, 1000);
}
// Shows the timer bar at full, with no countdown running yet — used while
// the very first playback of an item is still being heard, before typing
// time has actually begun.
function pauseTimerDisplay(seconds) {
  clearInterval(timerInterval);
  timeLeft = seconds;
  updateTimerUI(seconds);
}
// Freezes an already-running timer (used when the student taps replay),
// remembering exactly how much time was left so it can resume from the
// same point rather than restarting the full countdown.
let _timeLeftBeforeReplay = null;
function pauseTimerForReplay() {
  clearInterval(timerInterval);
  _timeLeftBeforeReplay = timeLeft;
}
function resumeTimerAfterReplay() {
  if (_timeLeftBeforeReplay === null) return;
  timeLeft = _timeLeftBeforeReplay;
  _timeLeftBeforeReplay = null;
  updateTimerUI(MODES[mode].time);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI(MODES[mode].time);
    if (timeLeft <= 0) { clearInterval(timerInterval); timeOut(); }
  }, 1000);
}
function updateTimerUI(total) {
  const pct = Math.max(0, (timeLeft / total) * 100);
  const fill = document.getElementById('timerFill');
  const sec  = document.getElementById('timerSec');
  fill.style.width = pct + '%';
  sec.textContent = Math.max(0, timeLeft) + 's';
  const urgent = timeLeft <= 5;
  fill.classList.toggle('urgent', urgent);
  sec.classList.toggle('urgent', urgent);
}
function timeOut() {
  if (roundEnded) return;
  const correct = getCurrentCorrect();
  const aspect = getCurrentAspect();
  results.push({ correct, yours: '', status: 'skip', aspect });
  streak = 0;
  document.getElementById('streakVal').textContent = 0;
  showFeedback(`Time's up! Answer: "${correct}"`, 'bad');
  advanceItem(1100);
}

// ── Answer checking ───────────────────────────────────────────────────
// Words (easy/medium): direct case-insensitive comparison.
// Phrases/sentences (connected/expert): normalise whitespace and outer
// punctuation, compare case-insensitively, but otherwise require an exact
// match — the whole point of these levels is precise transcription.
function normaliseForCompare(s) {
  return s.trim().toLowerCase()
    .replace(/\s+/g, ' ')
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/\.+$/, ''); // a missing/extra trailing full stop shouldn't count against the student
}
function checkAnswer(typed, correct) {
  return normaliseForCompare(typed) === normaliseForCompare(correct);
}

function submitAnswer() {
  if (roundEnded || current >= roundItems.length) return;
  const input = document.getElementById('dictationInput');
  const typed = input.value.trim();
  if (!typed) return;
  const correct = getCurrentCorrect();
  const isCorrect = checkAnswer(typed, correct);
  const firstListen = !usedReplayThisItem && !hintUsed;

  if (isCorrect) {
    clearInterval(timerInterval);
    input.classList.add('ok');
    streak++; correctCount++;
    if (streak > bestStreak) bestStreak = streak;
    if (firstListen) firstTryCount++;
    const base = MODES[mode].type === 'word' ? 15 : 35;
    const bonus = firstListen ? Math.floor(base * 0.5) : 0;
    const timeBonus = Math.floor(timeLeft / 5);
    const pts = base + bonus + timeBonus;
    score += pts;
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('streakVal').textContent = streak;
    results.push({ correct, yours: typed, status: 'correct', pts, aspect: getCurrentAspect() });
    showFeedback(`✓ Correct! +${pts} pts${firstListen ? ' (first listen bonus!)' : ''}`, 'ok');
    advanceItem(700);
  } else {
    input.classList.add('bad');
    streak = 0;
    document.getElementById('streakVal').textContent = 0;
    showFeedback('Not quite — listen again and try once more.', 'bad');
    setTimeout(() => { input.classList.remove('bad'); input.value = ''; input.focus(); }, 500);
  }
}

function useHint() {
  if (roundEnded || current >= roundItems.length) return;
  if (hintsLeft <= 0) { showFeedback('No hints left!', 'bad'); return; }
  hintsLeft--; hintUsed = true;
  document.getElementById('hintsLeft').textContent = hintsLeft;
  const correct = getCurrentCorrect();
  const firstWord = correct.split(' ')[0];
  showFeedback(`Hint: starts with "${firstWord[0].toUpperCase()}${firstWord.slice(1,3)}…" (−5 pts on this item)`, 'info');
  score = Math.max(0, score - 5);
  document.getElementById('scoreVal').textContent = score;
}

function skipItem() {
  if (roundEnded || current >= roundItems.length) return;
  if (skipsLeft <= 0) { showFeedback('No skips left!', 'bad'); return; }
  skipsLeft--;
  document.getElementById('skipsLeft').textContent = skipsLeft;
  clearInterval(timerInterval);
  score = Math.max(0, score - 8);
  document.getElementById('scoreVal').textContent = score;
  streak = 0;
  document.getElementById('streakVal').textContent = 0;
  const correct = getCurrentCorrect();
  results.push({ correct, yours: '', status: 'skip', aspect: getCurrentAspect() });
  showFeedback(`Skipped. Answer: "${correct}"`, 'info');
  advanceItem(900);
}

function advanceItem(delay) {
  current++;
  setTimeout(loadItem, delay);
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg; el.className = 'feedback ' + type;
}

// ── End of round ───────────────────────────────────────────────────────
function endRound() {
  roundEnded = true;
  clearInterval(timerInterval);
  document.getElementById('gameUI').style.display = 'none';
  document.getElementById('endCard').style.display = 'flex';
  document.getElementById('endScore').textContent = score + ' pts';
  document.getElementById('endCorrect').textContent = correctCount + ' / ' + roundItems.length;
  document.getElementById('endStreak').textContent = bestStreak;
  document.getElementById('endFirstTry').textContent = firstTryCount;
  document.getElementById('endCard').dataset.score = score;

  // Reset the submit form — prevents a stale "Score submitted!" message
  // from a previous round/mode persisting falsely into this one.
  const submitAreaEl = document.getElementById('submitArea');
  if (submitAreaEl) {
    submitAreaEl.innerHTML = `
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" type="button" onclick="doSubmit()">Add to leaderboard</button>
      </div>`;
  }

  const ratio = correctCount / roundItems.length;
  document.getElementById('endMsg').textContent =
    ratio === 1 ? '🎉 Perfect listening — every single item correct!' :
    ratio >= 0.8 ? '👏 Excellent ear — almost a clean sweep!' :
    ratio >= 0.5 ? 'Good progress — your ear is adjusting. Keep practising!' :
    'Listening takes time — try slowing down the audio on easier modes.';

  const grid = document.getElementById('reviewGrid');
  grid.innerHTML = '';
  results.forEach(r => {
    const el = document.createElement('div');
    el.className = 'review-item ' + r.status;
    const tag = r.status === 'correct' ? '✓ correct' : r.status === 'skip' ? 'skipped' : 'wrong';
    const yoursHtml = r.yours
      ? `<div class="rv-your-answer ${r.status !== 'correct' ? 'wrong-answer' : ''}">You typed: "${escHtml(r.yours)}"</div>`
      : '';
    const aspectHtml = r.aspect
      ? `<div class="rv-aspect-badge">${escHtml(r.aspect)}</div>`
      : '';
    el.innerHTML = `<span class="rv-tag">${tag}</span>${aspectHtml}<div class="rv-correct-word">${escHtml(r.correct)}</div>${yoursHtml}`;
    el.addEventListener('click', () => speak(r.correct, 1.0));
    grid.appendChild(el);
  });

  switchLb(mode);
}

async function doSubmit() {
  await handleScoreSubmit('dictationdrill_' + mode, parseInt(document.getElementById('endCard').dataset.score || '0'), 'nameInput', 'submitArea', 'lbBody');
}

// ── Enter key submits ───────────────────────────────────────────────
document.getElementById('dictationInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

// ── Boot ──────────────────────────────────────────────────────────────
previewMode('easy');
switchLb('easy'); // render the leaderboard immediately on page load
</script>
</body>
</html>
