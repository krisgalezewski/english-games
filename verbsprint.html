<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Irregular Verb Sprint — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:580px; margin:0 auto; padding:1.25rem 1rem 2.5rem; display:flex; flex-direction:column; align-items:center; gap:1rem; box-sizing:border-box; }

/* ── Mobile layout fixes ──────────────────────────────────────────
   On narrow phones (≤480px) the verb card's side padding and the
   input row's fixed-width label were leaving almost no room for the
   actual input field, and content was sitting right at the screen
   edge. These rules tighten spacing and let the label wrap above
   its input instead of squeezing it sideways. */
@media (max-width: 480px) {
  main { padding:1rem .65rem 2rem; }
  .verb-card { padding:1.1rem 1rem; border-radius:12px; }
  .input-row { flex-direction:column; align-items:stretch; gap:.3rem; }
  .input-label { min-width:0; }
  .verb-input { width:100%; font-size:1.2rem; padding:.65rem .8rem; }
  .sentence-display { font-size:1rem; padding:.25rem 0; }
  .sentence-display .blank { min-width:60px; }
  .end-card { padding:1.25rem 1rem; }
  .review-grid { max-width:100%; }
}

/* Timer */
.timer-wrap { width:100%; }
.timer-track { width:100%; height:6px; background:var(--border2); border-radius:99px; overflow:hidden; }
.timer-fill  { height:100%; background:var(--gold); border-radius:99px; transition:width .5s linear, background .4s; }
.timer-fill.urgent { background:var(--wrong); }
.timer-row   { display:flex; justify-content:space-between; margin-top:.3rem; }
.timer-row span { font-family:'Space Mono',monospace; font-size:.65rem; color:var(--muted); }
.timer-val   { color:var(--gold) !important; font-weight:700; }
.timer-val.urgent { color:var(--wrong) !important; }

/* HUD pills */
.hud { display:flex; gap:.5rem; width:100%; flex-wrap:wrap; }
.hud-pill { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.4rem .9rem; text-align:center; flex:1; min-width:64px; }
.hud-pill .val { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; color:var(--gold); }
.hud-pill .lbl { font-family:'Space Mono',monospace; font-size:.55rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

/* Round dots */
.dots { display:flex; gap:.35rem; justify-content:center; flex-wrap:wrap; }
.dot  { width:9px; height:9px; border-radius:50%; background:var(--border2); transition:background .3s; }
.dot.correct { background:var(--correct); }
.dot.partial { background:#b8860b; }
.dot.wrong   { background:var(--wrong); }
.dot.skip    { background:rgba(255,255,255,.2); }

/* Verb card */
.verb-card {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:1.5rem 1.75rem;
  display:flex; flex-direction:column; gap:1rem;
  animation:fadeIn .25s ease;
}
.verb-card.flash-correct { border-color:var(--correct); background:var(--correct-dim); }
.verb-card.flash-wrong   { border-color:var(--wrong);   background:var(--wrong-dim);   animation:shake .35s; }

/* Mode A: base form shown */
.base-verb {
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,8vw,3rem); font-weight:900;
  color:var(--gold); text-align:center; letter-spacing:.02em;
}
.base-verb .group-tag {
  display:block; font-family:'Space Mono',monospace;
  font-size:.6rem; color:var(--muted); letter-spacing:.14em;
  text-transform:uppercase; margin-top:.2rem; font-weight:400;
}

/* Mode B: sentence shown */
.sentence-display {
  font-size:1.1rem; line-height:1.75; color:var(--text);
  text-align:center; padding:.5rem 0;
}
.sentence-display .blank {
  display:inline-block;
  border-bottom:2px solid var(--gold);
  min-width:80px; color:var(--gold);
  font-family:'Space Mono',monospace;
  font-size:.9rem; letter-spacing:.08em;
  padding:0 .25rem; text-align:center;
  vertical-align:middle;
}
.form-hint {
  font-family:'Space Mono',monospace; font-size:.65rem;
  color:var(--muted); text-align:center; letter-spacing:.1em;
  text-transform:uppercase;
}

/* Input rows */
.input-grid { display:flex; flex-direction:column; gap:.6rem; width:100%; }
.input-row  { display:flex; gap:.5rem; align-items:center; }
.input-label {
  font-family:'Space Mono',monospace; font-size:.62rem;
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); min-width:110px; flex-shrink:0;
}
.verb-input {
  flex:1; background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:8px; padding:.55rem .9rem;
  font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700;
  color:var(--text); outline:none; transition:border-color .2s, background .2s;
  text-transform:uppercase; letter-spacing:.04em;
}
.verb-input:focus  { border-color:var(--gold); background:var(--gold-dim); }
.verb-input.ok     { border-color:var(--correct) !important; background:var(--correct-dim) !important; color:var(--correct); }
.verb-input.err    { border-color:var(--wrong)   !important; background:var(--wrong-dim)   !important; color:var(--wrong); }
.verb-input.readonly { opacity:.6; cursor:default; }
.reveal-text { font-family:'Space Mono',monospace; font-size:.7rem; color:var(--correct); display:none; }

/* Action row */
.action-row { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }

/* Feedback */
.feedback { min-height:1.3rem; font-size:.85rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok   { color:var(--correct); }
.feedback.bad  { color:var(--wrong); }
.feedback.info { color:var(--gold); }

/* End card */
.end-card {
  position:fixed; inset:0; z-index:200;
  background:rgba(13,13,13,.97); backdrop-filter:blur(8px);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:1rem; padding:2rem 1.5rem;
  overflow-y:auto; animation:fadeIn .4s ease;
}
.end-score { font-family:'Playfair Display',serif; font-size:3.2rem; font-weight:900; color:var(--gold); }
.review-grid  { display:flex; flex-direction:column; gap:.35rem; width:100%; max-width:460px; max-height:38vh; overflow-y:auto; }
.review-item  { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.45rem .9rem; display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:.5rem; align-items:center; font-size:.8rem; cursor:pointer; transition:border-color .15s; }
.review-item:hover { border-color:var(--gold); }
.review-item.correct { border-left:3px solid var(--correct); }
.review-item.partial { border-left:3px solid #b8860b; }
.review-item.wrong   { border-left:3px solid var(--wrong); }
.review-item.skip    { border-left:3px solid rgba(255,255,255,.2); opacity:.6; }
.rv-base { font-family:'Playfair Display',serif; font-weight:700; color:var(--gold); }
.rv-form { font-family:'Space Mono',monospace; font-size:.7rem; }
.rv-form.ok  { color:var(--correct); }
.rv-form.bad { color:var(--wrong); text-decoration:line-through; }
.rv-tag  { font-family:'Space Mono',monospace; font-size:.6rem; text-transform:uppercase; letter-spacing:.08em; }

.lb-section { width:100%; max-width:580px; padding:0 1rem 2.5rem; }

/* blink inactive tabs */
@keyframes modePulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.diff-tab:not(.active) { animation:modePulse 2.8s ease-in-out infinite; }
.diff-tab:not(.active):hover { animation:none; opacity:1; }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">⚡ Irregular Verb Sprint</span>
  <span></span>

<main>
  <!-- Difficulty tabs -->
  <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:.5rem">
    <div class="diff-tabs">
      <button class="diff-tab active" id="tabA" onclick="setMode('easy')">Easy</button>
      <button class="diff-tab"        id="tabB" onclick="setMode('medium')">Medium</button>
      <button class="diff-tab"        id="tabC" onclick="setMode('hard')">Hard</button>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-pill"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
    <div class="hud-pill"><div class="val" id="skipsVal">3</div><div class="lbl">Skips</div></div>
    <div class="hud-pill"><div class="val" id="hintVal">1</div><div class="lbl">Hint</div></div>
    <div class="hud-pill"><div class="val" id="streakVal">0</div><div class="lbl">Streak</div></div>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="timer-row"><span>Time</span><span class="timer-val" id="timerVal">90s</span></div>
  </div>

  <!-- Verb card -->
  <div class="verb-card" id="verbCard">
    <!-- Easy/Medium: base form -->
    <div id="baseView">
      <div class="base-verb" id="baseVerb">—<span class="group-tag" id="groupTag"></span></div>
    </div>
    <!-- Hard: sentence with blank -->
    <div id="sentenceView" style="display:none">
      <div class="sentence-display" id="sentenceDisplay"></div>
      <div class="form-hint" id="formHint"></div>
    </div>

    <!-- Input grid (changes based on mode) -->
    <div class="input-grid" id="inputGrid"></div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="btn-primary" id="submitBtn" onclick="submitAnswer()">Check ✓</button>
    <button class="btn-ghost"   id="hintBtn"   onclick="useHint()">💡 Hint</button>
    <button class="btn-ghost"   id="skipBtn"   onclick="skipVerb()">⏭ Skip (−5)</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <!-- End card -->
  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow" id="endTitle">Round complete</div>
    <div class="end-score" id="endScore">0 pts</div>
    <p style="color:var(--muted);font-size:.88rem;text-align:center;max-width:340px" id="endMsg"></p>
    <div class="review-grid" id="reviewGrid"></div>
    <div id="submitArea" style="width:100%;max-width:460px">
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Leaderboard</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center">
      <button class="btn-ghost" id="playAgainBtn" type="button" onclick="restartGame()">Play again</button>
      <button class="btn-ghost" id="switchModeBtn" type="button" onclick="setMode(currentMode==='easy'?'medium':currentMode==='medium'?'hard':'easy')">Switch mode</button>
      <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
    </div>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <div class="diff-tabs" style="margin-bottom:.75rem">
      <button class="diff-tab active" id="lbTabE" onclick="switchLb('easy')">Easy</button>
      <button class="diff-tab"        id="lbTabM" onclick="switchLb('medium')">Medium</button>
      <button class="diff-tab"        id="lbTabH" onclick="switchLb('hard')">Hard</button>
    </div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>

// ── Game state ─────────────────────────────────────────────────────
const ROUND_SIZE = 10;
const TIMES = { easy:90, medium:90, hard:100 };
let currentMode = 'easy';
let roundVerbs = [], current = 0, score = 0, skips = 3, hints = 1, streak = 0;
let timerInterval = null, timeLeft = 90;
let results = []; // {verb, psTyped, ppTyped, correct, partial, skipped}
let hintUsed = false;

// ── Mode switch ─────────────────────────────────────────────────────
function setMode(m) {
  currentMode = m;
  ['easy','medium','hard'].forEach(x => {
    document.getElementById('tab'+{easy:'A',medium:'B',hard:'C'}[x]).classList.toggle('active', x===m);
  });
  switchLb(m);
  restartGame();
}

function switchLb(m) {
  ['easy','medium','hard'].forEach(x => {
    const el = document.getElementById('lbTab'+{easy:'E',medium:'M',hard:'H'}[x]);
    if(el) el.classList.toggle('active', x===m);
  });
  renderLeaderboard('verbsprint_'+m, 'lbBody');
}

// ── Init round ──────────────────────────────────────────────────────
function initRound() {
  // Each mode uses its own seen-tracking key so verb pools are independent.
  // True per-play randomisation — different verbs every time, not just
  // once per calendar day.
  const modeKey = 'verbsprint_' + currentMode;
  const indices = freshRandomIndices(modeKey, VERBS, ROUND_SIZE);
  indices.forEach(i => markSeen(modeKey, i));
  roundVerbs = indices.map(i => VERBS[i]);

  current = 0; score = 0; skips = 3; hints = 1; streak = 0;
  hintUsed = false; results = [];

  document.getElementById('endCard').style.display = 'none';
  document.getElementById('scoreVal').textContent  = 0;
  document.getElementById('skipsVal').textContent  = 3;
  document.getElementById('hintVal').textContent   = 1;
  document.getElementById('streakVal').textContent = 0;
  buildDots();
  loadVerb();
  startTimer();
}

function buildDots() {
  const el = document.getElementById('dots'); el.innerHTML='';
  for(let i=0;i<ROUND_SIZE;i++){
    const d=document.createElement('div'); d.className='dot'; d.id='dot'+i;
    el.appendChild(d);
  }
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMES[currentMode];
  updateTimer();
  timerInterval = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0){clearInterval(timerInterval);timeOut();} },1000);
}

function updateTimer() {
  const pct = Math.max(0, timeLeft / TIMES[currentMode]);
  const fill = document.getElementById('timerFill');
  const val  = document.getElementById('timerVal');
  fill.style.width = (pct*100)+'%';
  val.textContent  = timeLeft+'s';
  const u = timeLeft <= 20;
  fill.classList.toggle('urgent', u);
  val.classList.toggle('urgent', u);
}

function timeOut() {
  // Auto-skip remaining
  if(current < ROUND_SIZE) {
    results.push({verb:roundVerbs[current], psTyped:'', ppTyped:'', correct:false, partial:false, skipped:true, timeOut:true});
    document.getElementById('dot'+current).className='dot skip';
    current++;
    if(current < ROUND_SIZE) { for(let i=current;i<ROUND_SIZE;i++){ results.push({verb:roundVerbs[i],psTyped:'',ppTyped:'',correct:false,partial:false,skipped:true,timeOut:true}); document.getElementById('dot'+i).className='dot skip'; } }
  }
  endRound();
}

// ── Load verb ───────────────────────────────────────────────────────
let currentSentenceIdx = 0;

function loadVerb() {
  if(current >= ROUND_SIZE){ clearInterval(timerInterval); endRound(); return; }
  const v = roundVerbs[current];
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className   = 'feedback';
  hintUsed = false;

  // Choose a sentence for hard mode
  currentSentenceIdx = Math.floor(Math.random() * v.s.length);

  if(currentMode === 'hard') {
    // Show sentence with blank
    document.getElementById('baseView').style.display     = 'none';
    document.getElementById('sentenceView').style.display = 'block';
    const s   = v.s[currentSentenceIdx];
    const ans = s.f === 'ps' ? v.ps : v.pp;
    const displayed = s.t.replace('.', '. ').replace(',', ', ').trim();
    // Show blank
    document.getElementById('sentenceDisplay').innerHTML =
      displayed.replace('___', '<span class="blank">___</span>');
    document.getElementById('formHint').textContent =
      'Infinitive: ' + v.b.toUpperCase();
    // Build single input
    const grid = document.getElementById('inputGrid');
    grid.innerHTML = `
      <div class="input-row">
        <span class="input-label">${s.f==='ps'?'Past simple':'Past participle'}</span>
        <input class="verb-input" id="inp0" autocomplete="off" autocorrect="off" spellcheck="false"
               placeholder="type here…" autofocus/>
      </div>`;
    document.getElementById('inp0').focus();
    // Handled by global keydown
  } else {
    // Easy / Medium: show base verb
    document.getElementById('baseView').style.display     = 'block';
    document.getElementById('sentenceView').style.display = 'none';
    document.getElementById('baseVerb').innerHTML =
      v.b.toUpperCase() + `<span class="group-tag">${v.g}</span>`;

    const grid = document.getElementById('inputGrid');
    if(currentMode === 'easy') {
      // Easy: type past simple only, PP shown
      grid.innerHTML = `
        <div class="input-row">
          <span class="input-label">Past simple</span>
          <input class="verb-input" id="inp0" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="…" autofocus/>
        </div>
        <div class="input-row">
          <span class="input-label">Past participle</span>
          <input class="verb-input readonly" id="inp1" value="${v.pp.toUpperCase()}" readonly/>
        </div>`;
    } else {
      // Medium: type both
      grid.innerHTML = `
        <div class="input-row">
          <span class="input-label">Past simple</span>
          <input class="verb-input" id="inp0" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="…" autofocus/>
        </div>
        <div class="input-row">
          <span class="input-label">Past participle</span>
          <input class="verb-input" id="inp1" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="…"/>
        </div>`;
      // Enter in PS → focus PP; Enter in PP → submit
      // Handled by global keydown
    }
    // Handled by global keydown
    document.getElementById('inp0').focus();
  }
}

// ── Submit ──────────────────────────────────────────────────────────
function submitAnswer() {
  const v    = roundVerbs[current];
  const inp0 = document.getElementById('inp0');
  const inp1 = document.getElementById('inp1');
  if(!inp0) return;

  if(currentMode === 'hard') {
    const s   = v.s[currentSentenceIdx];
    const ans = (s.f === 'ps' ? v.ps : v.pp).toLowerCase();
    const typed = inp0.value.trim().toLowerCase();
    if(!typed) return;

    // Accept both variant spellings (e.g. burnt/burned)
    const correct = checkAnswer(typed, ans);
    if(correct) {
      const pts = 20 + Math.floor(timeLeft/10)*2;
      score += pts; streak++;
      document.getElementById('scoreVal').textContent  = score;
      document.getElementById('streakVal').textContent = streak;
      inp0.classList.add('ok');
      document.getElementById('dot'+current).className='dot correct';
      results.push({verb:v, psTyped:typed, ppTyped:'', field:s.f, correct:true, partial:false, skipped:false, pts});
      showFeedback('✓ Correct! +'+pts+' pts', 'ok');
      advanceVerb(600);
    } else {
      inp0.classList.add('err');
      streak = 0;
      document.getElementById('streakVal').textContent = 0;
      results.push({verb:v, psTyped:typed, ppTyped:'', field:s.f, correct:false, partial:false, skipped:false, pts:0});
      document.getElementById('dot'+current).className='dot wrong';
      showFeedback('✗ Answer: '+ans.toUpperCase(), 'bad');
      advanceVerb(1200);
    }
  } else if(currentMode === 'easy') {
    const typed = inp0.value.trim().toLowerCase();
    if(!typed) return;
    const correct = checkAnswer(typed, v.ps);
    if(correct) {
      const pts = 15 + Math.floor(timeLeft/15)*2;
      score += pts; streak++;
      document.getElementById('scoreVal').textContent  = score;
      document.getElementById('streakVal').textContent = streak;
      inp0.classList.add('ok');
      document.getElementById('dot'+current).className='dot correct';
      results.push({verb:v, psTyped:typed, ppTyped:v.pp, field:'ps', correct:true, partial:false, skipped:false, pts});
      showFeedback('✓ +'+pts+' pts', 'ok');
      advanceVerb(600);
    } else {
      inp0.classList.add('err');
      streak = 0;
      document.getElementById('streakVal').textContent = 0;
      results.push({verb:v, psTyped:typed, ppTyped:v.pp, field:'ps', correct:false, partial:false, skipped:false, pts:0});
      document.getElementById('dot'+current).className='dot wrong';
      showFeedback('✗ Past simple: '+v.ps.toUpperCase(), 'bad');
      advanceVerb(1200);
    }
  } else {
    // Medium: both forms
    const t0 = inp0.value.trim().toLowerCase();
    const t1 = inp1 ? inp1.value.trim().toLowerCase() : '';
    if(!t0) { inp0.focus(); return; }
    if(!t1) { inp1.focus(); return; }

    const ps_ok = checkAnswer(t0, v.ps);
    const pp_ok = checkAnswer(t1, v.pp);

    if(ps_ok && pp_ok) {
      const pts = 25 + Math.floor(timeLeft/12)*2;
      score += pts; streak++;
      document.getElementById('scoreVal').textContent  = score;
      document.getElementById('streakVal').textContent = streak;
      inp0.classList.add('ok'); inp1.classList.add('ok');
      document.getElementById('dot'+current).className='dot correct';
      results.push({verb:v, psTyped:t0, ppTyped:t1, field:'both', correct:true, partial:false, skipped:false, pts});
      showFeedback('✓ Both correct! +'+pts+' pts', 'ok');
      advanceVerb(600);
    } else if(ps_ok || pp_ok) {
      const pts = 8;
      score += pts; streak = 0;
      document.getElementById('scoreVal').textContent  = score;
      document.getElementById('streakVal').textContent = 0;
      if(ps_ok) { inp0.classList.add('ok'); inp1.classList.add('err'); }
      else       { inp0.classList.add('err'); inp1.classList.add('ok'); }
      document.getElementById('dot'+current).className='dot partial';
      results.push({verb:v, psTyped:t0, ppTyped:t1, field:'both', correct:false, partial:true, skipped:false, pts});
      showFeedback('~ One correct (+'+pts+') · '+v.b.toUpperCase()+' / '+v.ps.toUpperCase()+' / '+v.pp.toUpperCase(), 'info');
      advanceVerb(1500);
    } else {
      streak = 0;
      document.getElementById('scoreVal').textContent  = score;
      document.getElementById('streakVal').textContent = 0;
      inp0.classList.add('err'); inp1.classList.add('err');
      document.getElementById('dot'+current).className='dot wrong';
      results.push({verb:v, psTyped:t0, ppTyped:t1, field:'both', correct:false, partial:false, skipped:false, pts:0});
      showFeedback('✗ '+v.b.toUpperCase()+' / '+v.ps.toUpperCase()+' / '+v.pp.toUpperCase(), 'bad');
      advanceVerb(1500);
    }
  }
}

// Accept alternate spellings (e.g. burnt/burned, learnt/learned, dreamt/dreamed)
function checkAnswer(typed, correct) {
  const alternatives = { 'burnt':'burned','burned':'burnt','learnt':'learned','learned':'learnt',
    'dreamt':'dreamed','dreamed':'dreamt','spilt':'spilled','spilled':'spilt',
    'smelt':'smelled','smelled':'smelt','knelt':'kneeled','kneeled':'knelt',
    'was':'was','were':'were' };
  if(typed === correct.toLowerCase()) return true;
  // Handle was/were
  if(correct === 'was/were' && (typed==='was'||typed==='were')) return true;
  // Alternate spellings
  if(alternatives[typed] === correct.toLowerCase()) return true;
  return false;
}

function advanceVerb(delay) {
  setTimeout(()=>{ current++; loadVerb(); }, delay);
}

// ── Hint ────────────────────────────────────────────────────────────
function useHint() {
  if(hints <= 0){ showFeedback('No hints left!','bad'); return; }
  if(hintUsed) return;
  hints--; hintUsed = true;
  document.getElementById('hintVal').textContent = hints;
  const v = roundVerbs[current];

  if(currentMode === 'hard') {
    const s = v.s[currentSentenceIdx];
    const ans = s.f === 'ps' ? v.ps : v.pp;
    document.getElementById('inp0').value = ans[0].toUpperCase();
    showFeedback('Hint: first letter revealed (−3 pts)', 'info');
    score = Math.max(0, score-3);
    document.getElementById('scoreVal').textContent = score;
  } else {
    const inp0 = document.getElementById('inp0');
    if(inp0 && !inp0.classList.contains('ok')) {
      inp0.value = v.ps[0].toUpperCase();
    }
    if(currentMode==='medium') {
      const inp1 = document.getElementById('inp1');
      if(inp1 && !inp1.classList.contains('ok')) inp1.value = v.pp[0].toUpperCase();
    }
    showFeedback('Hint: first letter(s) revealed (−3 pts)', 'info');
    score = Math.max(0, score-3);
    document.getElementById('scoreVal').textContent = score;
  }
}

// ── Skip ────────────────────────────────────────────────────────────
function skipVerb() {
  if(skips <= 0){ showFeedback('No skips left!','bad'); return; }
  skips--;
  score = Math.max(0, score-5);
  document.getElementById('skipsVal').textContent  = skips;
  document.getElementById('scoreVal').textContent  = score;
  document.getElementById('dot'+current).className = 'dot skip';
  const v = roundVerbs[current];
  results.push({verb:v, psTyped:'', ppTyped:'', correct:false, partial:false, skipped:true, pts:0});
  streak = 0;
  document.getElementById('streakVal').textContent = 0;
  showFeedback('Skipped · '+v.b.toUpperCase()+' / '+v.ps.toUpperCase()+' / '+v.pp.toUpperCase(), 'info');
  advanceVerb(800);
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg; el.className = 'feedback '+type;
}

// ── End round ───────────────────────────────────────────────────────
function endRound() {
  clearInterval(timerInterval);
  document.getElementById('endCard').style.display = 'flex';
  document.getElementById('endScore').textContent  = score+' pts';

  // Reset the submit form — prevents a stale "Score submitted!" message
  // from a previous round persisting into this one.
  const submitAreaEl = document.getElementById('submitArea');
  if (submitAreaEl) {
    submitAreaEl.innerHTML = `
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" type="button" onclick="doSubmit()">Leaderboard</button>
      </div>`;
  }

  const perfect  = results.filter(r=>r.correct).length;
  const partial  = results.filter(r=>r.partial).length;
  const msg =
    perfect>=9 ? '🎉 Outstanding! You really know your irregular verbs.' :
    perfect>=7 ? '👏 Excellent work! Just a few to keep practising.' :
    perfect>=5 ? 'Good effort — focus on the tricky A/B/C group.' :
                 'Keep drilling — irregular verbs reward regular practice!';
  document.getElementById('endTitle').textContent = `${perfect}/${ROUND_SIZE} correct`;
  document.getElementById('endMsg').textContent   = msg;
  document.getElementById('endCard').dataset.score = score;

  // Build review grid
  const grid = document.getElementById('reviewGrid'); grid.innerHTML='';
  results.forEach(r => {
    const el = document.createElement('div');
    const cls = r.correct?'correct':r.partial?'partial':r.skipped?'skip':'wrong';
    el.className = 'review-item '+cls;

    // Determine pass/fail for each form based on which field(s) were actually tested.
    // - field:'ps'   (easy mode)   → only past simple was tested; PP is shown but not graded
    // - field:'pp'   (hard mode, PP sentence) → only past participle was tested
    // - field:'ps' from hard mode PS sentence → only past simple was tested
    // - field:'both' (medium mode) → both forms were independently typed and graded
    // - skipped/time-out → both forms shown in red (nothing was answered correctly)
    let psOk, ppOk;
    if (r.skipped) {
      psOk = false; ppOk = false;
    } else if (r.field === 'both') {
      psOk = checkAnswer((r.psTyped||'').toLowerCase(), r.verb.ps);
      ppOk = checkAnswer((r.ppTyped||'').toLowerCase(), r.verb.pp);
    } else if (r.field === 'pp') {
      // Hard mode, past participle was the tested form
      ppOk = checkAnswer((r.psTyped||'').toLowerCase(), r.verb.pp); // typed value stored in psTyped slot
      psOk = true; // past simple wasn't tested — don't mark it wrong
    } else {
      // field === 'ps' (easy mode, or hard mode testing past simple)
      psOk = checkAnswer((r.psTyped||'').toLowerCase(), r.verb.ps);
      ppOk = true; // past participle wasn't tested — don't mark it wrong
    }

    el.innerHTML = `
      <span class="rv-base">${r.verb.b.toUpperCase()}</span>
      <span class="rv-form ${psOk?'ok':'bad'}">${r.verb.ps.toUpperCase()}</span>
      <span class="rv-form ${ppOk?'ok':'bad'}">${r.verb.pp.toUpperCase()}</span>
      <span class="rv-tag">${r.correct?'✓':r.partial?'~':r.skipped?'skip':'✗'}</span>`;
    // Clickable — shows example sentences for this verb (no definition modal)
    el.addEventListener('click',()=>{
      const exs = r.verb.s.map(s=>{
        const ans = s.f==='ps' ? r.verb.ps : r.verb.pp;
        return s.t.replace('___', ans.toUpperCase());
      }).join('\n\n');
      // Use phrasal modal to show the triplet + sentences
      showPhrasalModal(
        r.verb.b.toUpperCase() + ' / ' + r.verb.ps.toUpperCase() + ' / ' + r.verb.pp.toUpperCase(),
        'Group: ' + r.verb.g,
        exs
      );
    });
    grid.appendChild(el);
  });

  renderLeaderboard('verbsprint_'+currentMode, 'lbBody');
}

function restartGame() { document.getElementById('endCard').style.display='none'; initRound(); }
async function doSubmit(){
  await handleScoreSubmit('verbsprint_'+currentMode, parseInt(document.getElementById('endCard').dataset.score||'0'), 'nameInput', 'submitArea', 'lbBody');
}

// ── Global keyboard handler (single listener, no accumulation) ───────
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  const inp0 = document.getElementById('inp0');
  const inp1 = document.getElementById('inp1');
  if(!inp0 || document.activeElement !== inp0 && document.activeElement !== inp1) return;
  e.preventDefault();
  if(currentMode === 'easy' && document.activeElement === inp0){
    submitAnswer();
  } else if(currentMode === 'medium'){
    if(document.activeElement === inp0){ if(inp1) inp1.focus(); }
    else { submitAnswer(); }
  } else if(currentMode === 'hard' && document.activeElement === inp0){
    submitAnswer();
  }
});

// ── Defensive event delegation fallback for end-card buttons ─────────
// Guarantees Play Again / Switch Mode always work even in edge cases
// where inline onclick might not fire (e.g. focus-trap, stray overlay).
document.getElementById('endCard').addEventListener('click', (e) => {
  if(e.target.id === 'playAgainBtn' || e.target.closest('#playAgainBtn')){
    restartGame();
  }
  if(e.target.id === 'switchModeBtn' || e.target.closest('#switchModeBtn')){
    setMode(currentMode==='easy'?'medium':currentMode==='medium'?'hard':'easy');
  }
});

// ── Boot ────────────────────────────────────────────────────────────
switchLb('easy');
initRound();
</script>
