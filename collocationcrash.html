<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CollocationCrash — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<style>
main { max-width:560px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }

.top-bar { display:flex; align-items:center; justify-content:space-between; width:100%; flex-wrap:wrap; gap:.5rem; }
.progress-wrap { flex:1; height:4px; background:var(--border2); border-radius:99px; overflow:hidden; min-width:80px; }
.progress-fill { height:100%; background:var(--gold); border-radius:99px; transition:width .4s; }
.q-counter { font-family:'Space Mono',monospace; font-size:.7rem; letter-spacing:.08em; color:var(--muted); }

.q-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; display:flex; flex-direction:column; align-items:center; gap:1.25rem; }
.q-instruction { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
.q-noun { font-family:'Playfair Display',serif; font-size:2.4rem; font-weight:900; text-align:center; color:var(--text); }
.q-pattern { font-size:.88rem; color:var(--muted); font-style:italic; }

.opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; width:100%; }
.opt-btn {
  background:#0a0a0a; border:2px solid var(--border2); border-radius:6px;
  padding:.9rem .75rem; font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700;
  color:var(--text); cursor:pointer; transition:all .18s; text-align:center;
}
.opt-btn:hover:not(:disabled) { border-color:var(--gold); background:var(--gold-glow); }
.opt-btn.correct  { border-color:var(--correct); background:var(--correct-dim); color:var(--correct); }
.opt-btn.wrong    { border-color:var(--wrong);   background:var(--wrong-dim);   color:var(--wrong); animation:shake .35s; }
.opt-btn.reveal   { border-color:var(--correct); background:rgba(76,175,130,0.08); }
.opt-btn:disabled { cursor:default; }

.explanation { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.85rem 1rem; font-size:.84rem; color:var(--muted); line-height:1.6; width:100%; display:none; }
.explanation.show { display:block; animation:fadeIn .3s ease; }

.feedback { min-height:1.4rem; font-size:.88rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok  { color:var(--correct); }
.feedback.bad { color:var(--wrong); }

/* end */
.end-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; animation:fadeIn .4s ease; }
.final-score { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--gold); }
.review-grid { display:flex; flex-direction:column; gap:.4rem; width:100%; margin-top:.5rem; }
.review-item { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.5rem .9rem; font-size:.85rem; cursor:pointer; transition:border-color .15s; }
.review-item:hover { border-color:var(--gold); }
.review-noun { font-family:'Playfair Display',serif; font-weight:700; color:var(--text); }
.review-answer { font-size:.75rem; font-family:'Space Mono',monospace; }
.review-answer.ok  { color:var(--correct); }
.review-answer.bad { color:var(--wrong); }

.lb-section { width:100%; max-width:560px; padding:0 1rem 2.5rem; }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">💥 CollocationCrash</span>
  <span></span>
</nav>

<main>
  <div class="top-bar">
    <div class="diff-tabs">
      <button class="diff-tab active" id="tabE" onclick="setDiff('easy')">Easy</button>
      <button class="diff-tab"        id="tabH" onclick="setDiff('hard')">Hard</button>
    </div>
    <div style="display:flex;align-items:center;gap:.6rem;flex:1;margin-left:.75rem">
      <div class="progress-wrap"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      <div class="q-counter" id="qCounter">1/10</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.4rem .85rem;text-align:center">
      <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold)" id="scoreVal">0</div>
      <div style="font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Score</div>
    </div>
  </div>

  <div class="q-card" id="qCard">
    <div class="q-instruction" id="qInstruction">Which verb goes with…</div>
    <div class="q-noun" id="qNoun"></div>
    <div class="q-pattern" id="qPattern"></div>
    <div class="opts-grid" id="optsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <div class="explanation" id="explanation"></div>
    <button class="btn-ghost" id="nextBtn" style="display:none" onclick="nextQ()">Next →</button>
  </div>

  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow">Round complete</div>
    <div class="final-score" id="finalScore"></div>
    <p style="color:var(--muted);font-size:.88rem" id="endMsg"></p>
    <div class="review-grid" id="reviewGrid"></div>
    <div id="submitArea" style="width:100%">
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>
    </div>
    <button class="btn-ghost" onclick="restartGame()">Play again</button>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>
<script>
// NOTE: Every question here has EXACTLY ONE clearly correct answer.
// Distractors are clearly wrong — no cases where two options are both acceptable.
const EASY_QS = [
  {noun:'a decision',   correct:'make',  distractors:['do','say','hold'],
   pattern:'___ a decision',
   explanation:'"Make a decision" is the only correct collocation. We never "do", "say" or "hold" a decision.',
   example:'She had to make a difficult decision about her career.'},
  {noun:'homework',     correct:'do',    distractors:['make','perform','achieve'],
   pattern:'___ homework',
   explanation:'We always "do" homework — tasks and duties use "do", not "make".',
   example:'Have you done your homework yet?'},
  {noun:'a suggestion', correct:'make',  distractors:['give','say','send'],
   pattern:'___ a suggestion',
   explanation:'"Make a suggestion" is the fixed collocation in English. Not "give" or "say".',
   example:'Could I make a suggestion about the schedule?'},
  {noun:'a photo',      correct:'take',  distractors:['make','shoot','do'],
   pattern:'___ a photo',
   explanation:'We "take" a photo in English. "Make" and "do" are both wrong here.',
   example:'She took a photo of the sunset.'},
  {noun:'research',     correct:'do',    distractors:['make','achieve','perform'],
   pattern:'___ research',
   explanation:'"Do research" is standard. Research is a process/activity, so it uses "do" not "make".',
   example:'He spent three years doing research on climate change.'},
  {noun:'a speech',     correct:'give',  distractors:['make','do','say'],
   pattern:'___ a speech',
   explanation:'"Give a speech" is the correct collocation. Performances for an audience use "give".',
   example:'The president gave a speech to the nation.'},
  {noun:'a mistake',    correct:'make',  distractors:['do','commit','have'],
   pattern:'___ a mistake',
   explanation:'"Make a mistake" is the only natural collocation in English.',
   example:'Everyone makes mistakes — it\'s how we learn.'},
  {noun:'a course',     correct:'take',  distractors:['do','attend','follow'],
   pattern:'___ a course',
   explanation:'In English you "take" a course (especially in American English). "Attend" would need "attend a course".',
   example:'She decided to take a course in graphic design.'},
  {noun:'an effort',    correct:'make',  distractors:['do','take','have'],
   pattern:'___ an effort',
   explanation:'"Make an effort" is the fixed and only natural collocation.',
   example:'Please make an effort to arrive on time.'},
  {noun:'a complaint',  correct:'make',  distractors:['do','give','say'],
   pattern:'___ a complaint',
   explanation:'Formal communications like complaints, requests, and promises all use "make".',
   example:'She made a complaint to the manager about the service.'},
  {noun:'friends',      correct:'make',  distractors:['do','find','get'],
   pattern:'___ friends',
   explanation:'"Make friends" is a fixed expression. You cannot "do", "find" or "get" friends in this pattern.',
   example:'It can be hard to make friends in a new city.'},
  {noun:'an appointment',correct:'make', distractors:['take','do','book'],
   pattern:'___ an appointment',
   explanation:'"Make an appointment" is the correct collocation. "Book" would need "book an appointment" separately.',
   example:'I need to make an appointment with my dentist.'},
];

const HARD_QS = [
  {noun:'a living',     correct:'earn',  distractors:['make','do','gain'],
   pattern:'___ a living',
   explanation:'"Earn a living" means to earn enough money to live on. "Make a living" also exists — but "earn" is the more precise and formal choice here.',
   example:'She earns a living as a freelance translator.'},
  {noun:'damage',       correct:'cause', distractors:['make','do','give'],
   pattern:'___ damage',
   explanation:'"Cause damage" is the correct collocation. "Do damage" is sometimes informal, but "cause" is the precise verb.',
   example:'The storm caused serious damage to the roof.'},
  {noun:'an exception', correct:'make',  distractors:['do','give','take'],
   pattern:'___ an exception',
   explanation:'"Make an exception" is the only correct collocation.',
   example:'I don\'t usually allow late work, but I\'ll make an exception this time.'},
  {noun:'a conclusion', correct:'reach', distractors:['make','come','find'],
   pattern:'___ a conclusion',
   explanation:'"Reach a conclusion" is the formal, precise collocation. Though "come to a conclusion" also exists, "reach" is the single-verb standard.',
   example:'The jury reached a conclusion after three days of deliberation.'},
  {noun:'a habit',      correct:'form',  distractors:['make','do','build'],
   pattern:'___ a habit',
   explanation:'"Form a habit" is the correct formal collocation. "Make a habit of" also exists but requires "of" after it.',
   example:'Try to form a habit of reading every day.'},
  {noun:'a risk',       correct:'take',  distractors:['make','do','run'],
   pattern:'___ a risk',
   explanation:'"Take a risk" is the standard collocation. "Run a risk" is also used but less common.',
   example:'Starting your own business always means taking a risk.'},
  {noun:'revenge',      correct:'take',  distractors:['make','do','get'],
   pattern:'___ revenge',
   explanation:'"Take revenge" is the only correct collocation. You cannot "do" or "make" revenge.',
   example:'He swore he would take revenge on those who betrayed him.'},
  {noun:'a point',      correct:'make',  distractors:['do','say','argue'],
   pattern:'___ a point',
   explanation:'"Make a point" means to state something clearly and convincingly.',
   example:'She made an excellent point about the budget.'},
  {noun:'progress',     correct:'make',  distractors:['do','achieve','reach'],
   pattern:'___ progress',
   explanation:'"Make progress" is the only natural collocation. Never "do progress".',
   example:'The students are making great progress this term.'},
  {noun:'an impact',    correct:'have',  distractors:['make','do','give'],
   pattern:'___ an impact',
   explanation:'"Have an impact" is the correct collocation when referring to effect or influence.',
   example:'Her speech had a huge impact on the audience.'},
  {noun:'a deal',       correct:'strike',distractors:['make','do','reach'],
   pattern:'___ a deal',
   explanation:'"Strike a deal" is the precise business/formal collocation. Though "make a deal" is informal, "strike" is the precise answer here.',
   example:'The two companies struck a deal worth millions of pounds.'},
  {noun:'justice',      correct:'do',    distractors:['make','give','serve'],
   pattern:'___ justice',
   explanation:'"Do justice to something" means to represent it fairly or adequately.',
   example:'No photo could do justice to the beauty of the scenery.'},
];

const ROUND_SIZE = 10;
let diff = 'easy', qBank = EASY_QS;
let roundQs = [], current = 0, score = 0, roundResults = [];

function setDiff(d) {
  diff = d; qBank = d === 'easy' ? EASY_QS : HARD_QS;
  document.getElementById('tabE').classList.toggle('active', d==='easy');
  document.getElementById('tabH').classList.toggle('active', d==='hard');
  restartGame();
}

function initRound() {
  const base = dailyIndex(qBank.length);
  roundQs = Array.from({length: Math.min(ROUND_SIZE, qBank.length)}, (_,i) => qBank[(base+i)%qBank.length]);
  current = 0; score = 0; roundResults = [];
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('qCard').style.display  = 'flex';
  document.getElementById('endCard').style.display = 'none';
  loadQ();
  renderLeaderboard('collocationcrash_' + diff, 'lbBody');
}

function loadQ() {
  const q = roundQs[current];
  const pct = (current / roundQs.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('qCounter').textContent = `${current+1}/${roundQs.length}`;
  document.getElementById('qNoun').textContent    = q.noun;
  document.getElementById('qPattern').textContent = q.pattern;
  document.getElementById('feedback').textContent  = '';
  document.getElementById('feedback').className    = 'feedback';
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('nextBtn').style.display = 'none';

  const opts = dailyShuffle([q.correct, ...q.distractors.slice(0,3)]);
  const grid = document.getElementById('optsGrid'); grid.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn'; btn.textContent = o;
    btn.addEventListener('click', () => answer(o, btn, q));
    grid.appendChild(btn);
  });
}

function answer(chosen, btn, q) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const exp = document.getElementById('explanation');

  if (chosen === q.correct) {
    btn.classList.add('correct');
    score += 10;
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('feedback').textContent  = '✓ Correct!';
    document.getElementById('feedback').className    = 'feedback ok';
    roundResults.push({q, chosen:'correct'});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => { if(b.textContent === q.correct) b.classList.add('reveal'); });
    document.getElementById('feedback').textContent = `✗ The answer is "${q.correct}"`;
    document.getElementById('feedback').className   = 'feedback bad';
    roundResults.push({q, chosen:'wrong'});
  }
  exp.textContent = q.explanation; exp.classList.add('show');
  if (current + 1 < roundQs.length) { document.getElementById('nextBtn').style.display = 'inline-block'; }
  else { setTimeout(endRound, 1200); }
}

function nextQ() { current++; loadQ(); }

function endRound() {
  document.getElementById('qCard').style.display  = 'none';
  document.getElementById('endCard').style.display = 'flex';
  document.getElementById('progFill').style.width  = '100%';
  const max = roundQs.length * 10;
  document.getElementById('finalScore').textContent = `${score} / ${max}`;
  document.getElementById('endMsg').textContent = score >= max*.8 ? '🎉 Collocation master!' : score >= max*.5 ? '👏 Solid work!' : 'Keep practising — collocations take time to master!';
  document.getElementById('endCard').dataset.score = score;

  const rg = document.getElementById('reviewGrid'); rg.innerHTML = '';
  roundResults.forEach(({q, chosen}) => {
    const el = document.createElement('div');
    el.className = 'review-item';
    el.innerHTML = `
      <span class="review-noun">${q.correct} ${q.noun}</span>
      <span class="review-answer ${chosen}">${chosen === 'correct' ? '+10 pts ✓' : '✗ missed'}</span>`;
    el.addEventListener('click', () => {
      // Show collocation info in modal
      showPhrasalModal(`${q.correct} ${q.noun}`, q.explanation, q.example);
    });
    rg.appendChild(el);
  });
}

function restartGame() { initRound(); }

async function doSubmit() {
  const area = document.getElementById('endCard');
  await handleScoreSubmit('collocationcrash_' + diff, parseInt(area.dataset.score), 'nameInput', 'submitArea', 'lbBody');
}

initRound();
</script>
</body>
</html>
