<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WordSpark — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:600px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; gap:1rem; align-items:center; }

/* mode selector */
.mode-tabs { display:flex; gap:.4rem; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:.25rem; }
.mode-tab  { padding:.38rem .8rem; border-radius:4px; font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.07em; text-transform:uppercase; cursor:pointer; border:none; background:transparent; color:var(--muted); transition:all .15s; }
.mode-tab.active { background:var(--gold); color:#0d0d0d; }

/* timer */
.hud { display:flex; align-items:center; justify-content:space-between; width:100%; }
.timer-wrap { position:relative; width:72px; height:72px; flex-shrink:0; }
.timer-wrap svg { transform:rotate(-90deg); }
.timer-wrap circle { fill:none; stroke-width:5; }
.timer-track { stroke:var(--border2); }
.timer-prog  { stroke:var(--gold); stroke-linecap:round; transition:stroke-dashoffset .95s linear, stroke .4s; }
.timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; }
.score-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.5rem 1rem; text-align:center; }
.score-box .val { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; color:var(--gold); }
.score-box .lbl { font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

/* word hero */
.word-hero { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:900; color:var(--text); text-align:center; letter-spacing:.02em; }
.word-type-badge { display:inline-block; font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; padding:.22rem .7rem; border-radius:99px; margin-bottom:.3rem; }
.badge-syn { background:rgba(212,175,55,.18); color:var(--gold); border:1px solid rgba(212,175,55,.3); }
.badge-ant { background:rgba(79,195,247,.12); color:#4fc3f7; border:1px solid rgba(79,195,247,.25); }
.instruction { font-family:'Space Mono',monospace; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); text-align:center; }

/* option buttons */
.options-grid { display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; width:100%; max-width:500px; }
.opt { background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:.5rem 1.1rem; font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:600; color:var(--text); cursor:pointer; transition:all .16s; min-width:5rem; text-align:center; }
.opt:hover { border-color:var(--gold); background:var(--gold-dim); }
.opt.correct { background:var(--correct-dim); border-color:var(--correct); color:var(--correct); pointer-events:none; }
.opt.wrong   { background:var(--wrong-dim);   border-color:var(--wrong);   color:var(--wrong);   pointer-events:none; animation:shake .35s; }
.opt.used    { opacity:.3; pointer-events:none; }

/* type mode */
.type-input-wrap { display:flex; gap:.5rem; width:100%; max-width:380px; }
.type-input { flex:1; background:#0a0a0a; border:1px solid var(--border2); border-radius:4px; padding:.65rem .9rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:1rem; }
.type-input:focus { outline:none; border-color:var(--gold); }
.type-input.ok  { border-color:var(--correct); }
.type-input.bad { border-color:var(--wrong); animation:shake .35s; }

/* Letter boxes — shown immediately when word appears in Type It mode */
.letter-boxes { display:flex; gap:.35rem; justify-content:center; flex-wrap:wrap; }
.letter-box {
  width:2rem; height:2.4rem; border-radius:4px;
  border:2px solid var(--border2); background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700;
  color:var(--text); transition:border-color .2s, background .2s;
}
.letter-box.revealed { border-color:var(--gold); background:var(--gold-dim); color:var(--gold); }
.letter-box.empty { border-style:dashed; }

/* found list */
.found-area { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; width:100%; }
.found-area h3 { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
.found-chips { display:flex; flex-wrap:wrap; gap:.4rem; }
.found-chip { background:var(--gold-dim); border:1px solid rgba(212,175,55,.3); color:var(--gold); border-radius:99px; padding:.22rem .75rem; font-size:.8rem; font-weight:600; cursor:pointer; transition:background .15s; }
.found-chip:hover { background:rgba(212,175,55,.28); }
.found-chip.ant-chip { background:rgba(79,195,247,.1); border-color:rgba(79,195,247,.3); color:#4fc3f7; }
.found-chip.ant-chip:hover { background:rgba(79,195,247,.18); }

/* penalty flash */
.penalty-flash { position:fixed; inset:0; background:rgba(192,57,43,.18); pointer-events:none; animation:pfade .5s ease forwards; z-index:50; }
@keyframes pfade { from{opacity:1} to{opacity:0} }

/* Extra Time button */
.btn-extra-time { background:var(--gold); color:#0d0d0d; border:none; border-radius:8px; padding:.75rem 2rem; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:.02em; animation:extraTimePulse 0.8s ease-in-out infinite alternate; }
.btn-extra-time:disabled { opacity:.4; cursor:default; animation:none; }
@keyframes extraTimePulse {
  from { box-shadow:0 0 8px 2px rgba(212,175,55,.5); transform:scale(1); }
  to   { box-shadow:0 0 22px 6px rgba(212,175,55,.9); transform:scale(1.04); }
}

/* result */
.result-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.75rem; text-align:center; width:100%; animation:fadeIn .4s ease; }
.result-card h2 { font-family:'Playfair Display',serif; font-size:1.7rem; font-weight:700; margin-bottom:.4rem; }
.result-msg { color:var(--muted); font-size:.88rem; margin-bottom:1rem; }
.missed-title { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:.5rem; }
.missed-chips { display:flex; flex-wrap:wrap; gap:.4rem; justify-content:center; margin-bottom:1rem; }
.missed-chip { background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:.22rem .75rem; font-size:.8rem; color:var(--muted); cursor:pointer; transition:border-color .15s; }
.missed-chip:hover { border-color:var(--gold); color:var(--gold); }

.lb-section { width:100%; max-width:600px; padding:0 1rem 2.5rem; }
#phase-intro, #phase-game, #phase-result { width:100%; display:flex; flex-direction:column; align-items:center; gap:1rem; }

/* Gentle blink on inactive mode tabs */
@keyframes modePulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.diff-tab:not(.active) { animation:modePulse 2.8s ease-in-out infinite; }
.diff-tab:not(.active):hover { animation:none; opacity:1; }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">✨ WordSpark</span>
  <span></span>
</nav>

<main>
<!-- INTRO -->
<div id="phase-intro">
  <div class="diff-tabs" style="flex-wrap:wrap;gap:.3rem;justify-content:center;width:auto;align-self:center">
    <button class="diff-tab active" id="mTab1" onclick="selectMode(1)">Find synonym</button>
    <button class="diff-tab"        id="mTab2" onclick="selectMode(2)">Find antonym</button>
    <button class="diff-tab"        id="mTab3" onclick="selectMode(3)">Type it</button>
  </div>
  <div style="text-align:center;padding:.75rem 0">
    <div class="eyebrow" style="margin-bottom:.4rem" id="introLabel">Today's word</div>
    <div class="word-hero" id="introWord" style="min-height:2.5rem"></div>
  </div>
  <div id="typeSubMode" style="display:none;flex-direction:column;align-items:center;gap:.5rem;width:100%">
    <div class="eyebrow">Type…</div>
    <div class="diff-tabs">
      <button class="diff-tab active" id="typeSub1" onclick="selectTypeSub(1)">synonyms</button>
      <button class="diff-tab"        id="typeSub2" onclick="selectTypeSub(2)">antonyms</button>
    </div>
  </div>
  <p style="color:var(--muted);font-size:.88rem;text-align:center;max-width:360px;line-height:1.65" id="modeDesc"></p>
  <button class="btn-primary" style="font-size:1rem;padding:.75rem 2.5rem" onclick="startGame()">Start →</button>
</div>

<!-- GAME -->
<div id="phase-game" style="display:none">
  <div class="hud" style="width:100%">
    <div class="timer-wrap">
      <svg viewBox="0 0 72 72" width="72" height="72">
        <circle class="timer-track" cx="36" cy="36" r="31"/>
        <circle class="timer-prog" id="timerCircle" cx="36" cy="36" r="31" stroke-dasharray="194.8" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="timerNum">60</div>
    </div>
    <div style="text-align:center;flex:1">
      <div class="instruction" id="gameInstruction"></div>
      <div class="word-hero" id="gameWord" style="font-size:2.2rem"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.4rem">
      <div class="score-box">
        <div class="val" id="foundVal">0</div>
        <div class="lbl">Found</div>
      </div>
      <div class="score-box">
        <div class="val" id="scoreVal" style="font-size:1.1rem">0</div>
        <div class="lbl">Pts</div>
      </div>
    </div>
  </div>

  <!-- Mode tabs visible during game -->
  <div class="diff-tabs" style="flex-wrap:wrap;gap:.3rem;justify-content:center;width:100%">
    <button class="diff-tab" id="gTab1" onclick="switchMode(1)">Find synonym</button>
    <button class="diff-tab" id="gTab2" onclick="switchMode(2)">Find antonym</button>
    <button class="diff-tab" id="gTab3" onclick="switchMode(3)">Type it</button>
  </div>

  <!-- Mode 1: find synonym -->
  <div id="m1area" style="display:none;flex-direction:column;align-items:center;gap:.75rem;width:100%">
    <div class="instruction">Wrong answer = −5 seconds · Find the synonym</div>
    <div class="options-grid" id="m1grid"></div>
  </div>

  <!-- Mode 2: find antonym -->
  <div id="m2area" style="display:none;flex-direction:column;align-items:center;gap:.75rem;width:100%">
    <div class="instruction">Wrong answer = −5 seconds · Find the antonym</div>
    <div class="options-grid" id="m2grid"></div>
  </div>

  <!-- Mode 3: type it -->
  <div id="m3area" style="display:none;flex-direction:column;align-items:center;gap:.75rem;width:100%">
    <div style="text-align:center">
      <span class="word-type-badge" id="m3badge"></span>
    </div>
    <!-- Letter boxes: first letter always revealed, remaining shown as empty boxes -->
    <div class="letter-boxes" id="letterBoxes"></div>
    <div class="instruction" id="m3instruction">Type and press Enter</div>
    <div class="type-input-wrap">
      <input class="type-input" id="m3input" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type here…"/>
      <button class="btn-primary" onclick="submitTyped()">→</button>
    </div>
    <div id="hintArea" style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;justify-content:center">
      <button class="btn-ghost" id="hintBtn"      onclick="showHint()">💡 Hint (−3 pts)</button>
      <button class="btn-ghost" id="extraHintBtn" onclick="showExtraHint()">🔍 Extra hint (−5 pts)</button>
      <button class="btn-ghost" id="skipBtn"      onclick="skipTypeWord()">⏭ Skip (−8 pts)</button>
    </div>
  </div>

  <div class="found-area">
    <h3 id="foundTitle">Words found</h3>
    <div class="found-chips" id="foundChips"></div>
  </div>

  <!-- Extra Time button -->
  <div id="extraTimeWrap" style="display:none;width:100%;text-align:center;margin-top:.25rem">
    <button id="extraTimeBtn" class="btn-extra-time" onclick="useExtraTime()">
      ⏱ +30 seconds <span style="font-size:.7rem;opacity:.75">(−20 pts)</span>
    </button>
  </div>
</div>

<!-- RESULT -->
<div id="phase-result" style="display:none">
  <div class="result-card">
    <h2 id="resultHeadline"></h2>
    <div class="result-msg" id="resultMsg"></div>
    <div class="found-chips" id="resultFound" style="justify-content:center;margin-bottom:.75rem"></div>
    <div class="missed-title" id="missedTitle"></div>
    <div class="missed-chips" id="missedChips"></div>
    <button class="btn-ghost" style="margin-top:.5rem" onclick="resetGame()">Play again</button>
  </div>
  <div id="submitArea">
    <div class="submit-row">
      <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
      <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
    </div>
  </div>
  <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.25rem">
    <button class="btn-ghost" onclick="resetGame()">Play again</button>
    <button class="btn-ghost" onclick="goToIntro()">Change mode</button>
    <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
  </div>
</div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <div class="diff-tabs" style="margin-bottom:.75rem">
      <button class="diff-tab active" id="lbWs1" onclick="switchWsLb(1)">Find synonym</button>
      <button class="diff-tab"        id="lbWs2" onclick="switchWsLb(2)">Find antonym</button>
      <button class="diff-tab"        id="lbWs3" onclick="switchWsLb(3)">Type it</button>
    </div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>
<script>
// ── Word bank ─────────────────────────────────────────────────────
const WORDS = [
  { word:'abundant',    syn:['plentiful','ample','copious'],         ant:['scarce','rare','meagre'],              def:'Existing or available in large quantities; more than enough.',             ex:'There was abundant evidence to support the theory.' },

  { word:'curious',     syn:['inquisitive','nosy','interested'],     ant:['indifferent','uninterested','bored'],  def:'Eager to know or learn something.',                                         ex:'Children are naturally curious about the world.' },

  { word:'peculiar',    syn:['strange','odd','unusual'],             ant:['normal','ordinary','common'],           def:'Different from what is normal or expected; strange.',                        ex:'She had a peculiar habit of humming while she worked.' },
  { word:'precise',     syn:['exact','accurate','specific'],         ant:['vague','approximate','rough'],          def:'Marked by exactness and accuracy of expression or detail.',                  ex:'Please give me the precise measurements.' },
  { word:'prominent',   syn:['famous','notable','distinguished'],    ant:['unknown','obscure','insignificant'],    def:'Important or well-known.',                                                  ex:'She is a prominent figure in the art world.' },
  { word:'prosperous',  syn:['wealthy','successful','thriving'],     ant:['poor','struggling','failing'],          def:'Successful in material terms; financially well off.',                        ex:'The town became prosperous after the factory opened.' },
  { word:'reluctant',   syn:['unwilling','hesitant','loath'],        ant:['eager','willing','enthusiastic'],       def:'Not willing to do something; hesitant.',                                    ex:'She was reluctant to admit she had made a mistake.' },
  { word:'rigid',       syn:['stiff','inflexible','firm'],           ant:['flexible','supple','adaptable'],        def:'Not able to be changed or adapted; stiff.',                                 ex:'The new boss was rigid about working hours.' },

  { word:'sharp',       syn:['keen','acute','perceptive'],           ant:['dull','blunt','slow'],                  def:'Quick to understand or notice things; intelligent.',                        ex:'She has a sharp eye for detail.' },

// ── Word queue management ─────────────────────────────────────────
// Builds a shuffled queue of all words that still have unfound answers,
// enforcing a minimum gap of 3 other words between repeats of the same word.
function buildQueue() {
  const type = selectedMode === 2 ? 'ant' : 'syn';
  let available = WORDS.filter(w => {
    const list = type === 'syn' ? w.syn : w.ant;
    return list.some(a => !found.has(type+':'+a));
  });
  if (available.length === 0) {
    // All words fully exhausted — clear found and start over
    found = new Set();
    available = [...WORDS];
  }
  // Shuffle and enforce gap: words in lastWords can't appear in the first positions
  let q = shuffle(available);
  // Move any words that appeared recently to later in the queue
  lastWords.forEach((lw, gapIdx) => {
    const minPos = lastWords.length - gapIdx; // how far in future to push it
    const pos = q.findIndex(w => w.word === lw);
    if (pos !== -1 && pos < minPos) {
      const [removed] = q.splice(pos, 1);
      q.splice(Math.max(minPos, q.length), 0, removed);
    }
  });
  return q;
}

function pickNextWord() {
  if (wordQueue.length === 0) wordQueue = buildQueue();
  currentWord = wordQueue.shift();
  // Track last 3 words for gap enforcement
  lastWords = [currentWord.word, ...lastWords].slice(0, 3);
  document.getElementById('gameWord').textContent = currentWord.word;
  document.getElementById('foundTitle').textContent =
    selectedMode === 1 ? 'Synonyms found' : selectedMode === 2 ? 'Antonyms found' : 'Words found';

  if (selectedMode === 1) buildMode1();
  else if (selectedMode === 2) buildMode2();
  else buildMode3();
}

// ── Mode 1: find synonym ──────────────────────────────────────────
function buildMode1() {
  document.getElementById('gameInstruction').textContent = 'Find the synonym →';
  const grid = document.getElementById('m1grid');
  // Explicitly strip all state classes from any lingering buttons before
  // clearing — prevents iOS Safari from carrying over touch/focus highlight
  [...grid.querySelectorAll('.opt')].forEach(b => b.className = 'opt');
  grid.innerHTML = '';

  const available = currentWord.syn.filter(s => !found.has('syn:'+s));
  if (available.length === 0) { pickNextWord(); return; }
  const correct = available[Math.floor(Math.random() * available.length)];
  const distractors = buildDistractors(correct, currentWord.ant, 'syn');
  const options = shuffle([correct, ...distractors.slice(0, 5)]);

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    const parentRef = currentWord;
    btn.onclick = () => handleOpt1(opt, correct, btn, parentRef);
    grid.appendChild(btn);
  });
}

function handleOpt1(chosen, correct, btn, parentRef) {
  if (chosen === correct) {
    btn.classList.add('correct');
    found.add('syn:'+correct);
    if (!allFound.has('syn:'+correct)) { finalScore += 10; document.getElementById('scoreVal').textContent = finalScore; document.getElementById('foundVal').textContent = parseInt(document.getElementById('foundVal').textContent||0)+1; }
    addFoundChip(correct, false, parentRef);
    setTimeout(() => {
      // Remove the class before navigating so iOS doesn't carry it forward
      btn.classList.remove('correct');
      pickNextWord();
    }, 700);
  } else {
    btn.classList.add('wrong');
    penalise();
    setTimeout(() => { btn.classList.remove('wrong'); btn.classList.add('used'); }, 800);
  }
}

    btn.classList.add('wrong');
    penalise();
    setTimeout(() => { btn.classList.remove('wrong'); btn.classList.add('used'); }, 800);
  }
}

// ── Mode 3: type it ───────────────────────────────────────────────
let m3targets = [];
let m3current = 0;

function buildMode3() {
  const badge = document.getElementById('m3badge');
  const input = document.getElementById('m3input');
  hint1Used = false; extraHintUsed = false; revealedLetters = 1;

  if (typeSub === 1) {
    m3targets = currentWord.syn.filter(s => !found.has('syn:'+s));
    badge.textContent = 'TYPE A SYNONYM';
    badge.className = 'word-type-badge badge-syn';
    document.getElementById('m3instruction').textContent = 'Type the synonym and press Enter · Wrong = −5 seconds';
  } else {
    m3targets = currentWord.ant.filter(a => !found.has('ant:'+a));
    badge.textContent = 'TYPE AN ANTONYM';
    badge.className = 'word-type-badge badge-ant';
    document.getElementById('m3instruction').textContent = 'Type the antonym and press Enter · Wrong = −5 seconds';
  }

  if (m3targets.length === 0) { pickNextWord(); return; }
  m3current = Math.floor(Math.random() * m3targets.length);

  // Reset hint buttons
  const hintBtn = document.getElementById('hintBtn');
  const extraHintBtn = document.getElementById('extraHintBtn');
  const skipBtn = document.getElementById('skipBtn');
  hintBtn.disabled = false;
  extraHintBtn.disabled = true; // enabled only after hint1 is used
  skipBtn.disabled = skipsLeft <= 0;
  skipBtn.textContent = `⏭ Skip (${skipsLeft} left)`;

  buildLetterBoxes();
  input.value = '';
  input.focus();
  input.className = 'type-input';
}

// Build the letter box display — first letter always shown, rest as empty boxes
function buildLetterBoxes() {
  const target = m3targets[m3current];
  const container = document.getElementById('letterBoxes');
  container.innerHTML = '';
  for (let i = 0; i < target.length; i++) {
    const box = document.createElement('div');
    if (i < revealedLetters) {
      box.className = 'letter-box revealed';
      box.textContent = target[i].toUpperCase();
    } else {
      box.className = 'letter-box empty';
      box.textContent = '';
    }
    container.appendChild(box);
  }
}

function showHint() {
  if (hint1Used) return;
  hint1Used = true;
  document.getElementById('hintBtn').disabled = true;
  document.getElementById('extraHintBtn').disabled = false;
  // Deduct points for using hint
  finalScore = Math.max(0, finalScore - 3);
  document.getElementById('scoreVal').textContent = finalScore;
  revealedLetters = 2; // reveal second letter
  buildLetterBoxes();
}

function showExtraHint() {
  if (!hint1Used || extraHintUsed) return;
  extraHintUsed = true;
  document.getElementById('extraHintBtn').disabled = true;
  finalScore = Math.max(0, finalScore - 5);
  document.getElementById('scoreVal').textContent = finalScore;
  revealedLetters = 3; // reveal third letter
  buildLetterBoxes();
}

function skipTypeWord() {
  if (skipsLeft <= 0) return;
  skipsLeft--;
  finalScore = Math.max(0, finalScore - 8);
  document.getElementById('scoreVal').textContent = finalScore;
  setTimeout(pickNextWord, 300);
}

function showTypeHint() { showHint(); } // backwards compat alias

function submitTyped() {
  const input = document.getElementById('m3input');
  const typed = input.value.trim().toLowerCase();
  if (!typed) return;

  const validTargets = typeSub === 1
    ? currentWord.syn.filter(s => !found.has('syn:'+s))
    : currentWord.ant.filter(a => !found.has('ant:'+a));
  const match = validTargets.find(t => t.toLowerCase() === typed);
  const parentRef = currentWord;

  if (match) {
    input.className = 'type-input ok';
    const key = typeSub === 1 ? 'syn:'+match : 'ant:'+match;
    found.add(key);
    if (!allFound.has(key)) { finalScore += 10; document.getElementById('scoreVal').textContent = finalScore; document.getElementById('foundVal').textContent = parseInt(document.getElementById('foundVal').textContent||0)+1; }
    addFoundChip(match, typeSub === 2, parentRef);
    hint1Used = false; extraHintUsed = false; revealedLetters = 1;
    document.getElementById('hintBtn').disabled = false;
    document.getElementById('extraHintBtn').disabled = true;
    setTimeout(pickNextWord, 600);
  } else {
    input.className = 'type-input bad';
    penalise();
    setTimeout(() => { input.className = 'type-input'; input.value = ''; input.focus(); }, 500);
  }
}


// ── Helpers ────────────────────────────────────────────────────────
function buildDistractors(correct, sameWordOtherList, type) {
  // Build a comprehensive exclusion set:
  // - the correct answer itself
  // - the target word itself (e.g. 'anxious' must never appear as an option when searching for synonyms of 'anxious')
  // - ALL synonyms of the current word (any of them would also be a correct answer)
  // - ALL antonyms of the current word (opposite meaning — confusing as a distractor)
  const exclude = new Set([
    correct,
    currentWord.word,          // the word being displayed — must never appear as an option
    ...currentWord.syn,        // all synonyms — any would be a valid correct answer
    ...currentWord.ant,        // all antonyms — wrong meaning direction
  ]);
  const pool = [];
  WORDS.forEach(w => {
    if (w.word === currentWord.word) return;
    const candidates = type === 'syn' ? w.syn : w.ant;
    candidates.forEach(c => { if (!exclude.has(c)) pool.push(c); });
  });
  return shuffle(pool);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// addFoundChip — stores parentRef at creation time so it never goes stale.
// allFound guards against double-counting when the word pool resets mid-game.
function addFoundChip(word, isAnt, parentRef) {
  const key = (isAnt ? 'ant:' : 'syn:') + word;
  if (allFound.has(key)) return; // already found earlier this session — skip
  allFound.add(key);

  // Record for post-game summary
  foundItems.push({ word, isAnt, parent: parentRef });

  const chip = document.createElement('span');
  chip.className = 'found-chip' + (isAnt ? ' ant-chip' : '');
  chip.textContent = word;
  chip.title = isAnt ? 'Antonym of ' + parentRef.word : 'Synonym of ' + parentRef.word;
  chip.onclick = () => showWordModal(word, isAnt, parentRef);
  document.getElementById('foundChips').appendChild(chip);
}

// showWordModal — shows the selected word, its relationship to the parent word,
// the parent word's definition, and an example sentence FOR THE SELECTED WORD.
function showWordModal(word, isAnt, parentRef) {
  const relLabel = isAnt ? 'Antonym of' : 'Synonym of';
  // Look up an example sentence for this specific word (not the parent word)
  const wordEx = WORD_EXAMPLES[word.toLowerCase()] || parentRef.ex;
  showLocalDefModal(
    word,
    `${relLabel}: ${parentRef.word}.\n${parentRef.def}`,
    wordEx
  );
}

function penalise() {
  timeLeft = Math.max(0, timeLeft - 5);
  document.getElementById('timerNum').textContent = timeLeft;
  updateRing();
  const flash = document.createElement('div');
  flash.className = 'penalty-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 500);
  if (timeLeft <= 0) { clearInterval(timer); endGame(); }
}

// ── Timer ──────────────────────────────────────────────────────────
function runTimer() {
  clearInterval(timer);
  updateRing();
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById('timerNum').textContent = timeLeft;
    updateRing();
    if (timeLeft <= 10) {
      document.getElementById('timerCircle').style.stroke = 'var(--wrong)';
      const wrap = document.getElementById('extraTimeWrap');
      const btn  = document.getElementById('extraTimeBtn');
      if (!btn.disabled) wrap.style.display = 'block';
    }
    if (timeLeft <= 0) { clearInterval(timer); endGame(); }
  }, 1000);
}

function updateRing() {
  const c = 194.8;
  document.getElementById('timerCircle').style.strokeDashoffset = c - (timeLeft/60)*c;
}

function useExtraTime() {
  if (extraTimeUsed) return;
  extraTimeUsed = true;
  const btn = document.getElementById('extraTimeBtn');
  btn.disabled = true;
  btn.textContent = '✓ +30s added';
  timeLeft += 30;
  document.getElementById('timerNum').textContent = timeLeft;
  updateRing();
  document.getElementById('timerCircle').style.stroke = 'var(--gold)';
  finalScore = Math.max(0, finalScore - 20);
  document.getElementById('scoreVal').textContent = finalScore;
}

// ── End game ───────────────────────────────────────────────────────
function endGame() {
  clearInterval(timer);
  document.getElementById('phase-game').style.display = 'none';
  document.getElementById('phase-result').style.display = 'flex';

  const foundCount = foundItems.length; // foundItems accumulates throughout the whole game;
  // found.size would be wrong if the word pool was exhausted and reset mid-game
  document.getElementById('resultHeadline').textContent = `${foundCount} word${foundCount===1?'':'s'} found · ${finalScore} pts`;
  document.getElementById('resultMsg').textContent =
    foundCount >= 20 ? '🎉 Outstanding — brilliant vocabulary!' :
    foundCount >= 12 ? '👏 Great work!' :
    foundCount >= 6  ? 'Good effort — keep building your vocabulary!' :
    'Keep practising — every session helps!';

  // ── Found items: clickable chips with correct parent context ──
  const foundEl = document.getElementById('resultFound');
  foundEl.innerHTML = '';
  foundItems.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'found-chip' + (item.isAnt ? ' ant-chip' : '');
    chip.textContent = item.word;
    chip.title = (item.isAnt ? 'Antonym' : 'Synonym') + ' of ' + item.parent.word;
    chip.style.cursor = 'pointer';
    chip.onclick = () => showWordModal(item.word, item.isAnt, item.parent);
    foundEl.appendChild(chip);
  });

  // ── Missed items: the word on screen when time ran out comes first ──
  const missedEl = document.getElementById('missedChips');
  missedEl.innerHTML = '';
  const type = selectedMode === 2 ? 'ant' : 'syn';
  let missed = [];
  WORDS.forEach(w => {
    const list = type === 'syn' ? w.syn : w.ant;
    list.forEach(a => {
      if (!found.has(type+':'+a)) {
        missed.push({ word: a, isAnt: type==='ant', parent: w });
      }
    });
  });

  // Put the word that was active when time ran out at the front
  const lastKey = type + ':' + (currentWord ? (type === 'syn' ? currentWord.syn[0] : currentWord.ant[0]) : '');
  const lastWordItems = missed.filter(m => m.parent.word === (currentWord ? currentWord.word : ''));
  const otherItems    = shuffle(missed.filter(m => m.parent.word !== (currentWord ? currentWord.word : '')));
  missed = [...lastWordItems, ...otherItems].slice(0, 12);
  if (missed.length > 0) {
    document.getElementById('missedTitle').textContent = 'Some you missed';
    missed.forEach(item => {
      const chip = document.createElement('span');
      chip.className = 'missed-chip';
      chip.textContent = item.word;
      chip.style.cursor = 'pointer';
      chip.onclick = () => showWordModal(item.word, item.isAnt, item.parent);
      missedEl.appendChild(chip);
    });
  } else {
    document.getElementById('missedTitle').textContent = '';
  }

  document.getElementById('submitArea').dataset.score = finalScore;
  switchWsLb(selectedMode);
}

function resetGame() {
  document.getElementById('phase-result').style.display = 'none';
  startGame();
}

// ── Leaderboard ────────────────────────────────────────────────────
function switchWsLb(n) {
  [1,2,3].forEach(i => document.getElementById('lbWs'+i).classList.toggle('active', i===n));
  const names = ['wordspark_syn','wordspark_ant','wordspark_type'];
  renderLeaderboard(names[n-1], 'lbBody');
}

async function doSubmit() {
  const score = parseInt(document.getElementById('submitArea').dataset.score || '0');
  await handleScoreSubmit(
    ['wordspark_syn','wordspark_ant','wordspark_type'][selectedMode-1],
    score, 'nameInput', 'submitArea', 'lbBody'
  );
  switchWsLb(selectedMode);
}

// ── Keyboard ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && selectedMode === 3 &&
      document.getElementById('phase-game').style.display !== 'none') {
    submitTyped();
  }
});

// ── Boot ───────────────────────────────────────────────────────────
selectMode(1);
switchWsLb(1);

</script>
