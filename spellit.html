<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpellIt! — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:520px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }

.rules-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; width:100%; font-size:.82rem; color:var(--muted); line-height:1.75; }
.rules-box strong { color:var(--text); }

.hud { display:flex; align-items:center; justify-content:space-between; width:100%; gap:.5rem; flex-wrap:wrap; }
.hud-pill { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.45rem .9rem; text-align:center; min-width:64px; }
.hud-pill .val { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--gold); }
.hud-pill .lbl { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

/* progress dots */
.dots { display:flex; gap:.3rem; flex-wrap:wrap; justify-content:center; }
.dot { width:9px; height:9px; border-radius:50%; background:var(--border2); transition:background .3s; }
.dot.done  { background:var(--correct); }
.dot.wrong { background:var(--wrong); }
.dot.skip  { background:#b8860b; }

.q-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.75rem 1.5rem; width:100%; display:flex; flex-direction:column; align-items:center; gap:1rem; }
.q-meta { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); }
.definition { font-size:1rem; line-height:1.7; color:var(--text); text-align:center; max-width:380px; }
.letter-hint { font-family:'Space Mono',monospace; font-size:.75rem; color:var(--muted); letter-spacing:.06em; }

.spell-wrap { display:flex; gap:.5rem; width:100%; max-width:360px; }
.spell-input { flex:1; background:#0a0a0a; border:2px solid var(--border2); border-radius:4px; padding:.7rem 1rem; font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--text); text-align:center; letter-spacing:.12em; text-transform:uppercase; transition:border-color .2s; }
.spell-input:focus { outline:none; border-color:var(--gold); }
.spell-input.ok  { border-color:var(--correct); }
.spell-input.bad { border-color:var(--wrong); animation:shake .35s; }

.hint-row { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
.hint-box { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.4rem .85rem; font-size:.78rem; color:var(--muted); font-style:italic; text-align:center; width:100%; max-width:360px; min-height:1.8rem; }
.hint-box.revealed { color:var(--text); font-style:normal; }
.hint-box .hl { font-weight:700; font-style:normal; color:var(--gold); }

.feedback { min-height:1.4rem; font-size:.88rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok  { color:var(--correct); }
.feedback.bad { color:var(--wrong); }

/* end */
.end-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; animation:fadeIn .4s ease; }
.end-score { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--gold); }
.words-review { width:100%; display:flex; flex-direction:column; gap:.4rem; margin-top:.5rem; }
.review-item { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.5rem .9rem; font-size:.85rem; cursor:pointer; transition:border-color .15s; }
.review-item:hover { border-color:var(--gold); }
.review-item .rword { font-family:'Playfair Display',serif; font-weight:700; color:var(--gold); }
.review-item .rstatus { font-size:.7rem; font-family:'Space Mono',monospace; }
.rstatus.ok   { color:var(--correct); }
.rstatus.bad  { color:var(--wrong); }
.rstatus.skip { color:#b8860b; }

.lb-section { width:100%; max-width:520px; padding:0 1rem 2.5rem; }

/* Gentle blink on inactive mode tabs to draw attention */
@keyframes modePulse {
  0%,100% { opacity:1; }
  50%      { opacity:.55; }
}
.diff-tab:not(.active), .mode-tab:not(.active) {
  animation: modePulse 2.8s ease-in-out infinite;
}
.diff-tab:not(.active):hover, .mode-tab:not(.active):hover {
  animation: none;
  opacity: 1;
}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">✍️ SpellIt!</span>
  <span></span>
</nav>

<main>
  <!-- Start screen — shown before the player has chosen to begin -->
  <div id="startScreen" style="display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%">
    <div class="diff-tabs">
      <button class="diff-tab active" id="tabE" onclick="previewDiff('easy')">Easy</button>
      <button class="diff-tab"        id="tabH" onclick="previewDiff('hard')">Hard</button>
    </div>
    <div class="rules-box" style="font-size:.8rem">
      <span id="rulesText">Read the definition and hints, then type the correctly spelled word. <strong>8 words</strong> per round. <strong>3 skips</strong> (−8 pts), plus two levels of hints (−3 and −5 pts).</span>
    </div>
    <button class="btn-primary" style="font-size:1rem;padding:.7rem 2.5rem" onclick="beginGame()">Start playing →</button>
  </div>

  <!-- Game UI -->
  <div id="gameUI" style="display:none;flex-direction:column;align-items:center;gap:1rem;width:100%">
    <div class="hud">
      <div class="diff-tabs">
        <button class="diff-tab active" id="tabEGame" onclick="setDiff('easy')">Easy</button>
        <button class="diff-tab"        id="tabHGame" onclick="setDiff('hard')">Hard</button>
      </div>
      <div class="hud-pill"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
      <div class="hud-pill"><div class="val" id="streakVal">🔥0</div><div class="lbl">Streak</div></div>
      <div class="hud-pill"><div class="val" id="skipsVal">3</div><div class="lbl">Skips</div></div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="q-card" id="qCard">
      <div class="q-meta" id="qMeta">Word 1 of 8</div>
      <div class="definition" id="defText"></div>
      <div class="letter-hint" id="letterHint"></div>
      <div class="spell-wrap">
        <input class="spell-input" id="spellInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="TYPE HERE" maxlength="22"/>
        <button class="btn-primary" onclick="checkSpelling()">✓</button>
      </div>
      <div class="hint-box" id="hintBox">Hint not revealed yet</div>
      <div class="hint-row">
        <button class="btn-ghost" id="hint1Btn" onclick="showHint1()">💡 Hint (−3 pts)</button>
        <button class="btn-ghost" id="hint2Btn" onclick="showHint2()">🔍 Extra hint (−5 pts, once only)</button>
        <button class="btn-ghost" id="skipBtn"  onclick="skipWord()">⏭ Skip (−8 pts)</button>
        <button class="btn-ghost" id="endGameBtn" onclick="confirmEndGame()" style="display:none">🏁 End game</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow">Round complete</div>
    <div class="end-score" id="endScore"></div>
    <p style="color:var(--muted);font-size:.88rem" id="endMsg"></p>
    <div class="words-review" id="wordsReview"></div>
    <div id="submitArea" style="width:100%">
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.25rem">
      <button class="btn-ghost" onclick="restartGame()">Play again</button>
      <button class="btn-ghost" onclick="setDiff(diff==='easy'?'hard':'easy')">Switch to <span id="switchLabel"></span></button>
      <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
    </div>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <div class="diff-tabs" style="margin-bottom:.75rem">
      <button class="diff-tab active" id="lbTab_spellit_easy" onclick="switchLb_spellit('easy')">Easy</button>
      <button class="diff-tab"        id="lbTab_spellit_hard" onclick="switchLb_spellit('hard')">Hard</button>
    </div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>
<script>
const EASY_WORDS = [
  {word:'NECESSARY',     def:'Something you cannot do without; essential for a purpose.',
   hint1:'One <span class="hl">-c-</span>, two <span class="hl">-s-</span>\'s',                   hint2:'ne-<span class="hl">ces</span>-sa-ry (remember: one Collar, two Socks)', ex:'It is necessary to bring your passport to the exam.'},
  {word:'ACCOMMODATION', def:'A place to stay or live, especially temporarily.',
   hint1:'Contains a double <span class="hl">-c-</span> and a double <span class="hl">-m</span>', hint2:'<span class="hl">acc</span>-<span class="hl">omm</span>-odation (two <span class="hl">c</span>\'s, then two <span class="hl">m</span>\'s)', ex:'The hotel offers comfortable accommodation for travellers.'},
  {word:'EMBARRASS',     def:'To cause someone to feel awkward or ashamed in front of others.',
   hint1:'Contains a double <span class="hl">-r-</span> and a double <span class="hl">-s</span>', hint2:'em-<span class="hl">bar</span>-<span class="hl">rass</span> (double consonants after the <span class="hl">a</span>)', ex:'His comment embarrassed her in front of the whole class.'},
  {word:'OCCURRENCE',    def:'An event or incident that takes place.',
   hint1:'Contains a double <span class="hl">-c-</span> and a double <span class="hl">-r</span>', hint2:'oc-<span class="hl">cur</span>-<span class="hl">rence</span> (double the <span class="hl">c</span>, then double the <span class="hl">r</span>)', ex:'Power cuts were a common occurrence during the storm.'},
  {word:'PRIVILEGE',     def:'A special right or advantage belonging to a particular person.',
   hint1:'No <span class="hl">-d-</span> before the final -<span class="hl">ge</span>',          hint2:'priv-<span class="hl">i</span>-lege (three syllables, no <span class="hl">d</span> anywhere)', ex:'Access to education should not be a privilege but a right.'},
  {word:'SEPARATE',      def:'To divide things, or to set them apart from each other.',
   hint1:'There is a <span class="hl">-rat-</span> hiding inside it',    hint2:'sep-<span class="hl">a</span>-rate (the middle vowel is <span class="hl">a</span>, not <span class="hl">e</span>)', ex:'The teacher asked them to separate into two groups.'},
  {word:'COMMITMENT',    def:'A promise or firm decision to do something.',
   hint1:'Contains a double <span class="hl">-m-</span> and a double <span class="hl">-t</span>', hint2:'com-<span class="hl">mit</span>-<span class="hl">ment</span> (double <span class="hl">t</span> in the middle)', ex:'She showed great commitment to improving her English.'},
  {word:'EXAGGERATE',    def:'To describe something as greater or more extreme than it really is.',
   hint1:'Contains a double <span class="hl">-g</span>',                hint2:'ex-<span class="hl">agg</span>-erate (double <span class="hl">g</span> after the <span class="hl">a</span>)', ex:'He always exaggerates how difficult the exam was.'},
  {word:'PARLIAMENT',    def:'The legislative body of a country responsible for making laws.',
   hint1:'Ends in <span class="hl">-ment-</span>, not <span class="hl">-mint</span>',           hint2:'parlia-<span class="hl">ment</span> (think of the word "mental")', ex:'The bill was passed by parliament last week.'},
  {word:'INDEPENDENT',   def:'Free from outside control; not relying on others.',
   hint1:'Ends in <span class="hl">-ent-</span>, not <span class="hl">-ant</span>',             hint2:'in-de-<span class="hl">pen</span>-dent (the key part is -<span class="hl">pend</span>-)', ex:'She became financially independent after getting her first job.'},
  {word:'ACHIEVE',       def:'To successfully reach a goal or complete something difficult.',
   hint1:'Contains -<span class="hl">ie</span>- (not -<span class="hl">ei</span>-)',           hint2:'a-<span class="hl">chieve</span> (<span class="hl">i</span> before <span class="hl">e</span> after <span class="hl">ch</span>)', ex:'He worked hard all year to achieve his goal.'},
  {word:'ARGUMENT',      def:'A disagreement between people, or a reason given to support a point.',
   hint1:'Loses its <span class="hl">-e-</span> when <span class="hl">-ment-</span> is added',    hint2:'argue → argu-<span class="hl">ment</span> (the <span class="hl">e</span> disappears)', ex:'They had a heated argument about money.'},
  {word:'BEGINNING',     def:'The point in time or space at which something starts.',
   hint1:'Contains a double <span class="hl">-n</span>',                hint2:'begin → begin-<span class="hl">ning</span> (double <span class="hl">n</span> when adding -<span class="hl">ing</span>)', ex:'The beginning of the film was rather slow.'},
  {word:'BELIEVE',       def:'To accept that something is true, especially without proof.',
   hint1:'Contains -<span class="hl">ie</span>- (not -<span class="hl">ei</span>-)',           hint2:'be-<span class="hl">lieve</span> (<span class="hl">i</span> before <span class="hl">e</span> after <span class="hl">l</span>)', ex:'I find it hard to believe that story.'},
  {word:'BUSINESS',      def:'A person\'s occupation, trade, or commercial activity.',
   hint1:'Contains a silent <span class="hl">-i</span>',                hint2:'bus-<span class="hl">i</span>-ness (the <span class="hl">i</span> is silent, sounds like "bizness")', ex:'She started her own business after university.'},
  {word:'CALENDAR',      def:'A chart showing the days, weeks, and months of a year.',
   hint1:'Ends in <span class="hl">-ar-</span>, not <span class="hl">-er</span>',               hint2:'calen-<span class="hl">dar</span> (think of a distant "dar" at the end)', ex:'Mark the meeting on the calendar so we don\'t forget.'},
  {word:'CATEGORY',      def:'A class or division of things that share common characteristics.',
   hint1:'Ends in <span class="hl">-ory-</span>, not <span class="hl">-ary</span>',             hint2:'categ-<span class="hl">ory</span> (three syllables: cat-e-gor-y)', ex:'This book falls into the category of historical fiction.'},
  {word:'COMMITTEE',     def:'A group of people appointed to perform a task or make decisions.',
   hint1:'Contains a double <span class="hl">-m-</span>, double <span class="hl">-t-</span> and double <span class="hl">-e</span>', hint2:'com-<span class="hl">mit</span>-<span class="hl">tee</span> (double each consonant, then <span class="hl">ee</span>)', ex:'The committee will meet on Friday to discuss the budget.'},
  {word:'CONSCIENCE',    def:'A person\'s inner sense of right and wrong.',
   hint1:'Has a silent <span class="hl">-sc-</span> making a "sh" sound',hint2:'con-<span class="hl">science</span> (the word "science" is hiding in it)', ex:'His conscience would not let him keep the money.'},
  {word:'CONSCIOUS',     def:'Aware of and responding to one\'s surroundings; awake.',
   hint1:'Has a silent <span class="hl">-sc-</span> making a "sh" sound',hint2:'con-<span class="hl">sci</span>-ous (contains "sci" as in science)', ex:'She was barely conscious after the accident.'},
  {word:'DECISION',      def:'A conclusion or resolution reached after consideration.',
   hint1:'Ends in <span class="hl">-sion-</span>, not <span class="hl">-tion</span>',           hint2:'de-<span class="hl">ci</span>-sion (the <span class="hl">c</span> makes an "s" sound here)', ex:'It was a difficult decision to make.'},
  {word:'DEFINITELY',    def:'Without doubt; certainly.',
   hint1:'Contains the word "finite" inside it',hint2:'de-<span class="hl">finite</span>-ly (de + finite + ly)', ex:'I will definitely come to your party.'},
  {word:'DESCRIBE',      def:'To give an account of something in words.',
   hint1:'Starts with <span class="hl">-des-</span>, not <span class="hl">-dis-</span>',         hint2:'de-<span class="hl">scribe</span> (think of a scribe who writes)', ex:'Can you describe what the thief looked like?'},
  {word:'DISAPPEAR',     def:'To cease to be visible; to vanish.',
   hint1:'One <span class="hl">-s-</span>, one <span class="hl">-p-</span>, two <span class="hl">-a-</span>\'s',             hint2:'dis-<span class="hl">appear</span> (dis + appear — just one <span class="hl">s</span>)', ex:'The magician made the rabbit disappear.'},
  {word:'DISAPPOINT',    def:'To fail to fulfil the hopes or expectations of someone.',
   hint1:'One <span class="hl">-s-</span>, one <span class="hl">-p-</span>, one double letter only',hint2:'dis-<span class="hl">appoint</span> (dis + appoint — one <span class="hl">s</span>)', ex:'I don\'t want to disappoint my parents.'},
  {word:'DISCIPLINE',    def:'The practice of training oneself to follow rules and behave well.',
   hint1:'Has a silent <span class="hl">-sc-</span> making a "s" sound', hint2:'dis-<span class="hl">ci</span>-pline (the <span class="hl">c</span> is part of the -scip- cluster)', ex:'Good discipline is essential for learning a new language.'},
  {word:'ENVIRONMENT',   def:'The natural world, or the surroundings in which a person lives.',
   hint1:'Contains the word "iron" in the middle',hint2:'envi-<span class="hl">ron</span>-ment (there\'s <span class="hl">iron</span> hiding inside)', ex:'We should all do more to protect the environment.'},
  {word:'ESPECIALLY',    def:'To a greater degree; more than usual; particularly.',
   hint1:'Starts with <span class="hl">-esp-</span>, not esp-ecially',  hint2:'es-<span class="hl">pec</span>-ially (think: especially careful with the <span class="hl">c</span>)', ex:'I love all fruit, especially strawberries.'},
  {word:'EXPERIENCE',    def:'Practical contact with and knowledge of something over time.',
   hint1:'Ends in <span class="hl">-ence-</span>, not <span class="hl">-ance</span>',           hint2:'experi-<span class="hl">ence</span> (ends in -<span class="hl">ence</span> like "science")', ex:'She has years of experience teaching children.'},
  {word:'EXPLANATION',   def:'A statement or account that makes something clear.',
   hint1:'The verb "explain" becomes "explan-" here',hint2:'explan-<span class="hl">ation</span> (explain → explanation, drops the <span class="hl">i</span>)', ex:'He gave a clear explanation of the problem.'},
  {word:'FAMILIAR',      def:'Well known; often encountered; having a good knowledge of something.',
   hint1:'Ends in <span class="hl">-ar-</span>, not <span class="hl">-er</span>',               hint2:'famili-<span class="hl">ar</span> (like "similar" — ends in -<span class="hl">ar</span>)', ex:'That song sounds familiar to me.'},
  {word:'FEBRUARY',      def:'The second month of the year, with 28 or 29 days.',
   hint1:'Has an <span class="hl">-r-</span> after the <span class="hl">-b-</span> that is often skipped in speech',hint2:'Feb-<span class="hl">ru</span>-ary (remember the <span class="hl">r</span> after the <span class="hl">u</span>)', ex:'Her birthday is in February.'},
  {word:'FOREIGN',       def:'From or relating to a country other than your own.',
   hint1:'Contains -<span class="hl">ei</span>- (an exception to <span class="hl">-i</span>-before-<span class="hl">e</span>)',hint2:'for-<span class="hl">eign</span> (silent <span class="hl">gn</span> at the end)', ex:'He speaks three foreign languages fluently.'},
  {word:'FORTY',         def:'The number equal to four times ten; 40.',
   hint1:'Unlike "four", this word has no <span class="hl">-u</span>',  hint2:'<span class="hl">forty</span> (not "fourty" — the <span class="hl">u</span> disappears)', ex:'There were forty students in the lecture hall.'},
  {word:'FRIEND',        def:'A person with whom you have a bond of mutual affection.',
   hint1:'Contains -<span class="hl">ie</span>- (not -<span class="hl">ei</span>-)',           hint2:'fr-<span class="hl">iend</span> (<span class="hl">i</span> before <span class="hl">e</span> after <span class="hl">fr</span>)', ex:'She has been my best friend since childhood.'},
  {word:'GOVERNMENT',    def:'The group of people who govern a country or state.',
   hint1:'Contains an <span class="hl">-n-</span> that is often skipped in speech',hint2:'govern-<span class="hl">ment</span> (the <span class="hl">n</span> in "govern" stays)', ex:'The government announced new tax rules yesterday.'},
  {word:'GRAMMAR',       def:'The rules for the structure and use of a language.',
   hint1:'Ends in <span class="hl">-ar-</span>, not <span class="hl">-er</span>',               hint2:'gram-<span class="hl">mar</span> (not "grammer" — ends in -<span class="hl">ar</span>)', ex:'English grammar can be tricky for beginners.'},
  {word:'GUARANTEE',     def:'A formal promise that something will happen or be done.',
   hint1:'Starts with <span class="hl">-guar</span>- (like "guard")',   hint2:'guar-<span class="hl">an</span>-tee (guar + antee, ends in double <span class="hl">e</span>)', ex:'The shop offers a two-year guarantee on all laptops.'},
  {word:'IMMEDIATELY',   def:'At once; without delay.',
   hint1:'Contains a double <span class="hl">-m</span>',                hint2:'im-<span class="hl">med</span>-iately (double <span class="hl">m</span> like "immense")', ex:'Please reply to this email immediately.'},
  {word:'IMPORTANT',     def:'Of great significance or value; having a serious effect.',
   hint1:'Ends in <span class="hl">-ant-</span>, not <span class="hl">-ent</span>',             hint2:'im-<span class="hl">port</span>-ant (the key part is -<span class="hl">port</span>-)', ex:'It\'s important to drink enough water every day.'},
  {word:'INTERRUPT',     def:'To stop someone from speaking or doing something by breaking in.',
   hint1:'Contains a double <span class="hl">-r</span>',                hint2:'inter-<span class="hl">rupt</span> (think "inter" + "rupt", double <span class="hl">r</span>)', ex:'Sorry to interrupt, but there\'s a phone call for you.'},
  {word:'KNOWLEDGE',     def:'Facts, information, and skills acquired through experience or study.',
   hint1:'Starts with a silent <span class="hl">-k</span>',             hint2:'<span class="hl">know</span>-ledge (silent <span class="hl">k</span>, like "know" and "knee")', ex:'Her knowledge of history is impressive.'},
  {word:'LANGUAGE',      def:'A system of communication used by a country or community.',
   hint1:'Ends in <span class="hl">-uage-</span> (not <span class="hl">-uge</span>)',           hint2:'lang-<span class="hl">uage</span> (lang + uage — the <span class="hl">u</span> is there)', ex:'Spanish is the second most spoken language in the world.'},
  {word:'LIBRARY',       def:'A building or room containing collections of books for reading.',
   hint1:'Has an <span class="hl">-r-</span> after the <span class="hl">-b-</span> that is often dropped in speech',hint2:'lib-<span class="hl">rar</span>-y (two <span class="hl">r</span>\'s: lib-rar-y)', ex:'I borrowed three books from the library.'},
  {word:'LIGHTNING',     def:'A flash of light in the sky caused by an electrical discharge.',
   hint1:'No <span class="hl">-e-</span> — unlike "lightening" (making lighter)',hint2:'<span class="hl">lightning</span> (no <span class="hl">e</span>: light + ning)', ex:'Lightning struck the old oak tree during the storm.'},
  {word:'MEDICINE',      def:'A drug or preparation used to treat or prevent disease.',

  {word:'ACQUAINTANCE',   def:'A person one knows slightly, but not as a close friend.',

  {word:'ASSASSINATION',  def:'The act of murdering a political or public figure.',

  {word:'CAMOUFLAGE',     def:'Disguising something by making it blend in with its surroundings.',

  {word:'CATASTROPHE',    def:'A sudden disaster causing great damage or suffering.',

  {word:'COMMEMORATE',    def:'To recall and show respect for someone or something in a ceremony.',

  {word:'CONTROVERSIAL',  def:'Giving rise to disagreement or argument; disputable.',

  {word:'CORRESPONDENCE',  def:'Letters or emails exchanged between people; close similarity.',

  {word:'DEFICIENCY',     def:'A lack or shortage of something needed.',

  {word:'DILEMMA',        def:'A situation in which a difficult choice must be made between two options.',

  {word:'ENTHUSIASTIC',   def:'Having or showing intense and eager enjoyment or interest.',

  {word:'EXTRAORDINARY',  def:'Very unusual or remarkable; beyond what is ordinary.',

  {word:'FUNDAMENTAL',    def:'Forming a necessary base or core; of central importance.',

  {word:'INDISPENSABLE',  def:'Absolutely necessary; too important to be without.',

  {word:'LIEUTENANT',     def:'A rank of officer in the army, navy, or police force.',

  {word:'NEGOTIATION',    def:'Discussion aimed at reaching an agreement.',

  {word:'PSYCHOLOGICAL',  def:'Relating to the mind and its functions, especially affecting behaviour.',

   hint1:'Ends in <span class="hl">-ative-</span> (not <span class="hl">-itive</span>)',            hint2:'collabor-<span class="hl">ative</span> (collaborate → collaborative)', ex:'The project was the result of a collaborative effort between two schools.'},
  {word:'COMMEMORATION',  def:'The action or fact of remembering and honouring a person or event.',
   hint1:'Contains a double <span class="hl">-m</span>',                   hint2:'com-<span class="hl">mem</span>-oration (commemorate → commemoration)', ex:'The ceremony was held in commemoration of the town\'s founders.'},
  {word:'COMPARATIVE',    def:'Measured or judged by comparison; relative rather than absolute.',
   hint1:'Ends in <span class="hl">-ative-</span> (not <span class="hl">-itive</span>)',            hint2:'compar-<span class="hl">ative</span> (compare → comparative)', ex:'We studied the comparative advantages of each method.'},
  {word:'CONSTITUENCY',   def:'A group of voters who elect a representative; a body of customers.',
   hint1:'Ends in <span class="hl">-ency-</span> (not <span class="hl">-ancy</span>)',              hint2:'constituen-<span class="hl">cy</span> (constituent → constituency)', ex:'The MP represents a large rural constituency.'},
  {word:'CONTRADICTORY',  def:'Mutually opposed or inconsistent; containing a contradiction.',
   hint1:'Ends in <span class="hl">-ory-</span> (not <span class="hl">-ary</span>)',                hint2:'contradict-<span class="hl">ory</span> (contradict + ory)', ex:'His statements to the police were completely contradictory.'},
  {word:'DETERIORATION',  def:'The process of becoming progressively worse.',
   hint1:'Ends in <span class="hl">-ation-</span> (not <span class="hl">-iation</span>)',           hint2:'deterior-<span class="hl">ation</span> (deteriorate → deterioration)', ex:'There has been a steady deterioration in air quality this year.'},
  {word:'DISPROPORTIONATE',def:'Too large or too small in comparison with something else.',
   hint1:'Ends in <span class="hl">-ate-</span> (not <span class="hl">-it</span>)',                 hint2:'disproportion-<span class="hl">ate</span> (disproportion + ate)', ex:'The punishment seemed disproportionate to the offence.'},
  {word:'EXACERBATE',     def:'To make a problem or bad situation worse.',
   hint1:'Ends in <span class="hl">-ate-</span> (not <span class="hl">-ait</span>)',                hint2:'exacer-<span class="hl">bate</span> (ex + acerbate — think "acerbic")', ex:'Skipping meals can exacerbate feelings of fatigue.'},
  {word:'EXASPERATION',   def:'A feeling of intense irritation or annoyance.',
   hint1:'Ends in <span class="hl">-ation-</span> (not <span class="hl">-tion-</span> alone)',       hint2:'exasper-<span class="hl">ation</span> (exasperate → exasperation)', ex:'She sighed with exasperation at the constant delays.'},
  {word:'HOMOGENEOUS',    def:'Of the same kind; consisting of parts all of the same kind.',
   hint1:'Ends in <span class="hl">-eous-</span> (not <span class="hl">-ious</span>)',              hint2:'homogen-<span class="hl">eous</span> (homogene + ous — keep the <span class="hl">e</span>)', ex:'The classroom was surprisingly homogeneous in terms of ability.'},
  {word:'IDIOSYNCRATIC',  def:'Relating to the individual character or habits of a person; peculiar.',
   hint1:'Starts with <span class="hl">-idio</span>- (Greek for "personal")',hint2:'idiosyn-<span class="hl">cratic</span> (idiosyncracy → idiosyncratic)', ex:'He has some idiosyncratic habits, like always wearing odd socks.'},
  {word:'IMMEASURABLE',   def:'Too large or extreme to measure; very great.',
   hint1:'Contains a double <span class="hl">-m</span>',                   hint2:'im-<span class="hl">meas</span>-urable (im + measurable — double <span class="hl">m</span>)', ex:'The support from volunteers was of immeasurable value.'},
  {word:'IMPECCABLE',     def:'In accordance with the highest standards; faultless.',
   hint1:'Contains a double <span class="hl">-c</span>',                   hint2:'impe-<span class="hl">cc</span>-able (impec + cable — double <span class="hl">c</span>)', ex:'Her English pronunciation is absolutely impeccable.'},
  {word:'INADVERTENTLY',  def:'Without intention; accidentally.',
   hint1:'Ends in <span class="hl">-ently-</span> (not <span class="hl">-antly</span>)',            hint2:'inadvert-<span class="hl">ently</span> (inadvertent → inadvertently)', ex:'I inadvertently sent the email to the wrong person.'},
  {word:'INCOMPREHENSIBLE',def:'Not able to be understood; unintelligible.',
   hint1:'Ends in <span class="hl">-ible-</span> (not <span class="hl">-able</span>)',              hint2:'incomprehens-<span class="hl">ible</span> (comprehend → incomprehensible)', ex:'His handwriting was almost incomprehensible.'},
  {word:'INDIVIDUALISTIC', def:'Marked by or emphasising individuality; independent-minded.',
   hint1:'Ends in <span class="hl">-istic-</span> (not <span class="hl">-ic</span>)',               hint2:'individual-<span class="hl">istic</span> (individual + istic)', ex:'Western cultures are often described as more individualistic.'},
  {word:'INFRASTRUCTURE', def:'The basic systems and services that a country or organisation needs.',
   hint1:'Starts with <span class="hl">-infra</span>- (Latin for "below")',hint2:'infra-<span class="hl">structure</span> (infra + structure)', ex:'The city needs to invest more in public transport infrastructure.'},
  {word:'PARLIAMENTARY',  def:'Relating to a parliament; enacted by or suitable for a parliament.',
   hint1:'Ends in <span class="hl">-ary-</span> (not <span class="hl">-ery</span>)',                hint2:'parliament-<span class="hl">ary</span> (parliament + ary)', ex:'She has years of experience in parliamentary debate.'},
  {word:'PHILANTHROPIST', def:'A person who seeks to promote the welfare of others by donating money.',
   hint1:'Starts with <span class="hl">-phil</span>- (Greek for "love") and <span class="hl">-anthro</span>- (human)',hint2:'philan-<span class="hl">throp</span>-ist (philo + anthropist)', ex:'The philanthropist donated millions to children\'s hospitals.'},
  {word:'PREDOMINANTLY',  def:'Mainly; for the most part.',
   hint1:'Ends in <span class="hl">-antly-</span> (not <span class="hl">-ently</span>)',            hint2:'predomin-<span class="hl">antly</span> (predominant → predominantly)', ex:'The audience was predominantly made up of teenagers.'},
  {word:'PROCRASTINATION',def:'The action of delaying or postponing something.',
   hint1:'Ends in <span class="hl">-ation-</span> (not <span class="hl">-tion-</span> alone)',       hint2:'procrasti-<span class="hl">nation</span> (procrastinate → procrastination)', ex:'Procrastination is one of the biggest obstacles to good study habits.'},
  {word:'PROLIFERATION',  def:'Rapid increase in the number or amount of something.',
   hint1:'Ends in <span class="hl">-ation-</span> (not <span class="hl">-tion</span>)',             hint2:'prolifer-<span class="hl">ation</span> (proliferate → proliferation)', ex:'There has been a rapid proliferation of smartphone apps.'},
  {word:'RECONNAISSANCE', def:'Military observation of a region to gather information.',
   hint1:'French origin; contains a double <span class="hl">-n-</span> and ends in <span class="hl">-ance</span>',hint2:'reconn-<span class="hl">aissance</span> (recon + naissance)', ex:'The pilot flew a reconnaissance mission over the area.'},
  {word:'REPERCUSSION',   def:'An unintended consequence of an event or action.',
   hint1:'Contains a double <span class="hl">-s</span>',                   hint2:'repercus-<span class="hl">sion</span> (repercuss + ion — double <span class="hl">s</span>)', ex:'Losing the contract had serious repercussions for the company.'},
  {word:'SOUVENIR',       def:'A thing that is kept as a reminder of a person, place, or event.',
   hint1:'French origin; ends in <span class="hl">-ir-</span> (not <span class="hl">-eer</span>)', hint2:'souve-<span class="hl">nir</span> (sou + ve + nir — French borrowing)', ex:'She bought a small souvenir to remember her trip.'},
  {word:'SURREPTITIOUS',  def:'Kept secret because it would not be approved of; stealthy.',
   hint1:'Contains a double <span class="hl">-r</span>',                   hint2:'sur-<span class="hl">rep</span>-titious (sur + reptitious — double <span class="hl">r</span>)', ex:'He took a surreptitious glance at his phone during the meeting.'},
  {word:'UNDERESTIMATE',  def:'To estimate something to be smaller or less significant than it is.',
   hint1:'Ends in <span class="hl">-ate-</span> (not <span class="hl">-it</span>)',                 hint2:'under-<span class="hl">estim</span>-ate (under + estimate)', ex:'Never underestimate how difficult the exam can be.'},
  {word:'UNEQUIVOCALLY',  def:'In a way that leaves no doubt; in an absolute and clear manner.',
   hint1:'Contains -<span class="hl">quiv</span>- in the middle',          hint2:'unequivoc-<span class="hl">ally</span> (unequivocal → unequivocally)', ex:'She stated unequivocally that she would not resign.'},
];



const ROUND_SIZE = 8;
let diff = 'easy', wordBank = EASY_WORDS;
let roundWords = [], current = 0, score = 0, streak = 0, skipsLeft = 3, extraHintUsed = false, roundEnded = false;
let attempts = 0, h1Shown = false, h2Shown = false;
let results = []; // {word, status: 'correct'|'wrong'|'skip', pts}

const RULES_BY_DIFF_SPELLIT = {
  easy: 'Read the definition and hints, then type the correctly spelled word. <strong>8 words</strong> per round. <strong>3 skips</strong> (−8 pts), plus two levels of hints (−3 and −5 pts).',
  hard: 'Same as Easy, but with longer and trickier words. Read the definition and hints, then type the correctly spelled word. <strong>8 words</strong> per round.',
};

function previewDiff(d) {
  diff = d;
  wordBank = d === 'easy' ? EASY_WORDS : HARD_WORDS;
  document.getElementById('tabE').classList.toggle('active', d==='easy');
  document.getElementById('tabH').classList.toggle('active', d==='hard');
  const rulesText = document.getElementById('rulesText');
  if (rulesText) rulesText.innerHTML = RULES_BY_DIFF_SPELLIT[d];
}

function beginGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';
  document.getElementById('tabEGame').classList.toggle('active', diff==='easy');
  document.getElementById('tabHGame').classList.toggle('active', diff==='hard');
  initRound();
}

function setDiff(d) {
  diff = d;
  wordBank = d === 'easy' ? EASY_WORDS : HARD_WORDS;
  document.getElementById('tabEGame').classList.toggle('active', d==='easy');
  document.getElementById('tabHGame').classList.toggle('active', d==='hard');
  document.getElementById('gameUI').style.display = 'flex';
  restartGame();
}

function initRound() {
  const indices = freshRandomIndices('spellit_'+diff, wordBank, ROUND_SIZE);
  indices.forEach(i => markSeen('spellit_'+diff, i));
  roundWords = indices.map(i => wordBank[i]);
  current = 0; score = 0; streak = 0; skipsLeft = 3; extraHintUsed = false; results = []; roundEnded = false;
  document.getElementById('scoreVal').textContent  = 0;
  document.getElementById('streakVal').textContent = '🔥0';
  document.getElementById('skipsVal').textContent  = 3;
  document.getElementById('qCard').style.display   = 'flex';
  document.getElementById('endCard').style.display = 'none';
  buildDots(); loadWord();
  renderLeaderboard('spellit_' + diff, 'lbBody');
}

function buildDots() {
  const el = document.getElementById('dots'); el.innerHTML = '';
  for (let i=0;i<ROUND_SIZE;i++) {
    const d = document.createElement('div'); d.className='dot'; d.id='dot'+i; el.appendChild(d);
  }
}

function loadWord() {
  const w = roundWords[current];
  document.getElementById('qMeta').textContent = `Word ${current+1} of ${ROUND_SIZE}`;
  document.getElementById('defText').textContent = w.def;
  document.getElementById('letterHint').textContent = `${w.word.length} letters`;
  document.getElementById('spellInput').value = '';
  document.getElementById('spellInput').className = 'spell-input';
  document.getElementById('spellInput').disabled = false;
  document.getElementById('hintBox').textContent = 'Click a hint button below to reveal';
  document.getElementById('hintBox').classList.remove('revealed');
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hint1Btn').style.display = 'inline-block';
  document.getElementById('hint2Btn').style.display = extraHintUsed ? 'none' : 'inline-block';
  document.getElementById('skipBtn').style.display  = skipsLeft > 0 ? 'inline-block' : 'none';
  document.getElementById('endGameBtn').style.display = skipsLeft > 0 ? 'none' : 'inline-block';
  document.getElementById('hint1Btn').disabled = false;
  attempts = 0; h1Shown = false; h2Shown = false;
  setTimeout(() => document.getElementById('spellInput').focus(), 80);
}

function showHint1() {
  if (h1Shown) return;
  h1Shown = true;
  const h = document.getElementById('hintBox');
  h.innerHTML = roundWords[current].hint1;
  h.classList.add('revealed');
  document.getElementById('hint1Btn').disabled = true;
  // deduct points only if not yet answered
  // tracked in checkSpelling via h1Shown flag
}

function showHint2() {
  if (extraHintUsed || h2Shown) return;
  extraHintUsed = true; h2Shown = true;
  const h = document.getElementById('hintBox');
  h.innerHTML = roundWords[current].hint2;
  h.classList.add('revealed');
  document.getElementById('hint2Btn').style.display = 'none';
}

function confirmEndGame() {
  const remaining = ROUND_SIZE - current;
  const ok = confirm(`End the round now? You still have ${remaining} word${remaining === 1 ? '' : 's'} left, but you can finish here and see your score.`);
  if (ok) endRound();
}

function skipWord() {
  if (skipsLeft <= 0) return;
  skipsLeft--;
  score = Math.max(0, score - 8);
  streak = 0;
  document.getElementById('skipsVal').textContent = skipsLeft;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('streakVal').textContent = '🔥' + streak;
  document.getElementById('dot'+current).className = 'dot skip';
  results.push({word: roundWords[current].word, def: roundWords[current].def, ex: roundWords[current].ex, status:'skip', pts:-8});
  advanceWord();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('spellInput').addEventListener('keydown', e => { if(e.key==='Enter') checkSpelling(); });
});

function checkSpelling() {
  const inp = document.getElementById('spellInput');
  const guess = inp.value.trim().toUpperCase();
  const target = roundWords[current].word.toUpperCase();
  attempts++;

  if (guess === target) {
    inp.className = 'spell-input ok';
    let pts = 15;
    if (h1Shown) pts -= 3;
    if (h2Shown) pts -= 5;
    if (attempts > 1) pts -= (attempts - 1) * 3;
    pts = Math.max(2, pts);
    score += pts; streak++;
    document.getElementById('scoreVal').textContent  = score;
    document.getElementById('streakVal').textContent = '🔥' + streak;
    document.getElementById('feedback').textContent  = `✓ Correct! +${pts} pts`;
    document.getElementById('feedback').className    = 'feedback ok';
    document.getElementById('dot'+current).className = 'dot done';
    inp.disabled = true;
    results.push({word: target, def: roundWords[current].def, ex: roundWords[current].ex, status:'correct', pts});
    setTimeout(advanceWord, 900);
  } else {
    inp.className = 'spell-input bad';
    streak = 0;
    document.getElementById('streakVal').textContent = '🔥0';
    if (attempts >= 3) {
      score = Math.max(0, score - 2);
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('feedback').textContent = `✗ The answer was: ${roundWords[current].word}`;
      document.getElementById('feedback').className   = 'feedback bad';
      document.getElementById('dot'+current).className = 'dot wrong';
      inp.disabled = true;
      results.push({word: target, def: roundWords[current].def, ex: roundWords[current].ex, status:'wrong', pts:0});
      setTimeout(advanceWord, 1400);
    } else {
      document.getElementById('feedback').textContent = `✗ Try again (${attempts}/3)`;
      document.getElementById('feedback').className   = 'feedback bad';
      setTimeout(() => { inp.className='spell-input'; inp.value=''; inp.focus(); }, 400);
    }
  }
}

function advanceWord() {
  if (roundEnded) return;
  current++;
  if (current >= ROUND_SIZE) { endRound(); return; }
  loadWord();
}

function endRound() {
  if (roundEnded) return;
  roundEnded = true;
  document.getElementById('gameUI').style.display = 'none';

  // Reset submit form so a stale "Score submitted!" from a previous round
  // never blocks the player from submitting the next round's score.
  const submitAreaEl = document.getElementById('submitArea');
  if (submitAreaEl) {
    submitAreaEl.innerHTML = `
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>`;
  }
  document.getElementById('endCard').style.display = 'flex';
  document.getElementById('endScore').textContent  = score + ' pts';
  const maxPts = ROUND_SIZE * 15;
  document.getElementById('endMsg').textContent = score >= maxPts * .8 ? '🎉 Outstanding spelling!' : score >= maxPts * .5 ? '👏 Solid effort!' : 'Keep at it — spelling improves with practice!';
  document.getElementById('endCard').dataset.score = score;
  const sl = document.getElementById('switchLabel');
  if(sl) sl.textContent = diff==='easy' ? 'Hard' : 'Easy';
  switchLb_spellit(diff); // keep the leaderboard tab + table in sync with whichever mode was just played

  // Words review
  const rev = document.getElementById('wordsReview'); rev.innerHTML = '';
  results.forEach(r => {
    const el = document.createElement('div');
    el.className = 'review-item';
    el.innerHTML = `<span class="rword">${r.word}</span><span class="rstatus ${r.status}">${r.status === 'correct' ? `+${r.pts} pts` : r.status === 'skip' ? 'skipped' : 'missed'}</span>`;
    el.addEventListener('click', () => showLocalDefModal(r.word, r.def || 'No definition available.', r.ex));
    rev.appendChild(el);
  });
}

function restartGame() { document.getElementById('gameUI').style.display = 'flex'; initRound(); }

async function doSubmit() {
  const area = document.getElementById('endCard');
  await handleScoreSubmit('spellit_' + diff, parseInt(area.dataset.score), 'nameInput', 'submitArea', 'lbBody');
}

previewDiff('easy');

function switchLb_spellit(d) {
  ['easy','hard'].forEach(x => {
    document.getElementById('lbTab_spellit_'+x).classList.toggle('active', x===d);
  });
  renderLeaderboard('spellit_'+d, 'lbBody');
}

switchLb_spellit('easy'); // render the leaderboard immediately on page load
</script>
</body>
</html>
