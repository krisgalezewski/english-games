<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CollocationCrash — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:560px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }

.top-bar { display:flex; align-items:center; justify-content:space-between; width:100%; flex-wrap:wrap; gap:.5rem; }
.progress-wrap { flex:1; height:4px; background:var(--border2); border-radius:99px; overflow:hidden; min-width:80px; }
.progress-fill { height:100%; background:var(--gold); border-radius:99px; transition:width .4s; }
.q-counter { font-family:'Space Mono',monospace; font-size:.7rem; letter-spacing:.08em; color:var(--muted); }

.q-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; display:flex; flex-direction:column; align-items:center; gap:1.25rem; }
.q-instruction { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
.q-noun { font-family:'Playfair Display',serif; font-size:2.4rem; font-weight:900; text-align:center; color:var(--text); }
.q-pattern { font-size:.88rem; color:var(--muted); font-style:italic; }

.opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; width:100%; }
.opt-btn {
  background:#0a0a0a; border:2px solid var(--border2); border-radius:6px;
  padding:.9rem .75rem; font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700;
  color:var(--text); cursor:pointer; transition:all .18s; text-align:center;
}
.opt-btn:hover:not(:disabled) { border-color:var(--gold); background:var(--gold-glow); }
.opt-btn.correct  { border-color:var(--correct); background:var(--correct-dim); color:var(--correct); }
.opt-btn.wrong    { border-color:var(--wrong);   background:var(--wrong-dim);   color:var(--wrong); animation:shake .35s; }
.opt-btn.reveal   { border-color:var(--correct); background:rgba(76,175,130,0.08); }
.opt-btn:disabled { cursor:default; }

.explanation { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.85rem 1rem; font-size:.84rem; color:var(--muted); line-height:1.6; width:100%; display:none; }
.explanation.show { display:block; animation:fadeIn .3s ease; }

.feedback { min-height:1.4rem; font-size:.88rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok  { color:var(--correct); }
.feedback.bad { color:var(--wrong); }

/* end */
.end-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; animation:fadeIn .4s ease; }
.final-score { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--gold); }
.review-grid { display:flex; flex-direction:column; gap:.4rem; width:100%; margin-top:.5rem; }
.review-item { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.5rem .9rem; font-size:.85rem; cursor:pointer; transition:border-color .15s; }
.review-item:hover { border-color:var(--gold); }
.review-noun { font-family:'Playfair Display',serif; font-weight:700; color:var(--text); }
.review-answer { font-size:.75rem; font-family:'Space Mono',monospace; }
.review-answer.ok  { color:var(--correct); }
.review-answer.bad { color:var(--wrong); }

.lb-section { width:100%; max-width:560px; padding:0 1rem 2.5rem; }

/* Gentle blink on inactive mode tabs to draw attention */
@keyframes modePulse {
  0%,100% { opacity:1; }
  50%      { opacity:.55; }
}
.diff-tab:not(.active), .mode-tab:not(.active) {
  animation: modePulse 2.8s ease-in-out infinite;
}
.diff-tab:not(.active):hover, .mode-tab:not(.active):hover {
  animation: none;
  opacity: 1;
}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">💥 CollocationCrash</span>
  <span></span>
</nav>

<main>
  <div class="top-bar">
    <div class="diff-tabs">
      <button class="diff-tab active" id="tabE" onclick="setDiff('easy')">Easy</button>
      <button class="diff-tab"        id="tabH" onclick="setDiff('hard')">Hard</button>
    </div>
    <div style="display:flex;align-items:center;gap:.6rem;flex:1;margin-left:.75rem">
      <div class="progress-wrap"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      <div class="q-counter" id="qCounter">1/10</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.4rem .85rem;text-align:center">
      <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold)" id="scoreVal">0</div>
      <div style="font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Score</div>
    </div>
  </div>

  <div class="q-card" id="qCard">
    <div class="q-instruction" id="qInstruction">Which verb goes with…</div>
    <div class="q-noun" id="qNoun"></div>
    <div class="q-pattern" id="qPattern"></div>
    <div class="opts-grid" id="optsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <div class="explanation" id="explanation"></div>
    <button class="btn-ghost" id="nextBtn" style="display:none" onclick="nextQ()">Next →</button>
  </div>

  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow">Round complete</div>
    <div class="final-score" id="finalScore"></div>
    <p style="color:var(--muted);font-size:.88rem" id="endMsg"></p>
    <div class="review-grid" id="reviewGrid"></div>
    <div id="submitArea" style="width:100%">
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.25rem">
      <button class="btn-ghost" onclick="restartGame()">Play again</button>
      <button class="btn-ghost" onclick="setDiff(diff==='easy'?'hard':'easy')">Switch to <span id="ccSwitchLabel"></span></button>
      <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
    </div>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <div class="diff-tabs" style="margin-bottom:.75rem">
      <button class="diff-tab active" id="lbTab_collocationcrash_easy" onclick="switchLb_collocationcrash('easy')">Easy</button>
      <button class="diff-tab"        id="lbTab_collocationcrash_hard" onclick="switchLb_collocationcrash('hard')">Hard</button>
    </div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script>

const ROUND_SIZE = 10;
let diff = 'easy', qBank = EASY_QS;
let roundQs = [], current = 0, score = 0, roundResults = [];

function setDiff(d) {
  diff = d; qBank = d === 'easy' ? EASY_QS : HARD_QS;
  document.getElementById('tabE').classList.toggle('active', d==='easy');
  document.getElementById('tabH').classList.toggle('active', d==='hard');
  restartGame();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initRound() {
  // Pick questions ensuring each correct answer is UNIQUE in the round
  const baseIndices = freshIndices('collocationcrash_'+diff, qBank, qBank.length);
  const usedCorrect = new Set();
  const picked = [];
  for (const idx of baseIndices) {
    if (picked.length >= ROUND_SIZE) break;
    const q = qBank[idx];
    if (!usedCorrect.has(q.correct)) {
      usedCorrect.add(q.correct);
      picked.push(idx);
    }
  }
  // If we still need more (unlikely), fill without uniqueness constraint
  if (picked.length < ROUND_SIZE) {
    for (const idx of baseIndices) {
      if (picked.length >= ROUND_SIZE) break;
      if (!picked.includes(idx)) picked.push(idx);
    }
  }
  picked.forEach(i => markSeen('collocationcrash_'+diff, i));
  roundQs = picked.map(i => qBank[i]);
  current = 0; score = 0; roundResults = [];
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('qCard').style.display  = 'flex';
  document.getElementById('endCard').style.display = 'none';
  loadQ();
  renderLeaderboard('collocationcrash_' + diff, 'lbBody');
}

function loadQ() {
  const q = roundQs[current];
  const pct = (current / roundQs.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('qCounter').textContent = `${current+1}/${roundQs.length}`;
  document.getElementById('qNoun').textContent    = q.noun;
  document.getElementById('qPattern').textContent = q.pattern;
  document.getElementById('feedback').textContent  = '';
  document.getElementById('feedback').className    = 'feedback';
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('nextBtn').style.display = 'none';

  const opts = shuffle([q.correct, ...q.distractors.slice(0,3)]);
  const grid = document.getElementById('optsGrid'); grid.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn'; btn.textContent = o;
    btn.addEventListener('click', () => answer(o, btn, q));
    grid.appendChild(btn);
  });
}

function answer(chosen, btn, q) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const exp = document.getElementById('explanation');

  if (chosen === q.correct) {
    btn.classList.add('correct');
    score += 10;
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('feedback').textContent  = '✓ Correct!';
    document.getElementById('feedback').className    = 'feedback ok';
    roundResults.push({q, chosen:'correct'});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => { if(b.textContent === q.correct) b.classList.add('reveal'); });
    document.getElementById('feedback').textContent = `✗ The answer is "${q.correct}"`;
    document.getElementById('feedback').className   = 'feedback bad';
    roundResults.push({q, chosen:'wrong'});
  }
  exp.textContent = q.explanation; exp.classList.add('show');
  if (current + 1 < roundQs.length) { document.getElementById('nextBtn').style.display = 'inline-block'; }
  else { setTimeout(endRound, 1200); }
}

function nextQ() { current++; loadQ(); }

function endRound() {
  document.getElementById('qCard').style.display  = 'none';
  document.getElementById('endCard').style.display = 'flex';
  document.getElementById('progFill').style.width  = '100%';
  const max = roundQs.length * 10;
  document.getElementById('finalScore').textContent = `${score} / ${max}`;
  document.getElementById('endMsg').textContent = score >= max*.8 ? '🎉 Collocation master!' : score >= max*.5 ? '👏 Solid work!' : 'Keep practising — collocations take time to master!';
  document.getElementById('endCard').dataset.score = score;
  const ccsl = document.getElementById('ccSwitchLabel');
  if(ccsl) ccsl.textContent = diff==='easy' ? 'Hard' : 'Easy';

  const rg = document.getElementById('reviewGrid'); rg.innerHTML = '';
  roundResults.forEach(({q, chosen}) => {
    const el = document.createElement('div');
    el.className = 'review-item';
    el.innerHTML = `
      <span class="review-noun">${q.correct} ${q.noun}</span>
      <span class="review-answer ${chosen}">${chosen === 'correct' ? '+10 pts ✓' : '✗ missed'}</span>`;
    el.addEventListener('click', () => {
      // Show collocation info in modal
      showPhrasalModal(`${q.correct} ${q.noun}`, q.explanation, q.example);
    });
    rg.appendChild(el);
  });
}

function restartGame() { initRound(); }

async function doSubmit() {
  const area = document.getElementById('endCard');
  await handleScoreSubmit('collocationcrash_' + diff, parseInt(area.dataset.score), 'nameInput', 'submitArea', 'lbBody');
}

initRound();

function switchLb_collocationcrash(d) {
  ['easy','hard'].forEach(x => {
    document.getElementById('lbTab_collocationcrash_'+x).classList.toggle('active', x===d);
  });
  renderLeaderboard('collocationcrash_'+d, 'lbBody');
}
