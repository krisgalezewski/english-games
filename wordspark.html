<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WordSpark — English Games</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0e0e10;--surface:#18181c;--border:#2a2a30;--accent:#7c6af7;--text:#f0f0f4;--muted:#888896;--correct:#4caf82;--present:#f7c06a;--absent:#3a3a42;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
nav{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;border-bottom:1px solid var(--border);}
nav a{color:var(--muted);text-decoration:none;font-size:.85rem;}nav a:hover{color:var(--text);}
nav h1{font-family:'Syne',sans-serif;font-size:1.1rem;color:var(--accent);}
.subtitle{font-size:.78rem;color:var(--muted);margin-top:.3rem;text-align:center;}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;width:100%;max-width:520px;gap:1.25rem;}
.theme-badge{background:#7c6af720;border:1px solid #7c6af740;color:var(--accent);border-radius:99px;padding:.3rem .9rem;font-size:.78rem;font-weight:600;letter-spacing:.06em;}
#board{display:grid;grid-template-rows:repeat(6,1fr);gap:.45rem;width:min(330px,90vw);}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:.45rem;}
.tile{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:700;border:2px solid var(--border);border-radius:8px;text-transform:uppercase;transition:background .3s,border-color .3s,transform .1s;user-select:none;}
.tile.filled{border-color:var(--muted);transform:scale(1.04);}
.tile.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
.tile.present{background:var(--present);border-color:var(--present);color:#111;}
.tile.absent{background:var(--absent);border-color:var(--absent);color:var(--muted);}
.tile.shake{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
#keyboard{display:flex;flex-direction:column;gap:.4rem;width:min(380px,96vw);}
.kb-row{display:flex;justify-content:center;gap:.3rem;}
.key{height:3.2rem;min-width:2.2rem;padding:0 .5rem;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;text-transform:uppercase;flex:1;max-width:2.8rem;}
.key.wide{max-width:4rem;font-size:.7rem;}
.key:hover{background:#2a2a38;}
.key.correct{background:var(--correct);border-color:var(--correct);color:#fff;}
.key.present{background:var(--present);border-color:var(--present);color:#111;}
.key.absent{background:var(--absent);border-color:var(--absent);}
#message{min-height:1.5rem;font-size:.92rem;color:var(--accent);font-weight:600;text-align:center;}
/* leaderboard */
.lb-section{width:100%;max-width:520px;padding:0 1rem 2.5rem;}
.lb-section h2{font-family:'Syne',sans-serif;font-size:1.1rem;margin-bottom:.75rem;color:var(--accent);}
.lb-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.lb-table th{text-align:left;color:var(--muted);font-weight:500;padding:.35rem .5rem;border-bottom:1px solid var(--border);}
.lb-table td{padding:.4rem .5rem;border-bottom:1px solid #1e1e24;}
.lb-table tr:first-child td{color:var(--present);font-weight:600;}
.score-submit{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.score-submit input{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;}
.score-submit input:focus{outline:none;border-color:var(--accent);}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.5rem 1.1rem;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;}
.btn:hover{opacity:.85;}
</style>
</head>
<body>
<nav>
  <a href="index.html">← Games</a>
  <h1>🟩 WordSpark</h1>
  <span class="subtitle" id="dateLabel"></span>
</nav>
<main>
  <div class="theme-badge" id="themeBadge">Loading…</div>
  <div id="board"></div>
  <div id="message"></div>
  <div id="keyboard"></div>
</main>

<div class="lb-section">
  <div id="submitArea" style="display:none">
    <div class="score-submit">
      <input id="nameInput" placeholder="Your name" maxlength="20"/>
      <button class="btn" onclick="handleSubmit()">Add to leaderboard</button>
    </div>
  </div>
  <h2>🏆 Leaderboard</h2>
  <table class="lb-table">
    <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
    <tbody id="lbBody"><tr><td colspan="3" style="color:var(--muted)">Loading…</td></tr></tbody>
  </table>
</div>

<script src="shared.js"></script>
<script>
const GAME = 'wordspark';
const WORDS = [
  {word:'BRAVE',theme:'Personality'},  {word:'LIGHT',theme:'Science'},
  {word:'SPOKE',theme:'Communication'},{word:'FLAME',theme:'Nature'},
  {word:'GRAIN',theme:'Food & Farming'},{word:'PRIDE',theme:'Emotions'},
  {word:'STORM',theme:'Weather'},       {word:'BLUNT',theme:'Personality'},
  {word:'CRISP',theme:'Senses'},        {word:'DRIFT',theme:'Movement'},
  {word:'ELDER',theme:'Family'},        {word:'FANCY',theme:'Style'},
  {word:'GLOOM',theme:'Emotions'},      {word:'HASTE',theme:'Time'},
  {word:'INFER',theme:'Thinking'},      {word:'JOUST',theme:'History'},
  {word:'KNACK',theme:'Skills'},        {word:'LUNAR',theme:'Space'},
  {word:'MANOR',theme:'Places'},        {word:'NERVE',theme:'Body'},
  {word:'ONSET',theme:'Time'},          {word:'PLUCK',theme:'Personality'},
  {word:'QUERY',theme:'Communication'}, {word:'RALLY',theme:'Sport'},
  {word:'SCORN',theme:'Emotions'},      {word:'TRUCE',theme:'Conflict'},
  {word:'UNITY',theme:'Society'},       {word:'VALOR',theme:'Personality'},
  {word:'WRATH',theme:'Emotions'},      {word:'YEARN',theme:'Feelings'},
  {word:'ABBEY',theme:'Buildings'},     {word:'BLAZE',theme:'Nature'},
  {word:'CHAOS',theme:'Concepts'},      {word:'DODGE',theme:'Movement'},
  {word:'EAGER',theme:'Feelings'},      {word:'FLAIR',theme:'Style'},
  {word:'GREED',theme:'Personality'},   {word:'HOVER',theme:'Movement'},
  {word:'IRONY',theme:'Language'},      {word:'JUDGE',theme:'Law'},
];

const idx = dailyIndex(WORDS.length);
const {word: TARGET, theme: THEME} = WORDS[idx];
const VALID = new Set([...WORDS.map(w=>w.word), 'TRACE','CRANE','RAISE','STARE','SLATE','CRATE','ADORE','ALIEN','ALIGN','ALLOW','ALOFT','AMONG','ANGER','ANGEL','APPLE','ARGUE','ARISE','ARRAY','ARROW','BELOW','BENCH','BIRTH','BLACK','BLANK','BLAST','BLEND','BLESS','BLOCK','BLOOD','BLOOM','BLOWN','BOARD','BOOST','BOUND','BOXER','BRAIN','BRAND','BREAK','BREED','BRICK','BRIDE','BRIEF','BRING','BROAD','BROKE','BUILD','BUILT','BUNCH','BURST','BUYER','CABIN','CABLE','CATCH','CAUSE','CHAIN','CHAIR','CHASE','CHECK','CHEEK','CHEST','CHILD','CHINA','CHOIR','CHORD','CHOSE','CHUNK','CIVIL','CLAIM','CLASS','CLEAN','CLEAR','CLICK','CLIFF','CLIMB','CLOSE','CLOTH','CLOUD','COACH','COAST','COULD','COUNT','COURT','COVER','CRACK','CRAFT','CRASH','CRAWL','CRAZY','CREEK','CROSS','CROWD','CRUEL','CRUSH','CURVE','DAILY','DANCE','DEATH','DEBUT','DELAY','DELTA','DENSE','DEPTH','DEPOT','DIRTY','DOUBT','DOUGH','DRAFT','DRAIN','DRAMA','DRAWN','DREAM','DRESS','DRIED','DRINK','DRIVE','DROVE','DYING','EARLY','EARTH','EIGHT','ELITE','EMPTY','ENEMY','ENJOY','ENTER','EQUAL','ERROR','ESSAY','EVENT','EVERY','EXACT','EXIST','EXTRA','FAINT','FAITH','FALSE','FATAL','FAULT','FEAST','FENCE','FEVER','FIELD','FIFTH','FIFTY','FIGHT','FINAL','FIRST','FIXED','FLESH','FLOAT','FLOOD','FLOOR','FOCUS','FORCE','FORGE','FOUND','FRAME','FRANK','FRESH','FRONT','FRONT','FROZE','FULLY','FUNNY','GIANT','GIVEN','GLASS','GLIDE','GLORY','GLOSS','GLOVE','GOING','GRACE','GRADE','GRAND','GRANT','GRASP','GRASS','GRAVE','GREAT','GREEN','GREET','GRIEF','GRILL','GROAN','GROSS','GROUP','GROWN','GROWL','GUESS','GUEST','GUIDE','GUILT','GUISE','GULF','HABIT','HAPPY','HARSH','HEART','HEAVY','HENCE','HINGE','HONEY','HONOR','HORSE','HOTEL','HOUSE','HUMAN','HUMOR','IDEAL','IMAGE','IMPLY','INNER','INPUT','ISSUE','ITALY','IVORY','JEWEL','JOINT','JOKER','JOYFUL','JUICE','JUICY','JUMPY','KNEEL','KNIFE','KNOCK','KNOWN','LABEL','LARGE','LASER','LATER','LAUGH','LAYER','LEARN','LEAST','LEGAL','LEMON','LEVEL','LIVER','LOCAL','LODGE','LOGIC','LOOSE','LOWER','LOYAL','LUCKY','MAGIC','MAJOR','MAKER','MARCH','MARRY','MATCH','MAYBE','MEANT','MEDAL','MERCY','MERIT','METAL','MIGHT','MINOR','MINUS','MODEL','MONEY','MONTH','MORAL','MOTIF','MOTOR','MOUNT','MOUTH','MOVED','MOVIE','MUSIC','NASAL','NAVAL','NIGHT','NINJA','NOBLE','NOISE','NORTH','NOTED','NOVEL','NURSE','OCCUR','OFFER','OFTEN','OPTIC','ORDER','OTHER','OUTER','OWNED','OXIDE','OZONE','PAINT','PANEL','PANIC','PAPER','PARTY','PATCH','PAUSE','PEACE','PEACH','PENNY','PHONE','PHOTO','PIANO','PIECE','PILOT','PINCH','PIXEL','PLACE','PLAIN','PLANE','PLANT','PLATE','PLAZA','PLEAD','PLEAT','PLUMB','PLUMP','PLUNGE','POINT','POLAR','POUND','POWER','PRESS','PRICE','PRIME','PRINT','PRIOR','PRIZE','PROBE','PRONE','PROSE','PROVE','PROWL','PSALM','PUBIC','PULSE','PUNCH','PUPIL','PURE','PUSH','QUEEN','QUEST','QUEUE','QUICK','QUIET','QUITE','QUOTA','QUOTE','RADAR','RADIO','RAISE','RANCH','RANGE','RAPID','RATIO','REACH','READY','REBEL','RECUT','REFER','REIGN','RELAX','RENEW','REPAY','REPEL','REPLY','RERUN','RESET','RIDGE','RIFLE','RIGID','RISEN','RISKY','RIVAL','RIVER','ROAST','ROBIN','ROBOT','ROCKY','ROMAN','ROUGE','ROUGH','ROUND','ROUTE','ROYAL','RULED','RUMOR','RURAL','SADLY','SAINT','SALAD','SANDY','SAUCE','SCALE','SCARE','SCENE','SCORE','SCRAP','SCREW','SCOUT','SEDAN','SEIZE','SENSE','SERVE','SETUP','SEVEN','SHAFT','SHAKE','SHALL','SHAME','SHAPE','SHARE','SHARK','SHARP','SHIFT','SHINE','SHIRT','SHOCK','SHOOT','SHORT','SHOUT','SHOVE','SIGHT','SILLY','SINCE','SIXTH','SIXTY','SIZED','SKATE','SKILL','SKULL','SLATE','SLIDE','SLOPE','SLUMP','SMALL','SMART','SMILE','SMOKE','SNAKE','SOLAR','SOLID','SOLVE','SORRY','SOUTH','SPACE','SPARE','SPARK','SPEAK','SPEED','SPEND','SPINE','SPITE','SPLIT','SPOON','SPORT','SPRAY','SQUAD','SQUID','STACK','STAGE','STAIN','STAKE','STALL','STAMP','STAND','STARK','START','STATE','STAYS','STEAL','STEAM','STEEL','STEEP','STEER','STERN','STICK','STIFF','STILL','STOCK','STONE','STOOD','STORE','STORK','STORY','STRAP','STRAW','STRAY','STRIP','STUCK','STUDY','STUFF','STYLE','SUGAR','SUITE','SUNNY','SUPER','SURGE','SWAMP','SWEAR','SWEEP','SWEET','SWEPT','SWIFT','SWING','SWORD','TABLE','TASTE','TEACH','TEETH','THANK','THEFT','THEIR','THEME','THERE','THESE','THICK','THING','THINK','THORN','THOSE','THREE','THREW','THROW','TIGER','TIGHT','TIMER','TIRED','TITLE','TODAY','TOKEN','TONAL','TOTAL','TOUCH','TOUGH','TOWEL','TOWER','TOXIC','TRACK','TRADE','TRAIL','TRAIN','TRAIT','TRAMP','TRASH','TREAT','TRICK','TRIED','TROOP','TRUCK','TRULY','TRUNK','TRUST','TRUTH','TULIP','TUMOR','TUNER','TWIST','TYING','TYPED','UDDER','ULCER','ULTRA','UNCLE','UNDER','UNION','UNTIL','UPPER','UPSET','URBAN','USUAL','UTTER','VAGUE','VALID','VALUE','VAPOR','VAULT','VERSE','VIDEO','VIGOR','VIRAL','VIRUS','VISIT','VISTA','VITAL','VIVID','VOCAL','VOICE','VOTER','VOWED','WAIST','WASTE','WATCH','WATER','WEARY','WEAVE','WEDGE','WEIGH','WEIRD','WHEAT','WHERE','WHICH','WHILE','WHOLE','WHOSE','WIDER','WINDY','WITCH','WOMAN','WOMEN','WORLD','WORSE','WORST','WORTH','WOULD','WOUND','WRIST','WRONG','YACHT','YOUNG','YOURS','YOUTH','ZEBRA','ZONAL']);

let guesses = [], current = '', gameOver = false;
const rows = [];

function init() {
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('themeBadge').textContent = `Today's theme: ${THEME}`;
  const board = document.getElementById('board');
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div'); row.className = 'row';
    const tiles = [];
    for (let c = 0; c < 5; c++) { const t = document.createElement('div'); t.className = 'tile'; row.appendChild(t); tiles.push(t); }
    board.appendChild(row); rows.push(tiles);
  }
  buildKeyboard();
  loadLeaderboard();
  document.addEventListener('keydown', onKey);
}

function buildKeyboard() {
  const layout = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
  const kb = document.getElementById('keyboard');
  layout.forEach(row => {
    const div = document.createElement('div'); div.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k; btn.dataset.key = k;
      btn.addEventListener('click', () => onKey({key: k === '⌫' ? 'Backspace' : k === 'ENTER' ? 'Enter' : k}));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function onKey(e) {
  if (gameOver) return;
  const k = e.key.toUpperCase();
  if (k === 'ENTER') { submitGuess(); return; }
  if (k === 'BACKSPACE' || k === '⌫') { current = current.slice(0, -1); render(); return; }
  if (/^[A-Z]$/.test(k) && current.length < 5) { current += k; render(); }
}

function render() {
  const rowIdx = guesses.length;
  if (rowIdx >= 6) return;
  rows[rowIdx].forEach((t, i) => { t.textContent = current[i] || ''; t.className = 'tile' + (current[i] ? ' filled' : ''); });
}

function submitGuess() {
  if (current.length < 5) { showMsg('Not enough letters'); shake(); return; }
  if (!VALID.has(current) && current !== TARGET) { showMsg('Not in word list'); shake(); return; }
  const result = score(current);
  guesses.push({word: current, result});
  revealRow(guesses.length - 1, result);
  updateKeys(current, result);
  if (current === TARGET) { setTimeout(() => endGame(true), 1800); }
  else if (guesses.length === 6) { setTimeout(() => endGame(false), 1800); }
  current = '';
}

function score(guess) {
  const res = Array(5).fill('absent');
  const pool = TARGET.split('');
  guess.split('').forEach((l, i) => { if (l === pool[i]) { res[i] = 'correct'; pool[i] = null; } });
  guess.split('').forEach((l, i) => { if (res[i] !== 'correct') { const j = pool.indexOf(l); if (j !== -1) { res[i] = 'present'; pool[j] = null; } } });
  return res;
}

function revealRow(r, result) {
  rows[r].forEach((t, i) => {
    setTimeout(() => { t.className = 'tile ' + result[i]; }, i * 200);
  });
}

function updateKeys(guess, result) {
  guess.split('').forEach((l, i) => {
    const btn = document.querySelector(`[data-key="${l}"]`); if (!btn) return;
    const cur = btn.className;
    if (!cur.includes('correct') && (result[i] === 'correct' || (!cur.includes('present') && result[i] === 'present') || result[i] === 'absent'))
      btn.classList.add(result[i]);
  });
}

function shake() { rows[guesses.length].forEach(t => { t.classList.add('shake'); setTimeout(() => t.classList.remove('shake'), 500); }); }
function showMsg(m) { const el = document.getElementById('message'); el.textContent = m; setTimeout(() => { if (el.textContent === m) el.textContent = ''; }, 2000); }

function endGame(won) {
  gameOver = true;
  const sc = won ? Math.max(10, 110 - guesses.length * 20) : 0;
  showMsg(won ? `🎉 Brilliant! Score: ${sc}` : `The word was ${TARGET}`);
  if (won) { document.getElementById('submitArea').style.display = 'block'; document.getElementById('submitArea').dataset.score = sc; }
}

async function handleSubmit() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  const sc = parseInt(document.getElementById('submitArea').dataset.score);
  await submitScore(GAME, name, sc);
  document.getElementById('submitArea').style.display = 'none';
  loadLeaderboard();
}

async function loadLeaderboard() {
  const data = await getLeaderboard(GAME);
  const tbody = document.getElementById('lbBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">No scores yet — be first!</td></tr>'; return; }
  tbody.innerHTML = data.map((r, i) => `<tr><td>${i+1}</td><td>${r.player_name}</td><td>${r.score}</td></tr>`).join('');
}

init();
</script>
</body>
</html>
