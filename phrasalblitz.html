<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PhrasalBlitz — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:600px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; gap:1rem; align-items:center; }

/* mode selector */
.mode-tabs { display:flex; gap:.4rem; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:.25rem; }
.mode-tab  { padding:.38rem .8rem; border-radius:4px; font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.07em; text-transform:uppercase; cursor:pointer; border:none; background:transparent; color:var(--muted); transition:all .15s; }
.mode-tab.active { background:var(--gold); color:#0d0d0d; }

/* timer */
.hud { display:flex; align-items:center; justify-content:space-between; width:100%; }
.timer-wrap { position:relative; width:72px; height:72px; flex-shrink:0; }
.timer-wrap svg { transform:rotate(-90deg); }
.timer-wrap circle { fill:none; stroke-width:5; }
.timer-track { stroke:var(--border2); }
.timer-prog  { stroke:var(--gold); stroke-linecap:round; transition:stroke-dashoffset .95s linear, stroke .4s; }
.timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; }
.score-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.5rem 1rem; text-align:center; }
.score-box .val { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; color:var(--gold); }
.score-box .lbl { font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

/* verb display */
.verb-hero { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--text); text-align:center; letter-spacing:.02em; }
.verb-hero em { color:var(--gold); font-style:italic; }
.instruction { font-family:'Space Mono',monospace; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); text-align:center; }

/* Mode 1 & 2: particle/verb buttons */
.options-grid { display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; width:100%; max-width:500px; }
.opt { background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:.5rem 1.1rem; font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:600; color:var(--text); cursor:pointer; transition:all .16s; min-width:3.8rem; text-align:center; }
.opt:hover { border-color:var(--gold); background:var(--gold-dim); }
.opt.correct { background:var(--correct-dim); border-color:var(--correct); color:var(--correct); pointer-events:none; }
.opt.wrong   { background:var(--wrong-dim);   border-color:var(--wrong);   color:var(--wrong);   pointer-events:none; animation:shake .35s; }
.opt.used    { opacity:.3; pointer-events:none; }

/* Mode 3: fun card-matching */
.cards-area { width:100%; }
.cards-label { font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-bottom:.6rem; text-align:center; }
.cards-grid { display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center; }
.match-card {
  background:var(--surface2); border:2px solid var(--border2);
  border-radius:10px; padding:.55rem 1rem;
  font-family:'DM Sans',sans-serif; font-size:.92rem; font-weight:600;
  cursor:pointer; transition:all .18s; text-align:center;
  min-width:80px; position:relative; user-select:none;
}
.match-card::before {
  content:''; position:absolute; inset:0; border-radius:8px;
  background:linear-gradient(135deg,rgba(255,255,255,.06),transparent);
  pointer-events:none;
}
.match-card:hover:not(.matched):not(.selected) {
  border-color:var(--gold); transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(212,175,55,.2);
}
.match-card.selected {
  border-color:var(--gold); background:var(--gold-dim); color:var(--gold);
  transform:translateY(-3px); box-shadow:0 8px 24px rgba(212,175,55,.3);
}
.match-card.matched {
  border-color:var(--correct); background:var(--correct-dim); color:var(--correct);
  pointer-events:none; transform:scale(.97);
}
.match-card.wrong-flash {
  border-color:var(--wrong); background:var(--wrong-dim);
  animation:shake .35s;
}
.match-card.verb-card { border-left:3px solid rgba(212,175,55,.5); }
.match-card.particle-card { border-left:3px solid rgba(79,195,247,.5); font-style:italic; }
.m3-progress { font-family:'Space Mono',monospace; font-size:.7rem; color:var(--muted); text-align:center; }

/* Mode 3 typed */
.type-input-wrap { display:flex; gap:.5rem; width:100%; max-width:380px; }
.type-input { flex:1; background:#0a0a0a; border:1px solid var(--border2); border-radius:4px; padding:.65rem .9rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:1rem; text-transform:lowercase; }
.type-input:focus { outline:none; border-color:var(--gold); }
.type-input.ok  { border-color:var(--correct); }
.type-input.bad { border-color:var(--wrong); animation:shake .35s; }

/* found list */
.found-area { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; width:100%; }
.found-area h3 { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
.found-chips { display:flex; flex-wrap:wrap; gap:.4rem; }
.found-chip { background:var(--gold-dim); border:1px solid rgba(212,175,55,.3); color:var(--gold); border-radius:99px; padding:.22rem .75rem; font-size:.8rem; font-weight:600; cursor:pointer; transition:background .15s; }
.found-chip:hover { background:rgba(212,175,55,.28); }
.penalty-flash { position:fixed; inset:0; background:rgba(192,57,43,.18); pointer-events:none; animation:pfade .5s ease forwards; z-index:50; }
@keyframes pfade { from{opacity:1} to{opacity:0} }

/* result */
.result-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.75rem; text-align:center; width:100%; animation:fadeIn .4s ease; }
.result-card h2 { font-family:'Playfair Display',serif; font-size:1.7rem; font-weight:700; margin-bottom:.4rem; }
.result-msg { color:var(--muted); font-size:.88rem; margin-bottom:1rem; }
.missed-title { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:.5rem; }
.missed-chips { display:flex; flex-wrap:wrap; gap:.4rem; justify-content:center; margin-bottom:1rem; }
.missed-chip { background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:.22rem .75rem; font-size:.8rem; color:var(--muted); cursor:pointer; transition:border-color .15s; }
.missed-chip:hover { border-color:var(--gold); color:var(--gold); }

.lb-section { width:100%; max-width:600px; padding:0 1rem 2.5rem; }

#phase-intro, #phase-game, #phase-result { width:100%; display:flex; flex-direction:column; align-items:center; gap:1rem; }

/* Gentle blink on inactive mode tabs to draw attention */
@keyframes modePulse {
  0%,100% { opacity:1; }
  50%      { opacity:.55; }
}
.diff-tab:not(.active), .mode-tab:not(.active) {
  animation: modePulse 2.8s ease-in-out infinite;
}
.diff-tab:not(.active):hover, .mode-tab:not(.active):hover {
  animation: none;
  opacity: 1;
}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">⚡ PhrasalBlitz</span>
  <span></span>
</nav>

<main>
<!-- INTRO -->
<div id="phase-intro">
  <!-- Mode tabs always visible -->
  <div class="diff-tabs" style="flex-wrap:wrap;gap:.3rem;justify-content:center;width:auto;align-self:center">
    <button class="diff-tab active" id="mTab1" onclick="selectMode(1)">Pick particle</button>
    <button class="diff-tab"        id="mTab2" onclick="selectMode(2)">Pick verb</button>
    <button class="diff-tab"        id="mTab3" onclick="selectMode(3)">Type it</button>
  </div>
  <div style="text-align:center; padding:.75rem 0;">
    <div class="eyebrow" style="margin-bottom:.4rem" id="introLabel">Today's verb</div>
    <div class="verb-hero" id="introVerb" style="min-height:2.5rem"></div>
  </div>
  <!-- Type it sub-mode (only shown for mode 3) -->
  <div id="typeSubMode" style="display:none;flex-direction:column;align-items:center;gap:.5rem;width:100%">
    <div class="eyebrow">Type…</div>
    <div class="diff-tabs">
      <button class="diff-tab active" id="typeSub1" onclick="selectTypeSub(1)">particles</button>
      <button class="diff-tab"        id="typeSub2" onclick="selectTypeSub(2)">verbs</button>
    </div>
  </div>
  <p style="color:var(--muted);font-size:.88rem;text-align:center;max-width:360px;line-height:1.65" id="modeDesc"></p>
  <button class="btn-primary" style="font-size:1rem;padding:.75rem 2.5rem" onclick="startGame()">Start →</button>
</div>

<!-- GAME -->
<div id="phase-game" style="display:none">
  <div class="hud" style="width:100%">
    <div class="timer-wrap">
      <svg viewBox="0 0 72 72" width="72" height="72">
        <circle class="timer-track" cx="36" cy="36" r="31"/>
        <circle class="timer-prog" id="timerCircle" cx="36" cy="36" r="31" stroke-dasharray="194.8" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="timerNum">60</div>
    </div>
    <div style="text-align:center;flex:1">
      <div class="instruction" id="gameInstruction"></div>
      <div class="verb-hero" id="gameVerb" style="font-size:2.2rem"></div>
      <div style="font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:.2rem" id="gameSubLabel"></div>
    </div>
    <div class="score-box">
      <div class="val" id="scoreVal">0</div>
      <div class="lbl">Found</div>
    </div>
  </div>

  <!-- Mode tabs visible during game too -->
  <div class="diff-tabs" style="flex-wrap:wrap;gap:.3rem;justify-content:center;width:100%">
    <button class="diff-tab" id="gTab1" onclick="switchMode(1)">Pick particle</button>
    <button class="diff-tab" id="gTab2" onclick="switchMode(2)">Pick verb</button>
    <button class="diff-tab" id="gTab3" onclick="switchMode(3)">Type it</button>
  </div>

  <!-- Mode 1: pick particle — given verb, find particles -->
  <div id="m1area" style="display:none;flex-direction:column;align-items:center;gap:.75rem;width:100%">
    <div class="instruction">Wrong answer = −5 seconds · Find all to finish early</div>
    <div class="options-grid" id="m1grid"></div>
  </div>

  <!-- Mode 2: pick verb — given particle, find verbs -->
  <div id="m2area" style="display:none;flex-direction:column;align-items:center;gap:.75rem;width:100%">
    <div class="instruction">Wrong answer = −5 seconds · Find all verbs that go with this particle</div>
    <div class="options-grid" id="m2grid"></div>
  </div>

  <!-- Mode 3: type it — type either particles or verbs -->
  <div id="m3area" style="display:none;flex-direction:column;align-items:center;gap:.75rem;width:100%">
    <div class="instruction" id="m3instruction">Type and press Enter · Wrong = −5 seconds</div>
    <div class="type-input-wrap">
      <input class="type-input" id="m3input" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="btn-primary" onclick="submitTyped()">→</button>
    </div>
    <!-- Hint: first letter -->
    <div id="hintArea" style="display:flex;align-items:center;gap:.75rem">
      <button class="btn-ghost" id="hintBtn" onclick="showTypeHint()">💡 Hint (first letter)</button>
      <span id="hintDisplay" style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);min-width:2rem"></span>
    </div>
  </div>

  <div class="found-area">
    <h3>Phrasal verbs found</h3>
    <div class="found-chips" id="foundChips"></div>
  </div>
</div>

<!-- RESULT -->
<div id="phase-result" style="display:none">
  <div class="result-card">
    <h2 id="resultHeadline"></h2>
    <div class="result-msg" id="resultMsg"></div>
    <div class="found-chips" id="resultFound" style="justify-content:center;margin-bottom:.75rem"></div>
    <div class="missed-title" id="missedTitle"></div>
    <div class="missed-chips" id="missedChips"></div>
    <button class="btn-ghost" style="margin-top:.5rem" onclick="resetGame()">Play again</button>
  </div>
  <div id="submitArea">
    <div class="submit-row">
      <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
      <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
    </div>
  </div>
  <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.25rem">
    <button class="btn-ghost" onclick="resetGame()">Play again</button>
    <button class="btn-ghost" onclick="goToIntro()">Change mode</button>
    <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
  </div>
</div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <div class="diff-tabs" style="margin-bottom:.75rem">
      <button class="diff-tab active" id="lbPb1" onclick="switchPbLb(1)">Pick particle</button>
      <button class="diff-tab"        id="lbPb2" onclick="switchPbLb(2)">Pick verb</button>
      <button class="diff-tab"        id="lbPb3" onclick="switchPbLb(3)">Type it</button>
    </div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>

// All possible particles used across all verbs
const ALL_PARTICLES = ['up','down','off','on','out','in','back','away','over','through','into','across','forward','after','apart','by','around','along','about','out of'];

const ALL_VERBS_FOR_MODE3 = VERBS.map(v => v.verb);

let selectedMode = 1;
let typeSubMode  = 1; // 1=type particles, 2=type verbs
let currentVerb, currentParticle, found, timer, timeLeft, finalScore;
let hintUsed = false;
let _easyVerbIdx = null, _easyParticleIdx = null, _hardVerbIdx = null;

// True per-play randomisation (not daily) — a different verb/particle
// every time the game is played, while still avoiding recent repeats
// for at least 10 days via the shared freshRandomIndex tracker.
function getEasyVerb() {
  if (_easyVerbIdx === null) {
    _easyVerbIdx = freshRandomIndex('phrasalblitz_easy', VERBS.length);
    markSeen('phrasalblitz_easy', _easyVerbIdx);
  }
  return VERBS[_easyVerbIdx];
}
function getHardVerb() {
  if (_hardVerbIdx === null) {
    // Pick a genuinely different verb from the easy one, fully randomised
    let idx = freshRandomIndex('phrasalblitz_hard', VERBS.length);
    if (_easyVerbIdx !== null && idx === _easyVerbIdx) {
      idx = (idx + 1) % VERBS.length;
    }
    _hardVerbIdx = idx;
    markSeen('phrasalblitz_hard', _hardVerbIdx);
  }
  return VERBS[_hardVerbIdx];
}
function getEasyParticle() {
  const particleCounts = {};
  VERBS.forEach(v => v.pairs.forEach(p => { particleCounts[p.p] = (particleCounts[p.p]||0)+1; }));
  const common = Object.keys(particleCounts).filter(p => particleCounts[p] >= 3);
  if (_easyParticleIdx === null) {
    _easyParticleIdx = freshRandomIndex('phrasalblitz_particle', common.length);
    markSeen('phrasalblitz_particle', _easyParticleIdx);
  }
  return common[_easyParticleIdx % common.length];
}

const MODE_DESC = {
  1: "Given today's verb, tap all the particles that make valid phrasal verbs. Wrong answer = −5 seconds.",
  2: "Given today's particle, tap all the verbs that go with it. Wrong answer = −5 seconds.",
  3: "Type the missing words from memory — no options shown! One hint available per game.",
};

function selectMode(n) {
  selectedMode = n;
  // Keep the leaderboard panel in sync with whichever mode is currently selected
  if (typeof switchPbLb === 'function') switchPbLb(n);
  [1,2,3].forEach(i => {
    const t = document.getElementById('mTab'+i); if(t) t.classList.toggle('active', i===n);
    const g = document.getElementById('gTab'+i); if(g) g.classList.toggle('active', i===n);
  });
  const descEl = document.getElementById('modeDesc');
  if(descEl) descEl.textContent = MODE_DESC[n];
  const tsm = document.getElementById('typeSubMode');
  if(tsm) tsm.style.display = n===3 ? 'flex' : 'none';
  updateIntroDisplay(); // ← always refresh the shown verb/particle
}

function updateIntroDisplay() {
  const el    = document.getElementById('introVerb');
  const label = document.getElementById('introLabel');
  if(!el || !label) return;
  if (selectedMode === 1) {
    const v = getEasyVerb();
    el.textContent    = v.verb;
    label.textContent = "Today's verb";
  } else if (selectedMode === 2) {
    const p = getEasyParticle();
    el.textContent    = p;
    label.textContent = "Today's particle";
  } else {
    // Type it — same word as easy modes, harder because you type not click
    if (typeSubMode === 1) {
      const v = getEasyVerb();
      el.textContent    = v.verb;
      label.textContent = "Today's verb — type all its particles";
    } else {
      const p = getEasyParticle();
      el.textContent    = p;
      label.textContent = "Today's particle — type all matching verbs";
    }
  }
}

function selectTypeSub(n) {
  typeSubMode = n;
  [1,2].forEach(i => { const t=document.getElementById('typeSub'+i); if(t) t.classList.toggle('active', i===n); });
  updateIntroDisplay(); // refresh when sub-mode changes
}

function switchMode(n) {
  clearInterval(timer);
  document.getElementById('phase-game').style.display  = 'none';
  document.getElementById('phase-result').style.display = 'none';
  document.getElementById('phase-intro').style.display  = 'flex';
  document.getElementById('m3input')?.removeEventListener('keydown', m3keydown);
  selectMode(n);
}


function currentLbKey() {
  if (selectedMode === 1) return 'phrasalblitz_particle';
  if (selectedMode === 2) return 'phrasalblitz_verb';
  // mode 3: type it — split further by typeSubMode if needed, but spec only has one 'type' key
  return 'phrasalblitz_type';
}

function init() {
  selectMode(1);       // sets mode tabs + calls updateIntroDisplay
  updateIntroDisplay(); // call again immediately to be safe
  // Sync LB tabs to the starting mode and show correct leaderboard
  switchPbLb(1);
}

function startGame() {
  found = new Set(); timeLeft = 60; finalScore = 0; hintUsed = false;
  document.getElementById('phase-intro').style.display = 'none';
  document.getElementById('phase-game').style.display  = 'flex';
  document.getElementById('scoreVal').textContent      = '0';
  document.getElementById('foundChips').innerHTML      = '';
  document.getElementById('gameSubLabel').textContent  = '';
  [1,2,3].forEach(i => { const a=document.getElementById('m'+i+'area'); if(a) a.style.display='none'; });

  // Update in-game tabs
  [1,2,3].forEach(i => { const gt=document.getElementById('gTab'+i); if(gt) gt.classList.toggle('active', i===selectedMode); });

  if (selectedMode === 1) {
    // Mode 1: given today's verb → pick correct particles
    currentVerb = getEasyVerb();
    document.getElementById('gameVerb').textContent       = currentVerb.verb;
    document.getElementById('gameInstruction').textContent = 'Pick all correct particles';
    document.getElementById('m1area').style.display        = 'flex';
    buildMode1();

  } else if (selectedMode === 2) {
    // Mode 2: given today's particle → pick verbs that use it
    currentParticle = getEasyParticle();
    document.getElementById('gameVerb').textContent       = currentParticle;
    document.getElementById('gameInstruction').textContent = 'Pick all verbs that go with this particle';
    document.getElementById('gameSubLabel').textContent    = 'verb + ' + currentParticle;
    document.getElementById('m2area').style.display        = 'flex';
    buildMode2();

  } else {
    // Mode 3: type it — harder verb/particle from different daily pick
    if (typeSubMode === 1) {
      // Use SAME verb as Pick Particle — harder because you type, not click
      currentVerb = getEasyVerb();
      document.getElementById('gameVerb').textContent       = currentVerb.verb;
      document.getElementById('gameInstruction').textContent = 'Type the particles — no options shown!';
      document.getElementById('m3input').placeholder        = 'e.g. up, away, into…';
    } else {
      // Use SAME particle as Pick Verb — harder because you type, not click
      currentParticle = getEasyParticle();
      document.getElementById('gameVerb').textContent       = currentParticle;
      document.getElementById('gameInstruction').textContent = 'Type verbs that go with this particle';
      document.getElementById('gameSubLabel').textContent    = 'verb + ' + currentParticle;
      document.getElementById('m3input').placeholder        = 'e.g. give, take, put…';
    }
    document.getElementById('m3area').style.display = 'flex';
    document.getElementById('hintBtn').style.display = 'inline-block';
    document.getElementById('hintDisplay').textContent = '';
    document.getElementById('m3input').value = '';
    document.getElementById('m3input').addEventListener('keydown', m3keydown);
    document.getElementById('m3input').focus();
  }
  runTimer();
}

// ── Mode 1: Pick particle ─────────────────────────────────────────
function buildMode1() {
  const correctParticles = new Set(currentVerb.pairs.map(p => p.p));
  const distractors = ALL_PARTICLES.filter(p => !correctParticles.has(p));
  const shown = shuffle([...correctParticles, ...distractors.slice(0, Math.min(12, distractors.length))]);
  const grid = document.getElementById('m1grid'); grid.innerHTML = '';
  shown.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'opt'; btn.textContent = p; btn.dataset.p = p;
    btn.addEventListener('click', () => clickParticle(p, btn, correctParticles));
    grid.appendChild(btn);
  });
}

function clickParticle(p, btn, correctSet) {
  if (found.has(p)) return;
  if (correctSet.has(p)) {
    found.add(p);
    btn.classList.add('correct');
    addFoundChip(currentVerb.verb + ' ' + p, p);
    finalScore++;
    document.getElementById('scoreVal').textContent = finalScore;
    if (found.size === currentVerb.pairs.length) { clearInterval(timer); setTimeout(endGame, 500); }
  } else {
    btn.classList.add('wrong');
    penalise();
    setTimeout(() => btn.classList.remove('wrong'), 600);
  }
}

// ── Mode 2: Pick verb ──────────────────────────────────────────────
function buildMode2() {
  // Find all verbs that have currentParticle as a pair
  const correctVerbs = new Set(
    VERBS.filter(v => v.pairs.some(p => p.p === currentParticle)).map(v => v.verb)
  );
  // Distractor verbs (those that DON'T use this particle)
  const distractorVerbs = VERBS.filter(v => !correctVerbs.has(v.verb)).map(v => v.verb);
  const shown = shuffle([...correctVerbs, ...distractorVerbs.slice(0, Math.min(10, distractorVerbs.length))]);
  const grid = document.getElementById('m2grid'); grid.innerHTML = '';
  shown.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'opt'; btn.textContent = v;
    btn.addEventListener('click', () => clickVerb(v, btn, correctVerbs));
    grid.appendChild(btn);
  });
  // Store target count
  currentVerb = { verb: currentParticle, pairs: [...correctVerbs].map(v => ({p:v,def:'',ex:''})), _correctVerbs: correctVerbs };
}

function clickVerb(v, btn, correctSet) {
  if (found.has(v)) return;
  if (correctSet.has(v)) {
    found.add(v);
    btn.classList.add('correct');
    // Find the actual pair data for the definition
    const verbObj = VERBS.find(vb => vb.verb === v);
    const pairObj = verbObj?.pairs.find(p => p.p === currentParticle);
    addFoundChipVerb(v + ' ' + currentParticle, v + ' ' + currentParticle, pairObj || {});
    finalScore++;
    document.getElementById('scoreVal').textContent = finalScore;
    if (found.size === correctSet.size) { clearInterval(timer); setTimeout(endGame, 500); }
  } else {
    btn.classList.add('wrong');
    penalise();
    setTimeout(() => btn.classList.remove('wrong'), 600);
  }
}

// ── Mode 3: Type it ───────────────────────────────────────────────
function m3keydown(e) { if (e.key === 'Enter') submitTyped(); }

function showTypeHint() {
  if (hintUsed) return;
  hintUsed = true;
  document.getElementById('hintBtn').style.display = 'none';
  // Find next unfound correct answer and reveal first letter
  if (typeSubMode === 1) {
    const unfound = currentVerb.pairs.map(p=>p.p).filter(p=>!found.has(p));
    if (unfound.length > 0) {
      document.getElementById('hintDisplay').textContent = unfound[0][0].toUpperCase() + '…';
    }
  } else {
    const correctVerbs = VERBS.filter(v=>v.pairs.some(p=>p.p===currentParticle)).map(v=>v.verb);
    const unfound = correctVerbs.filter(v=>!found.has(v));
    if (unfound.length > 0) {
      document.getElementById('hintDisplay').textContent = unfound[0][0].toUpperCase() + '…';
    }
  }
}

function submitTyped() {
  const inp = document.getElementById('m3input');
  const val = inp.value.trim().toLowerCase();
  if (!val) return;

  if (typeSubMode === 1) {
    // Typing particles for currentVerb
    const correctParticles = currentVerb.pairs.map(p => p.p);
    if (correctParticles.includes(val) && !found.has(val)) {
      found.add(val);
      inp.className = 'type-input ok';
      addFoundChip(currentVerb.verb + ' ' + val, val);
      finalScore++;
      document.getElementById('scoreVal').textContent = finalScore;
      if (found.size === currentVerb.pairs.length) { clearInterval(timer); setTimeout(endGame, 500); }
    } else if (found.has(val)) {
      inp.className = 'type-input bad';
    } else {
      inp.className = 'type-input bad';
      penalise();
    }
  } else {
    // Typing verbs for currentParticle
    const correctVerbs = new Set(VERBS.filter(v=>v.pairs.some(p=>p.p===currentParticle)).map(v=>v.verb));
    if (correctVerbs.has(val) && !found.has(val)) {
      found.add(val);
      inp.className = 'type-input ok';
      const verbObj = VERBS.find(v=>v.verb===val);
      const pairObj = verbObj?.pairs.find(p=>p.p===currentParticle);
      addFoundChipVerb(val + ' ' + currentParticle, val + ' ' + currentParticle, pairObj);
      finalScore++;
      document.getElementById('scoreVal').textContent = finalScore;
      if (found.size === correctVerbs.size) { clearInterval(timer); setTimeout(endGame, 500); }
    } else if (found.has(val)) {
      inp.className = 'type-input bad';
    } else {
      inp.className = 'type-input bad';
      penalise();
    }
  }
  inp.value = '';
  setTimeout(() => { inp.className = 'type-input'; inp.focus(); }, 400);
}


// ── Shared helpers ────────────────────────────────────────────────
function addFoundChip(label, key) {
  const chip = document.createElement('span');
  chip.className = 'found-chip';
  chip.textContent = label;
  chip.addEventListener('click', () => {
    const pair = currentVerb.pairs.find(p => p.p === key);
    if (pair) showPhrasalModal(currentVerb.verb + ' ' + pair.p, pair.def, pair.ex);
  });
  document.getElementById('foundChips').appendChild(chip);
}

function addFoundChipVerb(label, phrasal, pairObj) {
  // label = display text on chip (e.g. "carry away")
  // phrasal = full phrasal verb for modal title
  // pairObj = {def, ex} from VERBS data
  const chip = document.createElement('span');
  chip.className = 'found-chip';
  chip.textContent = label;
  chip.addEventListener('click', () => {
    if (pairObj && (pairObj.def || pairObj.ex)) {
      showPhrasalModal(phrasal, pairObj.def || '', pairObj.ex || '');
    } else {
      // Try to look up def from VERBS data
      const parts  = label.split(' ');
      const verb   = parts[0];
      const particle = parts.slice(1).join(' ');
      const verbObj  = VERBS.find(v => v.verb === verb);
      const pair     = verbObj && verbObj.pairs.find(p => p.p === particle);
      if (pair) showPhrasalModal(label, pair.def, pair.ex);
    }
  });
  document.getElementById('foundChips').appendChild(chip);
}

function penalise() {
  timeLeft = Math.max(0, timeLeft - 5);
  document.getElementById('timerNum').textContent = timeLeft;
  updateRing();
  const flash = document.createElement('div');
  flash.className = 'penalty-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 500);
  if (timeLeft <= 0) { clearInterval(timer); endGame(); }
}

function runTimer() {
  updateRing();
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById('timerNum').textContent = timeLeft;
    updateRing();
    if (timeLeft <= 10) document.getElementById('timerCircle').style.stroke = 'var(--wrong)';
    if (timeLeft <= 0) { clearInterval(timer); endGame(); }
  }, 1000);
}
function updateRing() {
  const c = 194.8;
  document.getElementById('timerCircle').style.strokeDashoffset = c - (timeLeft / 60) * c;
}

function endGame() {
  document.getElementById('phase-game').style.display = 'none';
  document.getElementById('phase-result').style.display = 'flex';

  // Reset the submit form — prevents a stale "Score submitted!" message
  // from a previous mode/round persisting and hiding the input/button.
  const submitAreaEl = document.getElementById('submitArea');
  if (submitAreaEl) {
    submitAreaEl.innerHTML = `
      <div class="submit-row">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" type="button" onclick="doSubmit()">Add to leaderboard</button>
      </div>`;
  }

  // Calculate total possible answers based on mode
  let total;
  if (selectedMode === 1 || (selectedMode === 3 && typeSubMode === 1)) {
    total = currentVerb ? currentVerb.pairs.length : 1;
  } else {
    total = currentParticle
      ? VERBS.filter(v => v.pairs.some(p => p.p === currentParticle)).length
      : 1;
  }
  document.getElementById('resultHeadline').textContent = `${finalScore} of ${total} found!`;
  document.getElementById('resultMsg').textContent = finalScore === total ? '🎉 Perfect — you got them all!' : finalScore >= total/2 ? '👏 Great effort!' : 'Keep practising — phrasal verbs take time!';

  // Found chips in result — copy from foundChips (which already have click handlers)
  const rf = document.getElementById('resultFound');
  rf.innerHTML = '';
  // foundChips already have correct click handlers attached when chips were added
  // Clone them and re-attach from stored data on dataset
  document.querySelectorAll('#foundChips .found-chip').forEach(chip => {
    const clone = document.createElement('span');
    clone.className = 'found-chip';
    clone.textContent = chip.textContent;
    // Store the phrasal verb data on the original chip via dataset, copy across
    const label = chip.textContent;
    clone.addEventListener('click', () => {
      // Parse "verb particle" from label
      const parts    = label.split(' ');
      const verb     = parts[0];
      const particle = parts.slice(1).join(' ');
      const verbObj  = VERBS.find(v => v.verb === verb);
      const pairObj  = verbObj && verbObj.pairs.find(p => p.p === particle);
      if (pairObj) {
        showPhrasalModal(label, pairObj.def, pairObj.ex);
      } else {
        // Fallback: show label with a note
        showPhrasalModal(label, 'See a dictionary for the full definition.', '');
      }
    });
    rf.appendChild(clone);
  });

  // Missed — handle all three modes
  const missedEl    = document.getElementById('missedChips'); missedEl.innerHTML = '';
  const missedTitle = document.getElementById('missedTitle');

  let missedItems = [];
  if (selectedMode === 1 || selectedMode === 3 && typeSubMode === 1) {
    // Missed particles for currentVerb
    missedItems = currentVerb.pairs.filter(p => !found.has(p.p))
      .map(p => ({ label: currentVerb.verb+' '+p.p, def:p.def, ex:p.ex }));
  } else {
    // Missed verbs for currentParticle
    const correctVerbs = VERBS.filter(v => v.pairs.some(p => p.p === currentParticle));
    missedItems = correctVerbs.filter(v => !found.has(v.verb)).map(v => {
      const pObj = v.pairs.find(p => p.p === currentParticle);
      return { label: v.verb + ' ' + currentParticle, def: pObj?.def||'—', ex: pObj?.ex||'—' };
    });
  }

  if (missedItems.length > 0) {
    missedTitle.textContent = 'You missed:';
    missedItems.forEach(m => {
      const chip = document.createElement('span');
      chip.className = 'missed-chip'; chip.textContent = m.label;
      chip.addEventListener('click', () => showPhrasalModal(m.label, m.def, m.ex));
      missedEl.appendChild(chip);
    });
  } else { missedTitle.textContent = ''; }

  document.getElementById('submitArea').dataset.score = finalScore * 10;
  // Show the leaderboard for the mode that was actually just played
  const playedKey = currentLbKey();
  switchPbLb(selectedMode); // also updates the visible LB tab to match
  renderLeaderboard(playedKey, 'lbBody');
}

function resetGame() {
  document.getElementById('phase-result').style.display = 'none';
  document.getElementById('phase-intro').style.display = 'flex';
  document.getElementById('m2input')?.removeEventListener('keydown', m2keydown);
  document.getElementById('m3input')?.removeEventListener('keydown', m3keydown);
}
function goToIntro() {
  document.getElementById('phase-result').style.display = 'none';
  document.getElementById('phase-game').style.display   = 'none';
  document.getElementById('phase-intro').style.display  = 'flex';
  document.getElementById('m2input')?.removeEventListener('keydown', m2keydown);
  document.getElementById('m3input')?.removeEventListener('keydown', m3keydown);
  clearInterval(timer);
}

async function doSubmit() {
  const area = document.getElementById('submitArea');
  await handleScoreSubmit(currentLbKey(), parseInt(area.dataset.score), 'nameInput', 'submitArea', 'lbBody');
}

init();

function switchPbLb(n) {
  [1,2,3].forEach(i => document.getElementById('lbPb'+i).classList.toggle('active', i===n));
  const keys = { 1:'phrasalblitz_particle', 2:'phrasalblitz_verb', 3:'phrasalblitz_type' };
  renderLeaderboard(keys[n], 'lbBody');
}
</script>
