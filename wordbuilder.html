<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Word Builder — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:560px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }

.stats-row { display:flex; gap:.5rem; width:100%; }
.stat-box  { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.5rem .5rem; text-align:center; }
.stat-box .val { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:var(--gold); }
.stat-box .lbl { font-family:'Space Mono',monospace; font-size:.55rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }

/* Timer */
.timer-wrap { width:100%; }
.timer-track { width:100%; height:6px; background:var(--border2); border-radius:99px; overflow:hidden; }
.timer-fill  { height:100%; background:var(--gold); border-radius:99px; transition:width .5s linear, background .4s; }
.timer-fill.urgent { background:var(--wrong); }
.timer-row { display:flex; justify-content:space-between; margin-top:.25rem; }
.timer-row span { font-family:'Space Mono',monospace; font-size:.65rem; color:var(--muted); }
.timer-sec { color:var(--gold) !important; font-weight:700; }
.timer-sec.urgent { color:var(--wrong) !important; }

/* Letter rack */
.rack-label { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); }
.rack { display:flex; gap:.4rem; justify-content:center; flex-wrap:wrap; }
.rack-tile {
  width:52px; height:58px;
  border:2px solid var(--border2); border-radius:8px;
  background:var(--surface2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s; user-select:none; position:relative;
}
.rack-tile .letter { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--text); }
.rack-tile .pts    { font-family:'Space Mono',monospace; font-size:.55rem; color:var(--muted); }
.rack-tile:hover:not(.used) { border-color:var(--gold); background:var(--gold-dim); }
.rack-tile:hover:not(.used) .letter { color:var(--gold); }
.rack-tile.used { opacity:.2; pointer-events:none; }
.rack-tile.selected { border-color:var(--gold); background:var(--gold-dim); }
.rack-tile.selected .letter { color:var(--gold); }

/* Current word display */
.word-display {
  min-height:64px; width:100%;
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:.75rem 1rem;
  display:flex; align-items:center; justify-content:center;
  gap:.3rem; flex-wrap:wrap;
}
.word-tile {
  width:44px; height:50px;
  border:2px solid var(--gold); border-radius:6px;
  background:var(--gold-dim);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700;
  color:var(--gold); cursor:pointer; transition:all .15s;
}
.word-tile:hover { background:var(--gold-glow); border-color:rgba(212,175,55,.8); }
.word-placeholder { font-family:'Space Mono',monospace; font-size:.75rem; color:var(--muted2); letter-spacing:.12em; }

/* Actions */
.action-row { display:flex; gap:.5rem; justify-content:center; flex-wrap:wrap; }

/* Found words */
.found-section { width:100%; }
.found-section h3 { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
.found-chips { display:flex; flex-wrap:wrap; gap:.35rem; }
.found-chip {
  background:var(--gold-dim); border:1px solid rgba(212,175,55,.3);
  color:var(--gold); border-radius:99px;
  padding:.22rem .75rem; font-size:.8rem; font-weight:600;
  cursor:pointer; transition:background .15s;
}
.found-chip:hover { background:rgba(212,175,55,.28); }
.found-chip .chip-pts { font-size:.65rem; opacity:.7; margin-left:.2rem; }

/* Feedback */
.feedback { min-height:1.4rem; font-size:.88rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok  { color:var(--correct); }
.feedback.bad { color:var(--wrong); }
.feedback.info{ color:var(--gold); }

/* End card */
.end-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; animation:fadeIn .4s ease; }
.end-score { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--gold); }
.missed-section { width:100%; text-align:left; }
.missed-section h4 { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:.4rem; }
.missed-chips { display:flex; flex-wrap:wrap; gap:.35rem; }
.missed-chip { background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:.22rem .75rem; font-size:.8rem; color:var(--muted); cursor:pointer; transition:border-color .15s; }
.missed-chip:hover { border-color:var(--gold); color:var(--gold); }

.lb-section { width:100%; max-width:560px; padding:0 1rem 2.5rem; }

/* Gentle blink on inactive mode tabs */
@keyframes modePulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.diff-tab:not(.active) { animation:modePulse 2.8s ease-in-out infinite; }
.diff-tab:not(.active):hover { animation:none; opacity:1; }

/* Letter point values (Scrabble-inspired) */
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">🔨 Word Builder</span>
  <span></span>
</nav>

<main>
  <!-- Difficulty + round info -->
  <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:.5rem">
    <div class="diff-tabs">
      <button class="diff-tab active" id="tabE" onclick="setDiff('easy')">6 letters</button>
      <button class="diff-tab"        id="tabH" onclick="setDiff('hard')">8 letters</button>
    </div>
    <div class="eyebrow" id="roundLabel">Round 1 of 5</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
    <div class="stat-box"><div class="val" id="wordsVal">0</div><div class="lbl">Words</div></div>
    <div class="stat-box"><div class="val" id="bestVal">—</div><div class="lbl">Longest</div></div>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="timer-row"><span>Time</span><span class="timer-sec" id="timerSec">90s</span></div>
  </div>

  <!-- Instruction -->
  <div class="rack-label">Make as many words as you can from these letters</div>

  <!-- Letter rack -->
  <div class="rack" id="rack"></div>

  <!-- Current word being built -->
  <div class="word-display" id="wordDisplay">
    <span class="word-placeholder" id="wordPlaceholder">Tap letters to build a word</span>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="btn-primary" onclick="submitWord()">Submit ✓</button>
    <button class="btn-ghost"   onclick="clearWord()">✕ Clear</button>
    <button class="btn-ghost"   onclick="shuffleRack()">🔀 Shuffle</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <!-- Found words -->
  <div class="found-section">
    <h3>Words found (<span id="foundCount">0</span>)</h3>
    <div class="found-chips" id="foundChips"></div>
  </div>

  <!-- End card -->
  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow">Round complete</div>
    <div class="end-score" id="endScore"></div>
    <p style="color:var(--muted);font-size:.88rem" id="endMsg"></p>
    <div class="missed-section" id="missedSection" style="display:none">
      <h4>You could also have made:</h4>
      <div class="missed-chips" id="missedChips"></div>
    </div>
    <div id="submitArea" style="width:100%">
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center">
      <button class="btn-ghost" onclick="nextRound()">Next round →</button>
      <button class="btn-ghost" onclick="restartGame()">Restart</button>
      <button class="btn-ghost" onclick="setDiff(diff==='easy'?'hard':'easy')" id="switchBtn"></button>
      <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
    </div>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>
<script>
// ── Letter point values (Scrabble-inspired) ──────────────────────
const LETTER_PTS = {
  A:1,E:1,I:1,O:1,U:1,L:1,N:1,S:1,T:1,R:1,
  D:2,G:2,
  B:3,C:3,M:3,P:3,
  F:4,H:4,V:4,W:4,Y:4,
  K:5,
  J:8,X:8,
  Q:10,Z:10,
};

// ── Letter racks — curated sets that make many words ─────────────
// Easy: 6-letter racks; Hard: 8-letter racks
// Each rack has a list of valid words that can be made from it
const RACKS_EASY = [
  { letters:'AELRST', words:['ARE','ATE','EAR','EAT','ERA','ALE','ART','LAT','LAR','LEST','LATE','LATS','RATE','REAL','REST','SALE','SEAL','SEAT','STAR','STALE','STARE','STEAL','TALES','TALES','TARE','TALE','TEAR','TEAL','EARL','REALS','RATES','LATER','RATEL','LEAST','ALERT','ALTER','LASER','RALES','LARES','ARLES','STALER','ALERTS','ALTERS','RATELS','STELAR'] },
  { letters:'AEINST', words:['ANT','ANE','ATE','EAT','SET','SIN','SIT','NET','TEN','TIE','SEA','SEA','ANTE','ANTI','NEAT','SANE','SINE','SITE','TEEN','TEEN','NITE','ANTI','ANISE','INSET','SATIN','ANTIS','TAINS','SAINT','NASTY','STAIN','TSINE','SENAT','TINEA','NATES','STEIN','ENTAIL'] },
  { letters:'EGLNOS', words:['LOG','LON','ONE','NOG','SON','SOL','EON','LEG','GEL','GONE','LOGE','LONE','LONG','NOSE','ONES','SONG','SOLE','LONG','LOGE','OGLE','SLOE','ENOL','GOEL','LENO','LONE','NODE','NOEL','OGLE','SNOG','SNOB','SONG','SOLE','SLOE','GLEN','GELS','LOGE','GLOZE','LONGES','SNOGLE'] },
  { letters:'ACDORS', words:['CAR','COD','COR','OAR','OCA','ORC','ROD','SAC','SOD','ARCO','CARD','CORD','DORS','OARS','RODS','SCAR','SCAD','SOAR','SORD','DRAC','ADOS','DOCS','DOCS','DRACO','CORDS','CARDS','ROADS','SOAR','ACORN','ACORNS','CORADS'] },
  { letters:'EGILNT', words:['GEL','GET','GIN','LEG','LET','LIE','LIT','NET','NIL','NIT','TIE','TIN','GELT','GILT','GLEN','GLIB','GLINT','LENT','LIEN','LITE','TING','TILE','TINE','TELL','INLET','LITER','TINGLE','TILING','TINGLE','LITER','LINTER','LETING','TINGLE','LINGET','ENGILT'] },
  { letters:'AENRST', words:['ANT','ARE','ART','EAR','EAT','ERA','NET','RAN','RAT','TAN','TAR','TEN','ANTE','ANTE','EARN','NEAR','NEARS','RANT','RATE','RANT','RENT','RENTS','STAR','RANT','TERNS','TRANS','RANTS','EARNS','STERN','RENAL','NEARS','STARE','RENTS','STERN','SNARE','NATTER','SANER','RATTEN','RANT','NERDS','RANTED'] },
  { letters:'CDEILNO', words:['COD','CON','DIN','DOC','ION','NIL','NOD','ODE','OIL','OLD','ONE','CLOD','COIL','COIN','COLD','COLE','CONE','DECO','DELI','DENI','DICE','DION','DOLE','DONE','ICON','IDLE','LICE','LIDO','LINE','LOIN','LODE','LONE','LORE','NODE','NOEL','COILED','COINED','CLONED','DENIED','LINCED','COINED','DOCILE','DECLINE','INCODEL'] },
  { letters:'AGHINT', words:['ANT','GIN','HAG','HAN','HAT','HIT','NAG','NAH','NIT','TAH','TAN','TIN','GAIN','GAIT','GIANT','GNAT','HANG','HINT','NIGH','NIGHT','TANG','THAN','THUG','NAIGH','NIGHTA','HANTIG','NAIGHT'] },
];

const RACKS_HARD = [
  { letters:'AEINORST', words:['ARE','ANT','EAR','EAT','ERA','NET','NOT','OAR','ONE','ORE','ROT','RAN','RON','TEN','TON','TAR','ANTE','EARN','IRON','NEAR','NOTE','NOSE','ONTO','RANT','RATE','RENT','ROAN','ROSE','ROTE','SORE','SNOT','STAR','STERN','STONER','ATONER','SENATOR','TREASON','RATIONS','NOTARIES','SENORITA'] },
  { letters:'ACDEHIRT', words:['ACE','ACH','AID','AIR','ARC','ATE','CAD','CAR','CAT','DAH','DIE','DIT','EAR','ETA','HAD','HAT','HIT','ICE','IRE','RAH','RAT','TAD','TAR','ACID','ACHE','ARCH','AIDE','ARID','CARE','CART','CHAD','CHAR','CHAT','CHID','CITE','DEAR','DIRE','DIRT','DRAT','EACH','ETCH','HAIR','HARD','HATE','HEAR','HEAT','HEIR','HIRE','IDEA','ITCH','RACE','RAID','RATA','RICH','RICE','RIDE','TIDE','TIED','TIER','TIRE','TRADE','TRACE','TIRADE','DITHER','HATRED','THRICE','THRICED','DITCHER'] },
  { letters:'BCEILNOS', words:['BIO','BON','CON','ION','NIL','NOB','SON','SOB','BIOS','BILE','BONE','BOLE','BONS','COIN','COLE','CONE','CORE','ICON','ISLE','LOBE','LOCI','LOIN','LONE','NOEL','SLOB','SNOB','SOIL','SOLE','SONIC','COILS','COINS','BONES','BONCE','BOLES','ONICE','OLDIE','BONCE','LIONS','COBIA','BISCON','CONICS','LOINS','BLOCS','SONIC','BINOCS','BLONCE','BICONE'] },
  { letters:'ADEHIRST', words:['AID','AIR','AIT','ARE','ART','ASH','DAH','EAR','ETA','HAD','HAT','HID','HIS','HIT','RAH','RAT','RED','RID','SAD','TAD','TAR','AIDE','AIRD','ARID','DASH','DEAR','DAIS','DIRE','DIRT','DISH','DRAT','EDIT','HAIR','HARD','HATE','HEAR','HEIR','HIDE','HIRE','IDEA','IDES','IRATE','RAID','RATS','RASH','READ','RIDE','RISE','SIDE','SIRE','SITE','STAR','STAID','STIR','TADS','TIDE','TIED','TIER','TIRE','TREAD','TRIAD','TRIED','SHARE','SHADE','DIREST','TIRADE','HATRED','SHARED','THREADS','HARDIEST'] },
  { letters:'CEILNORS', words:['CON','COR','ELM','EON','ION','NIL','NOR','ONE','ORE','ROC','SON','CEIL','COIL','COIN','COLE','CONE','CORE','CORN','CRONE','ENOL','ICON','IRON','LICE','LORE','LOIN','LONE','LORE','NICE','REIN','RICE','ROLE','ROSE','RILE','REIN','SINE','SNORE','SONIC','SLICE','SCONE','RECOIL','ROSINE','NORICE','CLONER','CORNEAL','CLONIER','RELICONS','CORNILES'] },
  { letters:'ADGILNOR', words:['ADO','AID','AIR','DIG','DIN','DOG','DON','GAD','GAL','GEL','GOD','GOL','GON','LAD','LAG','LID','LOG','LON','NAD','NAG','NOD','OAR','OAD','RAD','RAG','RAN','RID','RIG','ROD','LAIR','LAND','LARD','LARI','LION','LOAD','LOAN','LOIN','LORD','NAIL','NARD','NAROD','NIGH','NODE','NOIR','NORA','ORAL','ROAD','ROAN','ROIL','SOLID','GROIN','LAOID','DRAIL','GROAN','GONALI','ORDINAL','LOADING','GLORIAD','DRAGONIL'] },
  { letters:'EGHILNST', words:['GEL','GET','GIN','HEN','HIT','LEG','LET','LIE','LIT','NET','NIL','NIT','SET','SHE','SIN','SIT','THE','TIE','TIN','GELT','GILT','GLEN','GENT','GIST','GELS','HILT','HINT','LENT','LEST','LIES','LIEN','LITE','NEST','NILS','NITE','SELL','SHIN','SIGH','SING','SITE','SLIT','SNIT','THEN','TILE','TING','TINE','TINS','GLINT','NIGHT','LENTILS','LIGHTS','SLIGHT','TINGLE','SLEIGHT','NIGHTLY','SLIGHTED','NIGHTELS'] },
  { letters:'ABEGINRS', words:['AGE','AIM','AIN','AIR','ARE','BAG','BAN','BAR','BEG','BIN','BRE','EAR','ERA','GAN','GAS','GIN','NAB','NAG','RAN','RIB','SAG','SIN','ABLE','BANE','BARE','BARGE','BARN','BEAN','BEAR','BIER','BILE','BINGE','BING','BRAN','BRIG','GAIN','GARB','GABS','GEAR','GRAB','GRIN','BARGE','REIN','RING','SANER','BRAIN','REIGN','GRAINS','BANGER','SNARE','GIBERS','GIANTS','BEGINS','BRAISED','BEARING','BEARINGS'] },
];

// ── Simple dictionary for validation (common 3-8 letter words) ────
// We use the dwyl word list if available, otherwise a local set
let DICT = new Set();
let dictLoaded = false;

async function loadDict() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt');
    const text = await r.text();
    text.split('\n').forEach(w => {
      const clean = w.trim().toLowerCase();
      if(clean.length >= 3 && clean.length <= 9) DICT.add(clean);
    });
    dictLoaded = true;
  } catch(e) {
    // Fallback: use rack's own word list
    dictLoaded = false;
  }
}

// ── State ─────────────────────────────────────────────────────────
let diff = 'easy', rackBank = RACKS_EASY;
let currentRack = null, rackLetters = [], selectedIndices = [];
let found = new Set(), totalScore = 0, roundNum = 0, longestWord = '';
let timerInterval = null, timeLeft = 90;
const ROUNDS_PER_GAME = 5;
const ROUND_TIME = 90;

function setDiff(d) {
  diff = d; rackBank = d==='easy' ? RACKS_EASY : RACKS_HARD;
  document.getElementById('tabE').classList.toggle('active', d==='easy');
  document.getElementById('tabH').classList.toggle('active', d==='hard');
  document.getElementById('switchBtn').textContent = d==='easy' ? 'Switch to 8 letters' : 'Switch to 6 letters';
  restartGame();
}

function restartGame() {
  totalScore = 0; roundNum = 0; longestWord = '';
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('bestVal').textContent  = '—';
  document.getElementById('endCard').style.display = 'none';
  nextRound();
  renderLeaderboard('wordbuilder_'+diff, 'lbBody');
}

function nextRound() {
  if(roundNum >= ROUNDS_PER_GAME){ finalEnd(); return; }
  document.getElementById('endCard').style.display = 'none';
  const idx = (freshDailyIndex('wordbuilder_'+diff, rackBank.length) + roundNum) % rackBank.length;
  if(roundNum === 0) markSeen('wordbuilder_'+diff, idx);
  currentRack = rackBank[idx];
  rackLetters = shuffle([...currentRack.letters.split('')]);
  found = new Set(); selectedIndices = [];
  roundNum++;
  document.getElementById('roundLabel').textContent = `Round ${roundNum} of ${ROUNDS_PER_GAME}`;
  document.getElementById('wordsVal').textContent = 0;
  document.getElementById('foundChips').innerHTML = '';
  document.getElementById('foundCount').textContent = 0;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  buildRack();
  clearWord();
  startTimer();
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildRack() {
  const rack = document.getElementById('rack'); rack.innerHTML='';
  rackLetters.forEach((l,i)=>{
    const t=document.createElement('div'); t.className='rack-tile'; t.id='rt'+i;
    t.innerHTML=`<span class="letter">${l}</span><span class="pts">${LETTER_PTS[l]||1}</span>`;
    t.addEventListener('click',()=>selectLetter(i));
    rack.appendChild(t);
  });
}

function selectLetter(i) {
  const tile = document.getElementById('rt'+i);
  if(tile.classList.contains('used')) return;
  tile.classList.add('used');
  selectedIndices.push(i);
  updateWordDisplay();
}

function updateWordDisplay() {
  const wd = document.getElementById('wordDisplay');
  const ph = document.getElementById('wordPlaceholder');
  wd.innerHTML='';
  if(selectedIndices.length===0){
    ph.style.display='block'; wd.appendChild(ph);
    return;
  }
  ph.style.display='none';
  selectedIndices.forEach((idx,pos)=>{
    const t=document.createElement('div'); t.className='word-tile';
    t.textContent=rackLetters[idx];
    t.addEventListener('click',()=>removeLetter(pos));
    wd.appendChild(t);
  });
}

function removeLetter(pos) {
  const rackIdx = selectedIndices[pos];
  document.getElementById('rt'+rackIdx).classList.remove('used');
  selectedIndices.splice(pos,1);
  updateWordDisplay();
}

function clearWord() {
  selectedIndices.forEach(i=>document.getElementById('rt'+i)?.classList.remove('used'));
  selectedIndices=[];
  updateWordDisplay();
}

function shuffleRack() {
  rackLetters = shuffle(rackLetters);
  clearWord();
  buildRack();
}

function submitWord() {
  if(selectedIndices.length<3){ showFeedback('Minimum 3 letters!','bad'); return; }
  const word = selectedIndices.map(i=>rackLetters[i]).join('').toLowerCase();

  if(found.has(word)){ showFeedback('Already found that word!','bad'); return; }

  // Validate: either in rack's own list, or in dictionary
  const inList = currentRack.words.map(w=>w.toLowerCase()).includes(word);
  const inDict = dictLoaded ? DICT.has(word) : false;

  // Also check can be made from rack letters
  const canMake = canMakeFrom(word, currentRack.letters);

  if((!inList && !inDict) || !canMake){
    showFeedback(`"${word.toUpperCase()}" not accepted — try another`,'bad');
    clearWord();
    return;
  }

  // Score: sum of letter values × length bonus
  const letterScore = word.toUpperCase().split('').reduce((s,l)=>s+(LETTER_PTS[l]||1),0);
  const lengthBonus = word.length >= 6 ? 10 : word.length >= 5 ? 5 : 0;
  const pts = letterScore + lengthBonus;

  found.add(word);
  totalScore += pts;
  if(word.length > longestWord.length) longestWord = word.toUpperCase();

  document.getElementById('scoreVal').textContent = totalScore;
  document.getElementById('wordsVal').textContent = found.size;
  document.getElementById('foundCount').textContent = found.size;
  document.getElementById('bestVal').textContent = longestWord || '—';

  // Add chip
  const chip=document.createElement('span'); chip.className='found-chip';
  chip.innerHTML=`${word.toUpperCase()}<span class="chip-pts">+${pts}</span>`;
  chip.addEventListener('click',()=>showDefinitionModal(word));
  document.getElementById('foundChips').appendChild(chip);

  showFeedback(`✓ ${word.toUpperCase()} +${pts} pts`,'ok');
  clearWord();

  // Bonus time for long words
  if(word.length >= 5){ addTime(5); }
  if(word.length >= 7){ addTime(5); }
}

function canMakeFrom(word, rack) {
  const available = rack.toLowerCase().split('');
  for(const l of word.toLowerCase()){
    const i=available.indexOf(l);
    if(i===-1) return false;
    available.splice(i,1);
  }
  return true;
}

function addTime(secs) {
  timeLeft = Math.min(timeLeft+secs, ROUND_TIME);
  const el=document.getElementById('timerBonus');
  if(el){ el.textContent=`+${secs}s`; el.style.opacity='1'; setTimeout(()=>el.style.opacity='0',800); }
  updateTimerUI();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft=ROUND_TIME;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if(timeLeft<=0){ clearInterval(timerInterval); endRound(); }
  },1000);
}

function updateTimerUI() {
  const pct=Math.min(100,(timeLeft/ROUND_TIME)*100);
  const fill=document.getElementById('timerFill'); const sec=document.getElementById('timerSec');
  fill.style.width=pct+'%'; sec.textContent=timeLeft+'s';
  const u=timeLeft<=15; fill.classList.toggle('urgent',u); sec.classList.toggle('urgent',u);
}

function showFeedback(msg,type){ const el=document.getElementById('feedback'); el.textContent=msg; el.className='feedback '+type; }

function endRound() {
  clearInterval(timerInterval);
  clearWord();
  document.getElementById('endCard').style.display='flex';
  document.getElementById('endScore').textContent = totalScore+' pts';
  document.getElementById('endMsg').textContent =
    found.size>=8?'🎉 Incredible word builder!':found.size>=5?'👏 Great vocabulary!':found.size>=3?'Good start — keep building!':'Try to find more words!';
  document.getElementById('endCard').dataset.score = totalScore;
  document.getElementById('switchBtn').textContent = diff==='easy'?'Switch to 8 letters':'Switch to 6 letters';

  // Show missed words (from rack's word list that weren't found)
  const missed = currentRack.words.filter(w=>!found.has(w.toLowerCase()) && w.length>=3);
  if(missed.length>0){
    document.getElementById('missedSection').style.display='block';
    const mc=document.getElementById('missedChips'); mc.innerHTML='';
    missed.slice(0,12).forEach(w=>{
      const chip=document.createElement('span'); chip.className='missed-chip';
      chip.textContent=w.toUpperCase();
      chip.addEventListener('click',()=>showDefinitionModal(w));
      mc.appendChild(chip);
    });
  }
}

function finalEnd() {
  endRound(); // shows the end card for the final round
  // Change "Next round" button
  const nextBtn = document.querySelector('[onclick="nextRound()"]');
  if(nextBtn){ nextBtn.textContent='🎉 Game complete!'; nextBtn.disabled=true; }
}

async function doSubmit(){
  await handleScoreSubmit('wordbuilder_'+diff, parseInt(document.getElementById('endCard').dataset.score), 'nameInput', 'submitArea', 'lbBody');
}

// Init
document.getElementById('switchBtn').textContent = 'Switch to 8 letters';
loadDict().then(()=>restartGame());
</script>
</body>
</html>
