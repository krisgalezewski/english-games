<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpellIt! — English Games</title>
<link rel="stylesheet" href="theme.css"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
main { max-width:520px; margin:0 auto; padding:1.25rem 1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:1rem; }

.hud { display:flex; align-items:center; justify-content:space-between; width:100%; gap:.5rem; flex-wrap:wrap; }
.hud-pill { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.45rem .9rem; text-align:center; min-width:64px; }
.hud-pill .val { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--gold); }
.hud-pill .lbl { font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

/* progress dots */
.dots { display:flex; gap:.3rem; flex-wrap:wrap; justify-content:center; }
.dot { width:9px; height:9px; border-radius:50%; background:var(--border2); transition:background .3s; }
.dot.done  { background:var(--correct); }
.dot.wrong { background:var(--wrong); }
.dot.skip  { background:#b8860b; }

.q-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.75rem 1.5rem; width:100%; display:flex; flex-direction:column; align-items:center; gap:1rem; }
.q-meta { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); }
.definition { font-size:1rem; line-height:1.7; color:var(--text); text-align:center; max-width:380px; }
.letter-hint { font-family:'Space Mono',monospace; font-size:.75rem; color:var(--muted); letter-spacing:.06em; }

.spell-wrap { display:flex; gap:.5rem; width:100%; max-width:360px; }
.spell-input { flex:1; background:#0a0a0a; border:2px solid var(--border2); border-radius:4px; padding:.7rem 1rem; font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--text); text-align:center; letter-spacing:.12em; text-transform:uppercase; transition:border-color .2s; }
.spell-input:focus { outline:none; border-color:var(--gold); }
.spell-input.ok  { border-color:var(--correct); }
.spell-input.bad { border-color:var(--wrong); animation:shake .35s; }

.hint-row { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
.hint-box { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.4rem .85rem; font-size:.78rem; color:var(--muted); font-style:italic; text-align:center; width:100%; max-width:360px; min-height:1.8rem; }
.hint-box.revealed { color:var(--text); font-style:normal; }

.feedback { min-height:1.4rem; font-size:.88rem; font-weight:600; text-align:center; font-family:'Space Mono',monospace; }
.feedback.ok  { color:var(--correct); }
.feedback.bad { color:var(--wrong); }

/* end */
.end-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem 1.5rem; width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1rem; animation:fadeIn .4s ease; }
.end-score { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:var(--gold); }
.words-review { width:100%; display:flex; flex-direction:column; gap:.4rem; margin-top:.5rem; }
.review-item { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.5rem .9rem; font-size:.85rem; cursor:pointer; transition:border-color .15s; }
.review-item:hover { border-color:var(--gold); }
.review-item .rword { font-family:'Playfair Display',serif; font-weight:700; color:var(--gold); }
.review-item .rstatus { font-size:.7rem; font-family:'Space Mono',monospace; }
.rstatus.ok   { color:var(--correct); }
.rstatus.bad  { color:var(--wrong); }
.rstatus.skip { color:#b8860b; }

.lb-section { width:100%; max-width:520px; padding:0 1rem 2.5rem; }

/* Gentle blink on inactive mode tabs to draw attention */
@keyframes modePulse {
  0%,100% { opacity:1; }
  50%      { opacity:.55; }
}
.diff-tab:not(.active), .mode-tab:not(.active) {
  animation: modePulse 2.8s ease-in-out infinite;
}
.diff-tab:not(.active):hover, .mode-tab:not(.active):hover {
  animation: none;
  opacity: 1;
}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="back">← Games</a>
  <span class="game-title">✍️ SpellIt!</span>
  <span></span>
</nav>

<main>
  <div class="hud">
    <div class="diff-tabs">
      <button class="diff-tab active" id="tabE" onclick="setDiff('easy')">Easy</button>
      <button class="diff-tab"        id="tabH" onclick="setDiff('hard')">Hard</button>
    </div>
    <div class="hud-pill"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
    <div class="hud-pill"><div class="val" id="streakVal">🔥0</div><div class="lbl">Streak</div></div>
    <div class="hud-pill"><div class="val" id="skipsVal">3</div><div class="lbl">Skips</div></div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="q-card" id="qCard">
    <div class="q-meta" id="qMeta">Word 1 of 8</div>
    <div class="definition" id="defText"></div>
    <div class="letter-hint" id="letterHint"></div>
    <div class="spell-wrap">
      <input class="spell-input" id="spellInput" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="TYPE HERE" maxlength="22"/>
      <button class="btn-primary" onclick="checkSpelling()">✓</button>
    </div>
    <div class="hint-box" id="hintBox">Hint not revealed yet</div>
    <div class="hint-row">
      <button class="btn-ghost" id="hint1Btn" onclick="showHint1()">💡 Hint (−3 pts)</button>
      <button class="btn-ghost" id="hint2Btn" onclick="showHint2()">🔍 Extra hint (−5 pts, once only)</button>
      <button class="btn-ghost" id="skipBtn"  onclick="skipWord()">⏭ Skip (−8 pts)</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="end-card" id="endCard" style="display:none">
    <div class="eyebrow">Round complete</div>
    <div class="end-score" id="endScore"></div>
    <p style="color:var(--muted);font-size:.88rem" id="endMsg"></p>
    <div class="words-review" id="wordsReview"></div>
    <div id="submitArea" style="width:100%">
      <div class="submit-row" style="margin-top:.5rem">
        <input id="nameInput" class="text-input" placeholder="Your name" maxlength="24" style="flex:1"/>
        <button class="btn-primary" onclick="doSubmit()">Add to leaderboard</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.25rem">
      <button class="btn-ghost" onclick="restartGame()">Play again</button>
      <button class="btn-ghost" onclick="setDiff(diff==='easy'?'hard':'easy')">Switch to <span id="switchLabel"></span></button>
      <a href="index.html" class="btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">← All games</a>
    </div>
  </div>
</main>

<div class="lb-section">
  <div class="lb-wrap">
    <h2>🏆 Leaderboard</h2>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
</div>

<script src="shared.js"></script>

  {word:'REPERCUSSION',   def:'An unintended consequence of an event or action.',
   hint1:'Contains a double S',                   hint2:'repercus-SION (repercuss + ion — double S)'},
  {word:'SOUVENIR',       def:'A thing that is kept as a reminder of a person, place, or event.',
   hint1:'French origin; ends in -ir (not -eer)', hint2:'souve-NIR (sou + ve + nir — French borrowing)'},
  {word:'SURREPTITIOUS',  def:'Kept secret because it would not be approved of; stealthy.',
   hint1:'Contains a double R',                   hint2:'sur-REP-titious (sur + reptitious — double R)'},
  {word:'UNDERESTIMATE',  def:'To estimate something to be smaller or less significant than it is.',
   hint1:'Ends in -ate (not -it)',                 hint2:'under-ESTIM-ate (under + estimate)'},
  {word:'UNEQUIVOCALLY',  def:'In a way that leaves no doubt; in an absolute and clear manner.',
   hint1:'Contains -QUIV- in the middle',          hint2:'unequivoc-ALLY (unequivocal → unequivocally)'},
];



const ROUND_SIZE = 8;
let diff = 'easy', wordBank = EASY_WORDS;
let roundWords = [], current = 0, score = 0, streak = 0, skipsLeft = 3, extraHintUsed = false;
let attempts = 0, h1Shown = false, h2Shown = false;
let results = []; // {word, status: 'correct'|'wrong'|'skip', pts}

function setDiff(d) {
  diff = d;
  wordBank = d === 'easy' ? EASY_WORDS : HARD_WORDS;
  document.getElementById('tabE').classList.toggle('active', d==='easy');
  document.getElementById('tabH').classList.toggle('active', d==='hard');
  restartGame();
}

function initRound() {
  const indices = freshIndices('spellit_'+diff, wordBank, ROUND_SIZE);
  indices.forEach(i => markSeen('spellit_'+diff, i));
  roundWords = indices.map(i => wordBank[i]);
  current = 0; score = 0; streak = 0; skipsLeft = 3; extraHintUsed = false; results = [];
  document.getElementById('scoreVal').textContent  = 0;
  document.getElementById('streakVal').textContent = '🔥0';
  document.getElementById('skipsVal').textContent  = 3;
  document.getElementById('qCard').style.display   = 'flex';
  document.getElementById('endCard').style.display = 'none';
  buildDots(); loadWord();
  renderLeaderboard('spellit_' + diff, 'lbBody');
}

function buildDots() {
  const el = document.getElementById('dots'); el.innerHTML = '';
  for (let i=0;i<ROUND_SIZE;i++) {
    const d = document.createElement('div'); d.className='dot'; d.id='dot'+i; el.appendChild(d);
  }
}

function loadWord() {
  const w = roundWords[current];
  document.getElementById('qMeta').textContent = `Word ${current+1} of ${ROUND_SIZE}`;
  document.getElementById('defText').textContent = w.def;
  document.getElementById('letterHint').textContent = `${w.word.length} letters`;
  document.getElementById('spellInput').value = '';
  document.getElementById('spellInput').className = 'spell-input';
  document.getElementById('spellInput').disabled = false;
  document.getElementById('hintBox').textContent = 'Click a hint button below to reveal';
  document.getElementById('hintBox').classList.remove('revealed');
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hint1Btn').style.display = 'inline-block';
  document.getElementById('hint2Btn').style.display = extraHintUsed ? 'none' : 'inline-block';
  document.getElementById('skipBtn').style.display  = skipsLeft > 0 ? 'inline-block' : 'none';
  document.getElementById('hint1Btn').disabled = false;
  attempts = 0; h1Shown = false; h2Shown = false;
  setTimeout(() => document.getElementById('spellInput').focus(), 80);
}

function showHint1() {
  if (h1Shown) return;
  h1Shown = true;
  const h = document.getElementById('hintBox');
  h.textContent = roundWords[current].hint1;
  h.classList.add('revealed');
  document.getElementById('hint1Btn').disabled = true;
  // deduct points only if not yet answered
  // tracked in checkSpelling via h1Shown flag
}

function showHint2() {
  if (extraHintUsed || h2Shown) return;
  extraHintUsed = true; h2Shown = true;
  const h = document.getElementById('hintBox');
  h.textContent = roundWords[current].hint2;
  h.classList.add('revealed');
  document.getElementById('hint2Btn').style.display = 'none';
}

function skipWord() {
  if (skipsLeft <= 0) return;
  skipsLeft--;
  score = Math.max(0, score - 8);
  streak = 0;
  document.getElementById('skipsVal').textContent = skipsLeft;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('streakVal').textContent = '🔥' + streak;
  document.getElementById('dot'+current).className = 'dot skip';
  results.push({word: roundWords[current].word, status:'skip', pts:-8});
  advanceWord();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('spellInput').addEventListener('keydown', e => { if(e.key==='Enter') checkSpelling(); });
});

function checkSpelling() {
  const inp = document.getElementById('spellInput');
  const guess = inp.value.trim().toUpperCase();
  const target = roundWords[current].word.toUpperCase();
  attempts++;

  if (guess === target) {
    inp.className = 'spell-input ok';
    let pts = 15;
    if (h1Shown) pts -= 3;
    if (h2Shown) pts -= 5;
    if (attempts > 1) pts -= (attempts - 1) * 3;
    pts = Math.max(2, pts);
    score += pts; streak++;
    document.getElementById('scoreVal').textContent  = score;
    document.getElementById('streakVal').textContent = '🔥' + streak;
    document.getElementById('feedback').textContent  = `✓ Correct! +${pts} pts`;
    document.getElementById('feedback').className    = 'feedback ok';
    document.getElementById('dot'+current).className = 'dot done';
    inp.disabled = true;
    results.push({word: target, status:'correct', pts});
    setTimeout(advanceWord, 900);
  } else {
    inp.className = 'spell-input bad';
    streak = 0;
    document.getElementById('streakVal').textContent = '🔥0';
    if (attempts >= 3) {
      score = Math.max(0, score - 2);
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('feedback').textContent = `✗ The answer was: ${roundWords[current].word}`;
      document.getElementById('feedback').className   = 'feedback bad';
      document.getElementById('dot'+current).className = 'dot wrong';
      inp.disabled = true;
      results.push({word: target, status:'wrong', pts:0});
      setTimeout(advanceWord, 1400);
    } else {
      document.getElementById('feedback').textContent = `✗ Try again (${attempts}/3)`;
      document.getElementById('feedback').className   = 'feedback bad';
      setTimeout(() => { inp.className='spell-input'; inp.value=''; inp.focus(); }, 400);
    }
  }
}

function advanceWord() {
  current++;
  if (current >= ROUND_SIZE) { endRound(); return; }
  loadWord();
}

function endRound() {
  document.getElementById('qCard').style.display  = 'none';
  document.getElementById('endCard').style.display = 'flex';
  document.getElementById('endScore').textContent  = score + ' pts';
  const maxPts = ROUND_SIZE * 15;
  document.getElementById('endMsg').textContent = score >= maxPts * .8 ? '🎉 Outstanding spelling!' : score >= maxPts * .5 ? '👏 Solid effort!' : 'Keep at it — spelling improves with practice!';
  document.getElementById('endCard').dataset.score = score;
  const sl = document.getElementById('switchLabel');
  if(sl) sl.textContent = diff==='easy' ? 'Hard' : 'Easy';

  // Words review
  const rev = document.getElementById('wordsReview'); rev.innerHTML = '';
  results.forEach(r => {
    const el = document.createElement('div');
    el.className = 'review-item';
    el.innerHTML = `<span class="rword">${r.word}</span><span class="rstatus ${r.status}">${r.status === 'correct' ? `+${r.pts} pts` : r.status === 'skip' ? 'skipped' : 'missed'}</span>`;
    el.addEventListener('click', () => showDefinitionModal(r.word));
    rev.appendChild(el);
  });
}

function restartGame() { initRound(); }

async function doSubmit() {
  const area = document.getElementById('endCard');
  await handleScoreSubmit('spellit_' + diff, parseInt(area.dataset.score), 'nameInput', 'submitArea', 'lbBody');
}

initRound();
</script>
</body>
</html>
